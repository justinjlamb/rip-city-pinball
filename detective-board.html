<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Board — Alicia Lamb, Booking & Events</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    /* Cork board base */
    background-color: #b8915a;
    background-image:
      /* Grain overlay */
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.015) 2px,
        rgba(0,0,0,0.015) 4px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.01) 3px,
        rgba(0,0,0,0.01) 5px
      ),
      /* Cork color variation */
      radial-gradient(ellipse at 20% 30%, rgba(196,160,105,0.6) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 60%, rgba(160,120,70,0.5) 0%, transparent 40%),
      radial-gradient(ellipse at 40% 80%, rgba(180,140,85,0.4) 0%, transparent 45%),
      radial-gradient(ellipse at 80% 20%, rgba(170,130,75,0.5) 0%, transparent 35%),
      /* Subtle dark spots */
      radial-gradient(circle at 15% 70%, rgba(100,70,30,0.15) 0%, transparent 8%),
      radial-gradient(circle at 55% 15%, rgba(100,70,30,0.12) 0%, transparent 6%),
      radial-gradient(circle at 85% 75%, rgba(100,70,30,0.1) 0%, transparent 10%);
    /* Wood frame shadow */
    box-shadow: inset 0 0 80px rgba(60,35,10,0.4), inset 0 0 20px rgba(60,35,10,0.2);
  }

  /* Wood frame border */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    border: 12px solid #4a3018;
    border-image: linear-gradient(
      135deg,
      #5c3d1e 0%, #7a5230 25%, #4a3018 50%, #6b4525 75%, #4a3018 100%
    ) 1;
    z-index: 100;
    pointer-events: none;
  }

  canvas {
    display: block;
    cursor: default;
    position: absolute;
    top: 0; left: 0;
  }

  .board-label {
    position: fixed;
    top: 24px;
    left: 28px;
    z-index: 50;
    pointer-events: none;
  }
  .board-label h1 {
    font-family: 'Special Elite', monospace;
    font-size: 14px;
    color: rgba(40,25,10,0.7);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .board-label .case {
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    color: rgba(40,25,10,0.45);
    margin-top: 2px;
  }

  .legend-board {
    position: fixed;
    bottom: 28px;
    left: 28px;
    z-index: 50;
    pointer-events: none;
    background: rgba(255,250,235,0.85);
    padding: 12px 16px;
    border: 1px solid rgba(0,0,0,0.1);
    box-shadow: 2px 3px 8px rgba(0,0,0,0.15);
    transform: rotate(-1.5deg);
  }
  .legend-board h3 {
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    color: #333;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 4px 0;
    font-family: 'Caveat', cursive;
    font-size: 15px;
    color: #444;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border: 1px solid rgba(0,0,0,0.15);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="board-label">
  <h1>Case File: Booking & Events</h1>
  <div class="case">Subject: Alicia Lamb — Rip City Management / Moda Center</div>
</div>

<div class="legend-board">
  <h3>Legend</h3>
  <div class="legend-row"><div class="legend-swatch" style="background:#fff8c5"></div> Inputs</div>
  <div class="legend-row"><div class="legend-swatch" style="background:#ffe4e1"></div> Central Hub</div>
  <div class="legend-row"><div class="legend-swatch" style="background:#fff"></div> Tools</div>
  <div class="legend-row"><div class="legend-swatch" style="background:#e8f5e9"></div> Outputs</div>
  <div class="legend-row"><div class="legend-swatch" style="background:#e3f2fd"></div> Departments</div>
</div>

<canvas id="C"></canvas>

<script>
const canvas = document.getElementById('C');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  // Reposition nodes on resize
  nodes.forEach(n => {
    n.x = Math.min(n.x, W - 80);
    n.y = Math.min(n.y, H - 60);
  });
}
window.addEventListener('resize', resize);

// ── CARD STYLES ──────────────────────────────────────
const CARD = {
  center: {
    bg: '#ffe4e1', border: '#c9746b', shadow: 'rgba(120,40,30,0.25)',
    w: 160, h: 100, font: '#6b2020', pinColor: '#cc2222'
  },
  input: {
    bg: '#fff8c5', border: '#d4c06a', shadow: 'rgba(100,90,30,0.2)',
    w: 120, h: 72, font: '#5a4e10', pinColor: '#d4a020'
  },
  output: {
    bg: '#e8f5e9', border: '#81b784', shadow: 'rgba(40,90,40,0.2)',
    w: 120, h: 72, font: '#2a5a2e', pinColor: '#44aa44'
  },
  dept: {
    bg: '#e3f2fd', border: '#7daed4', shadow: 'rgba(30,60,100,0.2)',
    w: 115, h: 68, font: '#1a4a6e', pinColor: '#3388cc'
  },
  tool: {
    bg: '#ffffff', border: '#bbb', shadow: 'rgba(0,0,0,0.15)',
    w: 100, h: 56, font: '#444', pinColor: '#888'
  },
};

// ── NODE DATA ────────────────────────────────────────
// Seed random rotations for each card
function seedRot() { return (Math.random() - 0.5) * 0.1; }

const nodes = [
  { id: 'alicia', label: 'ALICIA LAMB', sub: '"The Gateway"', type: 'center',
    x: 0, y: 0, rot: 0.02 },

  // Tools — tight cluster around Alicia
  { id: 'momentus', label: 'Momentus', type: 'tool', x: 0, y: 0, rot: seedRot() },
  { id: 'excel', label: 'Excel', type: 'tool', x: 0, y: 0, rot: seedRot() },
  { id: 'outlook', label: 'Outlook', type: 'tool', x: 0, y: 0, rot: seedRot() },
  { id: 'slack', label: 'Slack', type: 'tool', x: 0, y: 0, rot: seedRot() },
  { id: 'word', label: 'Word', type: 'tool', x: 0, y: 0, rot: seedRot() },
  { id: 'pollstar', label: 'Pollstar', type: 'tool', x: 0, y: 0, rot: seedRot() },
  { id: 'qualtrics', label: 'Qualtrics', type: 'tool', x: 0, y: 0, rot: seedRot() },
  { id: 'extsurvey', label: 'External\nBuilding Survey', type: 'output', x: 0, y: 0, rot: seedRot() },

  // Inputs (left side)
  { id: 'booking', label: 'Booking\nRequests', type: 'input', x: 0, y: 0, rot: seedRot() },
  { id: 'shows', label: 'New Show\nAnnouncements', type: 'input', x: 0, y: 0, rot: seedRot() },
  { id: 'docs', label: "Other People's\nDocuments", type: 'input', x: 0, y: 0, rot: seedRot() },
  { id: 'addon', label: 'Add-on\nEvents', type: 'input', x: 0, y: 0, rot: seedRot() },
  { id: 'details', label: 'Details\nForms', type: 'input', x: 0, y: 0, rot: seedRot() },
  { id: 'research', label: 'Research', type: 'input', x: 0, y: 0, rot: seedRot() },

  // Outputs (right of center)
  { id: 'calendar', label: 'Arena\nCalendar', sub: '1st & 15th', type: 'output', x: 0, y: 0, rot: seedRot() },
  { id: 'alerts', label: 'Event\nAlerts', sub: 'Yellow / Green', type: 'output', x: 0, y: 0, rot: seedRot() },
  { id: 'announce', label: 'Internal\nAnnouncements', type: 'output', x: 0, y: 0, rot: seedRot() },
  { id: 'deptnotify', label: 'Dept\nNotifications', type: 'output', x: 0, y: 0, rot: seedRot() },

  // Departments (far right)
  { id: 'guest', label: 'Guest\nExperience', type: 'dept', x: 0, y: 0, rot: seedRot() },
  { id: 'security', label: 'Security', type: 'dept', x: 0, y: 0, rot: seedRot() },
  { id: 'ess', label: 'ESS /\nConversions', type: 'dept', x: 0, y: 0, rot: seedRot() },
  { id: 'catering', label: 'Catering\n(Levy)', type: 'dept', x: 0, y: 0, rot: seedRot() },
  { id: 'prod', label: 'Production', type: 'dept', x: 0, y: 0, rot: seedRot() },
  { id: 'boxoffice', label: 'Box\nOffice', type: 'dept', x: 0, y: 0, rot: seedRot() },
  { id: 'enviro', label: 'Environmental\nServices', type: 'dept', x: 0, y: 0, rot: seedRot() },
  { id: 'facility', label: 'Facility Ops\nEngineers', type: 'dept', x: 0, y: 0, rot: seedRot() },
];

const edges = [
  ['booking', 'alicia'], ['shows', 'alicia'], ['docs', 'alicia'],
  ['addon', 'alicia'], ['details', 'alicia'], ['research', 'alicia'],
  ['alicia', 'momentus'], ['alicia', 'excel'], ['alicia', 'outlook'],
  ['alicia', 'slack'], ['alicia', 'word'], ['alicia', 'pollstar'],
  ['alicia', 'calendar'], ['alicia', 'alerts'],
  ['alicia', 'announce'], ['alicia', 'deptnotify'],
  ['calendar', 'guest'], ['calendar', 'security'], ['calendar', 'ess'],
  ['calendar', 'catering'], ['calendar', 'prod'], ['calendar', 'boxoffice'],
  ['calendar', 'enviro'], ['calendar', 'facility'],
  ['alerts', 'guest'], ['alerts', 'security'], ['alerts', 'prod'],
  ['alerts', 'boxoffice'], ['alerts', 'enviro'],
  ['announce', 'catering'], ['announce', 'ess'], ['announce', 'facility'],
  ['deptnotify', 'guest'], ['deptnotify', 'security'], ['deptnotify', 'prod'],
  // Details Form → Qualtrics → External Building Survey → Outlook
  ['details', 'qualtrics'], ['qualtrics', 'extsurvey'], ['extsurvey', 'outlook'],
];

const nodeMap = {};
nodes.forEach(n => { n.vx = 0; n.vy = 0; nodeMap[n.id] = n; });

// ── INITIAL LAYOUT ───────────────────────────────────
function layoutNodes() {
  const cx = W * 0.42, cy = H * 0.48;
  nodeMap['alicia'].x = cx; nodeMap['alicia'].y = cy;

  // Tools — spread around Alicia
  const tools = ['momentus', 'excel', 'outlook', 'slack', 'word', 'pollstar'];
  tools.forEach((id, i) => {
    const a = (i / tools.length) * Math.PI * 2 - Math.PI / 2;
    nodeMap[id].x = cx + Math.cos(a) * 200;
    nodeMap[id].y = cy + Math.sin(a) * 170;
  });

  // Inputs — left column
  const inputs = ['booking', 'shows', 'docs', 'addon', 'details', 'research'];
  inputs.forEach((id, i) => {
    nodeMap[id].x = W * 0.08 + (i % 2) * 30;
    nodeMap[id].y = H * 0.12 + i * (H * 0.14);
  });

  // Qualtrics + External Building Survey — chain off Details Forms, heading toward Outlook
  const detY = nodeMap['details'].y;
  nodeMap['qualtrics'].x = W * 0.2;
  nodeMap['qualtrics'].y = detY + 30;
  nodeMap['extsurvey'].x = W * 0.32;
  nodeMap['extsurvey'].y = detY + 60;

  // Outputs — right of center
  const outputs = ['calendar', 'alerts', 'announce', 'deptnotify'];
  outputs.forEach((id, i) => {
    nodeMap[id].x = W * 0.66 + (i % 2) * 20;
    nodeMap[id].y = H * 0.18 + i * (H * 0.2);
  });

  // Departments — far right
  const depts = ['guest', 'security', 'ess', 'catering', 'prod', 'boxoffice', 'enviro', 'facility'];
  depts.forEach((id, i) => {
    nodeMap[id].x = W * 0.86 + (i % 2) * 40;
    nodeMap[id].y = H * 0.08 + i * (H * 0.115);
  });
}

// ── PHYSICS (gentle settling) ────────────────────────
function simulate() {
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      let d = Math.sqrt(dx * dx + dy * dy) || 1;
      const sa = CARD[a.type], sb = CARD[b.type];
      const minDist = (sa.w + sb.w) * 0.7;
      if (d < minDist) {
        const force = (minDist - d) * 0.04;
        const fx = (dx / d) * force, fy = (dy / d) * force;
        a.vx -= fx; a.vy -= fy;
        b.vx += fx; b.vy += fy;
      }
    }
  }

  for (const [aId, bId] of edges) {
    const a = nodeMap[aId], b = nodeMap[bId];
    if (!a || !b) continue;
    let dx = b.x - a.x, dy = b.y - a.y;
    let d = Math.sqrt(dx * dx + dy * dy) || 1;
    const target = (CARD[a.type].w + CARD[b.type].w) * 1.8;
    const force = (d - target) * 0.0003;
    a.vx += (dx / d) * force;
    a.vy += (dy / d) * force;
    b.vx -= (dx / d) * force;
    b.vy -= (dy / d) * force;
  }

  nodes.forEach(n => {
    if (n === dragging) return;
    n.x += n.vx;
    n.y += n.vy;
    n.vx *= 0.88;
    n.vy *= 0.88;
    const s = CARD[n.type];
    n.x = Math.max(s.w / 2 + 20, Math.min(W - s.w / 2 - 20, n.x));
    n.y = Math.max(s.h / 2 + 40, Math.min(H - s.h / 2 - 20, n.y));
  });
}

// ── STRING DRAWING (catenary sag) ────────────────────
function drawString(ax, ay, bx, by, color, width, alpha) {
  const dx = bx - ax, dy = by - ay;
  const dist = Math.sqrt(dx * dx + dy * dy);
  // Sag proportional to distance
  const sag = Math.min(dist * 0.15, 40);
  const mx = (ax + bx) / 2;
  const my = (ay + by) / 2 + sag;

  ctx.beginPath();
  ctx.moveTo(ax, ay);
  ctx.quadraticCurveTo(mx, my, bx, by);
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.globalAlpha = alpha;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

// ── PUSHPIN DRAWING ──────────────────────────────────
function drawPin(x, y, color) {
  // Pin shadow
  ctx.beginPath();
  ctx.arc(x + 2, y + 3, 7, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fill();

  // Pin head
  ctx.beginPath();
  ctx.arc(x, y, 6, 0, Math.PI * 2);
  const grad = ctx.createRadialGradient(x - 2, y - 2, 0, x, y, 6);
  grad.addColorStop(0, lighten(color, 60));
  grad.addColorStop(0.7, color);
  grad.addColorStop(1, darken(color, 40));
  ctx.fillStyle = grad;
  ctx.fill();

  // Pin highlight
  ctx.beginPath();
  ctx.arc(x - 1.5, y - 1.5, 2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fill();

  // Pin point (tiny dark dot at center)
  ctx.beginPath();
  ctx.arc(x, y, 1.2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fill();
}

function parseHex(hex) {
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  return [parseInt(hex.slice(0,2),16), parseInt(hex.slice(2,4),16), parseInt(hex.slice(4,6),16)];
}
function lighten(hex, amt) {
  let [r,g,b] = parseHex(hex);
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}
function darken(hex, amt) {
  let [r,g,b] = parseHex(hex);
  return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
}

// ── CARD DRAWING ─────────────────────────────────────
function drawCard(n) {
  const s = CARD[n.type];
  const isHov = n === hovered;
  const isConn = hoveredConnections.has(n.id);
  const w = s.w, h = s.h;

  ctx.save();
  ctx.translate(n.x, n.y);
  ctx.rotate(n.rot);

  // Card shadow
  ctx.fillStyle = s.shadow;
  ctx.fillRect(-w / 2 + 3, -h / 2 + 4, w, h);

  // Card body
  ctx.fillStyle = s.bg;
  ctx.fillRect(-w / 2, -h / 2, w, h);

  // Aged paper effect — subtle stain
  if (n.type !== 'tool') {
    const stainGrad = ctx.createRadialGradient(
      -w * 0.1, -h * 0.1, 0, 0, 0, w * 0.5
    );
    stainGrad.addColorStop(0, 'rgba(139,119,80,0.06)');
    stainGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = stainGrad;
    ctx.fillRect(-w / 2, -h / 2, w, h);
  }

  // Card border
  ctx.strokeStyle = isHov || isConn ? '#c22' : s.border;
  ctx.lineWidth = isHov ? 2.5 : 1;
  ctx.strokeRect(-w / 2, -h / 2, w, h);

  // Tape strip on some cards
  if (n.type === 'center' || n.type === 'input') {
    drawTape(0, -h / 2, w * 0.4);
  }

  // Label text
  ctx.fillStyle = s.font;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (n.type === 'center') {
    ctx.font = "700 18px 'Special Elite', monospace";
    ctx.fillText(n.label, 0, -8);
    if (n.sub) {
      ctx.font = "500 16px 'Caveat', cursive";
      ctx.fillStyle = '#a04040';
      ctx.fillText(n.sub, 0, 16);
    }
  } else {
    const fontSize = n.type === 'tool' ? 14 : 15;
    ctx.font = `500 ${fontSize}px 'Caveat', cursive`;
    const lines = n.label.split('\n');
    const lineH = fontSize + 3;
    const startY = -(lines.length - 1) * lineH / 2;
    lines.forEach((line, i) => {
      ctx.fillText(line, 0, startY + i * lineH);
    });

    if (n.sub) {
      ctx.font = "400 12px 'Courier Prime', monospace";
      ctx.fillStyle = s.font;
      ctx.globalAlpha = 0.5;
      ctx.fillText(n.sub, 0, startY + lines.length * lineH + 2);
      ctx.globalAlpha = 1;
    }
  }

  ctx.restore();

  // Pushpin at top center of card (unrotated position, so it's on the card)
  const pinX = n.x + Math.cos(n.rot) * 0 - Math.sin(n.rot) * (-h / 2 + 4);
  const pinY = n.y + Math.sin(n.rot) * 0 + Math.cos(n.rot) * (-h / 2 + 4);
  drawPin(pinX, pinY, s.pinColor);
}

function drawTape(cx, cy, tw) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate((Math.random() - 0.5) * 0.05);
  ctx.fillStyle = 'rgba(255,255,240,0.45)';
  ctx.fillRect(-tw / 2, -6, tw, 12);
  // Tape edges
  ctx.strokeStyle = 'rgba(0,0,0,0.04)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(-tw / 2, -6, tw, 12);
  ctx.restore();
}

// ── MAIN RENDER ──────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Cork stains / ring marks (static decorative elements)
  drawCorkDetails();

  // Strings first (behind cards)
  for (const [aId, bId] of edges) {
    const a = nodeMap[aId], b = nodeMap[bId];
    if (!a || !b) continue;

    const isHighlighted = hoveredConnections.has(aId) && hoveredConnections.has(bId) &&
      (aId === (hovered && hovered.id) || bId === (hovered && hovered.id));

    drawString(
      a.x, a.y, b.x, b.y,
      isHighlighted ? '#cc1111' : '#8b2020',
      isHighlighted ? 2.2 : 1.2,
      isHighlighted ? 0.85 : 0.35
    );
  }

  // Cards (sorted: center on top)
  const sorted = [...nodes].sort((a, b) => {
    if (a.type === 'center') return 1;
    if (b.type === 'center') return -1;
    if (a === hovered) return 1;
    if (b === hovered) return -1;
    return 0;
  });
  sorted.forEach(drawCard);

  // Scrawled annotations
  drawAnnotations();
}

// ── CORK DETAILS (drawn once conceptually, re-drawn each frame) ──
function drawCorkDetails() {
  // Coffee ring stain
  ctx.beginPath();
  ctx.arc(W * 0.15, H * 0.25, 35, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(100,60,20,0.08)';
  ctx.lineWidth = 4;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(W * 0.78, H * 0.85, 30, 0.3, Math.PI * 1.7);
  ctx.strokeStyle = 'rgba(100,60,20,0.06)';
  ctx.lineWidth = 3;
  ctx.stroke();
}

function drawAnnotations() {
  ctx.font = "400 16px 'Caveat', cursive";
  ctx.fillStyle = 'rgba(80,30,30,0.4)';
  ctx.textAlign = 'left';

  // Annotation near inputs
  ctx.save();
  ctx.translate(W * 0.02, H * 0.06);
  ctx.rotate(-0.03);
  ctx.fillText('WHAT COMES IN', 0, 0);
  ctx.restore();

  // Arrow annotation near center
  ctx.save();
  ctx.translate(W * 0.36, H * 0.3);
  ctx.rotate(0.02);
  ctx.font = "600 18px 'Caveat', cursive";
  ctx.fillStyle = 'rgba(180,30,30,0.35)';
  ctx.fillText('← Everything flows through her →', 0, 0);
  ctx.restore();

  // Annotation near outputs
  ctx.save();
  ctx.translate(W * 0.62, H * 0.06);
  ctx.rotate(0.02);
  ctx.font = "400 16px 'Caveat', cursive";
  ctx.fillStyle = 'rgba(80,30,30,0.4)';
  ctx.fillText('WHAT GOES OUT', 0, 0);
  ctx.restore();

  // Annotation near departments
  ctx.save();
  ctx.translate(W * 0.83, H * 0.04);
  ctx.rotate(-0.01);
  ctx.fillText('ALL 8 DEPARTMENTS', 0, 0);
  ctx.restore();

  // Bottom annotation
  ctx.save();
  ctx.translate(W * 0.35, H * 0.94);
  ctx.rotate(-0.02);
  ctx.font = "500 15px 'Caveat', cursive";
  ctx.fillStyle = 'rgba(80,30,30,0.3)';
  ctx.fillText('"Nothing happens in this building without passing through me"', 0, 0);
  ctx.restore();
}

// ── INTERACTION ──────────────────────────────────────
let dragging = null;
let hovered = null;
let hoveredConnections = new Set();
let dragOff = { x: 0, y: 0 };

function getNodeAt(mx, my) {
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const s = CARD[n.type];
    // Un-rotate the mouse position relative to card
    const dx = mx - n.x, dy = my - n.y;
    const cos = Math.cos(-n.rot), sin = Math.sin(-n.rot);
    const lx = dx * cos - dy * sin;
    const ly = dx * sin + dy * cos;
    if (Math.abs(lx) < s.w / 2 + 5 && Math.abs(ly) < s.h / 2 + 5) return n;
  }
  return null;
}

function updateHoverConnections() {
  hoveredConnections.clear();
  if (!hovered) return;
  hoveredConnections.add(hovered.id);
  for (const [aId, bId] of edges) {
    if (aId === hovered.id) hoveredConnections.add(bId);
    if (bId === hovered.id) hoveredConnections.add(aId);
  }
}

canvas.addEventListener('mousedown', e => {
  const n = getNodeAt(e.clientX, e.clientY);
  if (n) {
    dragging = n;
    dragOff.x = e.clientX - n.x;
    dragOff.y = e.clientY - n.y;
    canvas.style.cursor = 'grabbing';
  }
});
canvas.addEventListener('mousemove', e => {
  if (dragging) {
    dragging.x = e.clientX - dragOff.x;
    dragging.y = e.clientY - dragOff.y;
    dragging.vx = 0;
    dragging.vy = 0;
  }
  hovered = getNodeAt(e.clientX, e.clientY);
  updateHoverConnections();
  canvas.style.cursor = hovered ? 'grab' : 'default';
  if (dragging) canvas.style.cursor = 'grabbing';
});
canvas.addEventListener('mouseup', () => { dragging = null; });
canvas.addEventListener('mouseleave', () => {
  dragging = null; hovered = null;
  hoveredConnections.clear();
});

// Touch support
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  const n = getNodeAt(t.clientX, t.clientY);
  if (n) {
    dragging = n;
    dragOff.x = t.clientX - n.x;
    dragOff.y = t.clientY - n.y;
    hovered = n;
    updateHoverConnections();
    e.preventDefault();
  }
});
canvas.addEventListener('touchmove', e => {
  if (dragging) {
    const t = e.touches[0];
    dragging.x = t.clientX - dragOff.x;
    dragging.y = t.clientY - dragOff.y;
    dragging.vx = 0;
    dragging.vy = 0;
    e.preventDefault();
  }
});
canvas.addEventListener('touchend', () => {
  dragging = null; hovered = null;
  hoveredConnections.clear();
});

// ── GAME LOOP ────────────────────────────────────────
W = canvas.width = window.innerWidth;
H = canvas.height = window.innerHeight;
layoutNodes();

// Settle physics for a few hundred frames so cards aren't on top of each other
for (let i = 0; i < 200; i++) simulate();

function loop() {
  simulate();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
