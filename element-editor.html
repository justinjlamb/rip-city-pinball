<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinball Element Editor</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'JetBrains Mono', monospace; background: #1a1a1e; color: #e0e0e0; }
  canvas { display: block; cursor: crosshair; }

  .toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    background: rgba(26,26,30,0.95); border-bottom: 1px solid #333;
    padding: 8px 16px; display: flex; align-items: center; gap: 12px;
    backdrop-filter: blur(8px);
  }
  .toolbar h1 { font-size: 13px; font-weight: 600; color: #aaa; letter-spacing: 1px; }
  .toolbar .sep { width: 1px; height: 20px; background: #333; }

  .tool-btn {
    background: #2a2a2e; border: 1px solid #444; border-radius: 4px;
    padding: 4px 10px; font-size: 11px; color: #ccc; cursor: pointer;
    font-family: inherit;
  }
  .tool-btn:hover { background: #3a3a3e; }
  .tool-btn.copy { background: #2a6e2a; border-color: #4a4; }
  .tool-btn.copy:hover { background: #3a8e3a; }

  .info-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    background: rgba(26,26,30,0.95); border-top: 1px solid #333;
    padding: 6px 16px; font-size: 11px; color: #888;
    display: flex; justify-content: space-between;
  }

  .help-panel {
    position: fixed; top: 44px; right: 12px; z-index: 10;
    background: rgba(26,26,30,0.95); border: 1px solid #333; border-radius: 6px;
    padding: 12px 16px; font-size: 11px; color: #999; line-height: 1.6;
    max-width: 260px;
  }
  .help-panel kbd {
    background: #333; border: 1px solid #555; border-radius: 3px;
    padding: 1px 5px; font-size: 10px; color: #ddd;
  }

  .legend-panel {
    position: fixed; top: 44px; left: 12px; z-index: 10;
    background: rgba(26,26,30,0.95); border: 1px solid #333; border-radius: 6px;
    padding: 10px 14px; font-size: 11px; line-height: 1.8;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid; }
  .legend-rect { width: 16px; height: 10px; border: 2px solid; }

  .coord-panel {
    position: fixed; bottom: 36px; right: 12px; z-index: 10;
    background: rgba(26,26,30,0.95); border: 1px solid #333; border-radius: 6px;
    padding: 10px 14px; font-size: 10px; color: #6c6; line-height: 1.7;
    max-width: 320px; max-height: 400px; overflow-y: auto;
    white-space: pre; font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<div class="toolbar">
  <h1>ELEMENT EDITOR</h1>
  <div class="sep"></div>
  <button class="tool-btn copy" id="copyBtn">Copy Code</button>
  <button class="tool-btn" id="resetBtn">Reset</button>
</div>

<div class="legend-panel">
  <div class="legend-item"><div class="legend-dot" style="border-color:#c22;background:rgba(200,16,46,0.3)"></div> Bumper (4)</div>
  <div class="legend-item"><div class="legend-rect" style="border-color:#e8a020;background:rgba(232,160,32,0.3)"></div> Drop Target (6)</div>
  <div class="legend-item"><div class="legend-dot" style="border-color:#FFD700;background:rgba(255,215,0,0.3)"></div> Multiball Scoop</div>
  <div class="legend-item"><div class="legend-dot" style="border-color:#0f0;background:rgba(0,255,0,0.2)"></div> Ramp Points</div>
  <div class="legend-item" style="margin-top:4px;color:#666">— Ramp path (green curve)</div>
</div>

<div class="help-panel" id="helpPanel">
  <kbd>Space</kbd>+drag — Pan<br>
  <kbd>Scroll</kbd> — Zoom<br>
  <kbd>Click</kbd> — Select element<br>
  <kbd>Drag</kbd> — Move element<br>
  <kbd>R</kbd> — Rotate selected target<br>
  <kbd>H</kbd> — Toggle help<br>
</div>

<div class="coord-panel" id="coordPanel"></div>

<div class="info-bar">
  <span id="mouseCoords">—</span>
  <span id="selectedInfo">Nothing selected</span>
  <span>Scroll: zoom | Space+drag: pan</span>
</div>

<canvas id="C"></canvas>

<script>
const canvas = document.getElementById('C');
const ctx = canvas.getContext('2d');

const IMG_W = 1694, IMG_H = 2376;

const tableImg = new Image();
tableImg.src = 'table-layer0.png';
let imgLoaded = false;
tableImg.onload = () => { imgLoaded = true; };

// ── CAMERA ───────────────────────────────────────────
let camX = 0, camY = 0, zoom = 1;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  zoom = Math.min(canvas.width / IMG_W, (canvas.height - 80) / IMG_H) * 0.95;
  camX = (canvas.width - IMG_W * zoom) / 2;
  camY = (canvas.height - IMG_H * zoom) / 2 + 20;
}
window.addEventListener('resize', resize);
resize();

function toWorld(sx, sy) {
  return { x: (sx - camX) / zoom, y: (sy - camY) / zoom };
}

// ── ELEMENTS ─────────────────────────────────────────
const elements = {
  bumpers: [
    { id: 'B1', x: 640, y: 616, r: 40 },
    { id: 'B2', x: 967, y: 621, r: 40 },
    { id: 'B3', x: 798, y: 778, r: 40 },
    { id: 'B4', x: 799, y: 397, r: 40 },
  ],
  targets: [
    // T1-T3: left wall, hittable from right. T4-T6: right wall, hittable from left.
    { id: 'T1', x: 262, y: 1043, w: 50, h: 18, angle: 1.571 },
    { id: 'T2', x: 263, y: 1158, w: 50, h: 18, angle: 1.571 },
    { id: 'T3', x: 264, y: 1281, w: 50, h: 18, angle: 1.571 },
    { id: 'T4', x: 1315, y: 1171, w: 50, h: 18, angle: 1.571 },
    { id: 'T5', x: 1316, y: 1290, w: 50, h: 18, angle: 1.571 },
    { id: 'T6', x: 1317, y: 1396, w: 50, h: 18, angle: 1.571 },
  ],
  scoop: { id: 'SCOOP', x: 304, y: 453, r: 35 },
  ramp: {
    entrance: { id: 'R-IN',  x: 1152, y: 1038 },
    cp1:      { id: 'R-CP1', x: 2004, y: 17 },
    cp2:      { id: 'R-CP2', x: 350, y: -63 },
    exit:     { id: 'R-OUT', x: 667, y: 461 },
  },
};

const defaultPositions = JSON.parse(JSON.stringify(elements));

function resetPositions() {
  const d = JSON.parse(JSON.stringify(defaultPositions));
  elements.bumpers = d.bumpers;
  elements.targets = d.targets;
  elements.scoop = d.scoop;
  elements.ramp = d.ramp;
  selected = null;
  updateCoordPanel();
}

// ── SELECTION ────────────────────────────────────────
let selected = null;
let dragging = false;
let dragOff = { x: 0, y: 0 };
let panning = false;
let panStart = { x: 0, y: 0 };
let spaceDown = false;

function hitTest(wx, wy) {
  for (let i = 0; i < elements.bumpers.length; i++) {
    const b = elements.bumpers[i];
    if (Math.hypot(wx - b.x, wy - b.y) < b.r + 10) {
      return { type: 'bumper', index: i, ref: b };
    }
  }
  for (let i = 0; i < elements.targets.length; i++) {
    const t = elements.targets[i];
    const hw = t.w / 2 + 10, hh = t.h / 2 + 10;
    const dx = wx - t.x, dy = wy - t.y;
    const cos = Math.cos(-t.angle), sin = Math.sin(-t.angle);
    const lx = dx * cos - dy * sin, ly = dx * sin + dy * cos;
    if (Math.abs(lx) < hw && Math.abs(ly) < hh) {
      return { type: 'target', index: i, ref: t };
    }
  }
  const s = elements.scoop;
  if (Math.hypot(wx - s.x, wy - s.y) < s.r + 10) {
    return { type: 'scoop', index: 0, ref: s };
  }
  for (const key of ['entrance', 'cp1', 'cp2', 'exit']) {
    const p = elements.ramp[key];
    if (Math.hypot(wx - p.x, wy - p.y) < 20) {
      return { type: 'ramp', index: key, ref: p };
    }
  }
  return null;
}

// ── INPUT ────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === ' ') { spaceDown = true; e.preventDefault(); }
  if (e.key === '=' && (e.metaKey || e.ctrlKey)) { zoom *= 1.2; e.preventDefault(); }
  if (e.key === '-' && (e.metaKey || e.ctrlKey)) { zoom /= 1.2; e.preventDefault(); }
  if (e.key === '0' && (e.metaKey || e.ctrlKey)) { resize(); e.preventDefault(); }
  if ((e.key === 'r' || e.key === 'R') && selected && selected.type === 'target') {
    selected.ref.angle += Math.PI / 12;
    updateCoordPanel();
  }
  if (e.key === 'h' || e.key === 'H') {
    const help = document.getElementById('helpPanel');
    help.style.display = help.style.display === 'none' ? '' : 'none';
  }
});
document.addEventListener('keyup', e => {
  if (e.key === ' ') spaceDown = false;
});

canvas.addEventListener('mousedown', e => {
  const sx = e.clientX, sy = e.clientY;
  if (spaceDown) {
    panning = true;
    panStart = { x: sx - camX, y: sy - camY };
    canvas.style.cursor = 'grabbing';
    return;
  }
  const w = toWorld(sx, sy);
  const hit = hitTest(w.x, w.y);
  if (hit) {
    selected = hit;
    dragging = true;
    dragOff = { x: w.x - hit.ref.x, y: w.y - hit.ref.y };
    canvas.style.cursor = 'grabbing';
  } else {
    selected = null;
  }
  updateSelectedInfo();
});

canvas.addEventListener('mousemove', e => {
  const sx = e.clientX, sy = e.clientY;
  const w = toWorld(sx, sy);
  document.getElementById('mouseCoords').textContent =
    '(' + Math.round(w.x) + ', ' + Math.round(w.y) + ')';

  if (panning) {
    camX = sx - panStart.x;
    camY = sy - panStart.y;
    return;
  }
  if (dragging && selected) {
    selected.ref.x = Math.round(w.x - dragOff.x);
    selected.ref.y = Math.round(w.y - dragOff.y);
    updateCoordPanel();
    updateSelectedInfo();
  }
  if (!dragging && !panning) {
    const hit = hitTest(w.x, w.y);
    canvas.style.cursor = hit ? 'grab' : (spaceDown ? 'grab' : 'crosshair');
  }
});

canvas.addEventListener('mouseup', () => {
  dragging = false;
  panning = false;
  canvas.style.cursor = spaceDown ? 'grab' : 'crosshair';
});

// Zoom via Cmd+/- only, no scroll wheel zoom

function updateSelectedInfo() {
  const el = document.getElementById('selectedInfo');
  if (!selected) { el.textContent = 'Nothing selected'; return; }
  const r = selected.ref;
  if (selected.type === 'bumper') el.textContent = r.id + ': (' + r.x + ', ' + r.y + ') r=' + r.r;
  else if (selected.type === 'target') el.textContent = r.id + ': (' + r.x + ', ' + r.y + ') ' + Math.round(r.angle * 180 / Math.PI) + ' deg  [R to rotate]';
  else if (selected.type === 'scoop') el.textContent = r.id + ': (' + r.x + ', ' + r.y + ')';
  else if (selected.type === 'ramp') el.textContent = 'Ramp ' + selected.index + ': (' + r.x + ', ' + r.y + ')';
}

// ── COORDINATE EXPORT ────────────────────────────────
function updateCoordPanel() {
  const panel = document.getElementById('coordPanel');
  let text = '// Bumpers\n';
  elements.bumpers.forEach(b => {
    text += 'createBumper(' + b.x + ', ' + b.y + ');  // ' + b.id + '\n';
  });
  text += '\n// Drop Targets\n';
  elements.targets.forEach(t => {
    const deg = Math.round(t.angle * 180 / Math.PI);
    text += 'createTarget(' + t.x + ', ' + t.y + ', ' + t.angle.toFixed(3) + ');  // ' + t.id + ' (' + deg + '°)\n';
  });
  text += '\n// Multiball Scoop\n';
  text += 'createScoop(' + elements.scoop.x + ', ' + elements.scoop.y + ');\n';
  text += '\n// Ramp (cubic bezier)\n';
  const r = elements.ramp;
  text += 'entrance: { x: ' + r.entrance.x + ', y: ' + r.entrance.y + ' },\n';
  text += 'cp1:      { x: ' + r.cp1.x + ', y: ' + r.cp1.y + ' },\n';
  text += 'cp2:      { x: ' + r.cp2.x + ', y: ' + r.cp2.y + ' },\n';
  text += 'exit:     { x: ' + r.exit.x + ', y: ' + r.exit.y + ' },\n';
  panel.textContent = text;
}

function copyCode() {
  let code = '// ── ELEMENT POSITIONS (from editor) ──\n\n';
  code += '// Bumpers\n';
  elements.bumpers.forEach(b => {
    code += 'createBumper(' + b.x + ', ' + b.y + ');  // ' + b.id + '\n';
  });
  code += '\n// Drop Targets\n';
  elements.targets.forEach(t => {
    code += 'createTarget(' + t.x + ', ' + t.y + ', ' + t.angle.toFixed(3) + ');  // ' + t.id + '\n';
  });
  code += '\n// Multiball Scoop\n';
  code += 'createScoop(' + elements.scoop.x + ', ' + elements.scoop.y + ');\n';
  code += '\n// Ramp (cubic bezier)\n';
  const r = elements.ramp;
  code += 'entrance: { x: ' + r.entrance.x + ', y: ' + r.entrance.y + ' },\n';
  code += 'cp1:      { x: ' + r.cp1.x + ', y: ' + r.cp1.y + ' },\n';
  code += 'cp2:      { x: ' + r.cp2.x + ', y: ' + r.cp2.y + ' },\n';
  code += 'exit:     { x: ' + r.exit.x + ', y: ' + r.exit.y + ' },\n';
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy Code'; }, 1500);
  });
}

document.getElementById('copyBtn').addEventListener('click', copyCode);
document.getElementById('resetBtn').addEventListener('click', resetPositions);

// ── RENDER ───────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(camX, camY);
  ctx.scale(zoom, zoom);

  // Table image
  if (imgLoaded) {
    ctx.globalAlpha = 0.7;
    ctx.drawImage(tableImg, 0, 0, IMG_W, IMG_H);
    ctx.globalAlpha = 1;
  }

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1 / zoom;
  for (let x = 0; x <= IMG_W; x += 100) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, IMG_H); ctx.stroke();
  }
  for (let y = 0; y <= IMG_H; y += 100) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(IMG_W, y); ctx.stroke();
  }

  // ── RAMP PATH (cubic bezier — 4 control points) ────
  const rp = elements.ramp;

  // Cubic bezier helpers
  function cubicPt(t, p0, p1, p2, p3) {
    const a = 1 - t;
    return {
      x: a*a*a*p0.x + 3*a*a*t*p1.x + 3*a*t*t*p2.x + t*t*t*p3.x,
      y: a*a*a*p0.y + 3*a*a*t*p1.y + 3*a*t*t*p2.y + t*t*t*p3.y,
    };
  }
  function cubicTangent(t, p0, p1, p2, p3) {
    const a = 1 - t;
    return {
      x: 3*a*a*(p1.x-p0.x) + 6*a*t*(p2.x-p1.x) + 3*t*t*(p3.x-p2.x),
      y: 3*a*a*(p1.y-p0.y) + 6*a*t*(p2.y-p1.y) + 3*t*t*(p3.y-p2.y),
    };
  }

  // Main curve
  ctx.beginPath();
  ctx.moveTo(rp.entrance.x, rp.entrance.y);
  ctx.bezierCurveTo(rp.cp1.x, rp.cp1.y, rp.cp2.x, rp.cp2.y, rp.exit.x, rp.exit.y);
  ctx.strokeStyle = 'rgba(0,255,0,0.5)';
  ctx.lineWidth = 3 / zoom;
  ctx.setLineDash([8 / zoom, 6 / zoom]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Width preview rails — tapered funnel: wide at entrance, narrows to channel
  const rampWEntrance = 140; // wide mouth
  const rampWChannel = 70;   // normal channel
  const taperEnd = 0.25;     // funnel narrows over first 25% of curve
  for (const side of [-1, 1]) {
    ctx.beginPath();
    for (let t = 0; t <= 1; t += 0.03) {
      const pt = cubicPt(t, rp.entrance, rp.cp1, rp.cp2, rp.exit);
      const tg = cubicTangent(t, rp.entrance, rp.cp1, rp.cp2, rp.exit);
      const len = Math.sqrt(tg.x*tg.x + tg.y*tg.y) || 1;
      // Taper: lerp from wide to narrow over the first taperEnd fraction
      const taperT = Math.min(t / taperEnd, 1);
      const w = rampWEntrance + (rampWChannel - rampWEntrance) * taperT;
      const nx = -tg.y/len * side * w/2;
      const ny = tg.x/len * side * w/2;
      if (t === 0) ctx.moveTo(pt.x+nx, pt.y+ny);
      else ctx.lineTo(pt.x+nx, pt.y+ny);
    }
    ctx.strokeStyle = 'rgba(0,255,0,0.2)';
    ctx.lineWidth = 2 / zoom;
    ctx.stroke();
  }

  // Control point guide lines (handle bars)
  ctx.strokeStyle = 'rgba(0,255,0,0.15)';
  ctx.lineWidth = 1 / zoom;
  ctx.setLineDash([4/zoom, 4/zoom]);
  ctx.beginPath();
  ctx.moveTo(rp.entrance.x, rp.entrance.y);
  ctx.lineTo(rp.cp1.x, rp.cp1.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(rp.cp2.x, rp.cp2.y);
  ctx.lineTo(rp.exit.x, rp.exit.y);
  ctx.stroke();
  // Faint line between cp1 and cp2
  ctx.beginPath();
  ctx.moveTo(rp.cp1.x, rp.cp1.y);
  ctx.lineTo(rp.cp2.x, rp.cp2.y);
  ctx.strokeStyle = 'rgba(0,255,0,0.08)';
  ctx.stroke();
  ctx.setLineDash([]);

  // Ramp control points
  const rampLabels = [['entrance','IN'], ['cp1','CP1'], ['cp2','CP2'], ['exit','OUT']];
  for (const [key, label] of rampLabels) {
    const p = rp[key];
    const isSel = selected && selected.type === 'ramp' && selected.index === key;
    ctx.beginPath();
    ctx.arc(p.x, p.y, isSel ? 14 : 10, 0, Math.PI * 2);
    ctx.fillStyle = isSel ? 'rgba(0,255,0,0.5)' : 'rgba(0,255,0,0.25)';
    ctx.fill();
    ctx.strokeStyle = '#0f0';
    ctx.lineWidth = (isSel ? 3 : 2) / zoom;
    ctx.stroke();
    ctx.fillStyle = '#0f0';
    ctx.font = (12/zoom) + "px 'JetBrains Mono'";
    ctx.textAlign = 'center';
    ctx.fillText(label, p.x, p.y - 16);
  }

  // ── BUMPERS ────────────────────────────────────────
  elements.bumpers.forEach((b, i) => {
    const isSel = selected && selected.type === 'bumper' && selected.index === i;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle = isSel ? 'rgba(200,16,46,0.5)' : 'rgba(200,16,46,0.3)';
    ctx.fill();
    ctx.strokeStyle = isSel ? '#ff4466' : '#c22';
    ctx.lineWidth = (isSel ? 3 : 2) / zoom;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + (14/zoom) + "px 'JetBrains Mono'";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(b.id, b.x, b.y);
  });

  // ── DROP TARGETS ───────────────────────────────────
  // T1-T3 (left wall): hittable from RIGHT → arrow points right
  // T4-T6 (right wall): hittable from LEFT → arrow points left
  elements.targets.forEach((t, i) => {
    const isSel = selected && selected.type === 'target' && selected.index === i;
    const hitFromLeft = i >= 3; // T4-T6 hit from left
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.rotate(t.angle);

    // Target plate
    ctx.fillStyle = isSel ? 'rgba(232,160,32,0.5)' : 'rgba(232,160,32,0.3)';
    ctx.fillRect(-t.w/2, -t.h/2, t.w, t.h);
    ctx.strokeStyle = isSel ? '#ffc040' : '#e8a020';
    ctx.lineWidth = (isSel ? 3 : 2) / zoom;
    ctx.strokeRect(-t.w/2, -t.h/2, t.w, t.h);

    // Hit-face indicator (red line on the broad face the ball strikes)
    // After 90° rotation: local y=-h/2 becomes the right face, y=h/2 becomes left face
    ctx.strokeStyle = '#ff4444';
    ctx.lineWidth = 3 / zoom;
    const faceY = hitFromLeft ? t.h/2 : -t.h/2;
    ctx.beginPath();
    ctx.moveTo(-t.w/2, faceY);
    ctx.lineTo(t.w/2, faceY);
    ctx.stroke();

    // Arrow showing hit direction (perpendicular to face, pointing inward)
    const arrowDir = hitFromLeft ? -1 : 1;
    const arrowTip = faceY + arrowDir * 20/zoom;
    ctx.beginPath();
    ctx.moveTo(0, arrowTip);
    ctx.lineTo(-6/zoom, faceY + arrowDir * 4/zoom);
    ctx.lineTo(6/zoom, faceY + arrowDir * 4/zoom);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,68,68,0.6)';
    ctx.fill();

    // Label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + (10/zoom) + "px 'JetBrains Mono'";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(t.id, 0, 0);
    ctx.restore();
  });

  // ── SCOOP ──────────────────────────────────────────
  const sc = elements.scoop;
  const isScoopSel = selected && selected.type === 'scoop';
  ctx.beginPath();
  ctx.arc(sc.x, sc.y, sc.r, 0, Math.PI * 2);
  ctx.fillStyle = isScoopSel ? 'rgba(255,215,0,0.4)' : 'rgba(255,215,0,0.25)';
  ctx.fill();
  ctx.strokeStyle = isScoopSel ? '#ffe040' : '#FFD700';
  ctx.lineWidth = (isScoopSel ? 3 : 2) / zoom;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(sc.x, sc.y, sc.r * 0.5, 0, Math.PI * 2);
  ctx.strokeStyle = isScoopSel ? '#ffe040' : '#FFD700';
  ctx.lineWidth = 1.5 / zoom;
  ctx.stroke();
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold ' + (12/zoom) + "px 'JetBrains Mono'";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('SCOOP', sc.x, sc.y - sc.r - 10);
  ctx.fillText('MB', sc.x, sc.y + 4);

  // ── FLIPPER REFERENCE (not draggable) ──────────────
  const flipperL = { x: 520, y: 2138 };
  const flipperR = { x: 1064, y: 2136 };
  ctx.strokeStyle = 'rgba(255,100,100,0.4)';
  ctx.lineWidth = 2 / zoom;
  ctx.setLineDash([4/zoom, 4/zoom]);
  ctx.beginPath();
  ctx.arc(flipperL.x, flipperL.y, 130, -0.55, 0.55);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(flipperR.x, flipperR.y, 130, Math.PI - 0.55, Math.PI + 0.55);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(255,100,100,0.3)';
  ctx.font = (10/zoom) + "px 'JetBrains Mono'";
  ctx.textAlign = 'center';
  ctx.fillText('L FLIP', flipperL.x, flipperL.y - 10);
  ctx.fillText('R FLIP', flipperR.x, flipperR.y - 10);

  // Ball start
  const ballStart = { x: 1535, y: 2100 };
  ctx.beginPath();
  ctx.arc(ballStart.x, ballStart.y, 24, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(200,200,200,0.3)';
  ctx.lineWidth = 1.5 / zoom;
  ctx.stroke();
  ctx.fillStyle = 'rgba(200,200,200,0.2)';
  ctx.font = (9/zoom) + "px 'JetBrains Mono'";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('BALL', ballStart.x, ballStart.y);

  ctx.restore();
  requestAnimationFrame(render);
}

updateCoordPanel();
requestAnimationFrame(render);
</script>
</body>
</html>
