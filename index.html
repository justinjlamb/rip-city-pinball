function playTone(freq, dur, type, vol) {
  if (!audioCtx) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol || 0.08, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

// Bezier curve → wall segments
function curveSegments(x0, y0, cx, cy, x1, y1, n) {
  const segs = [];
  for (let i = 0; i < n; i++) {
    const t0 = i / n, t1 = (i + 1) / n;
    const a0 = 1 - t0, a1 = 1 - t1;
    segs.push([
      a0*a0*x0 + 2*a0*t0*cx + t0*t0*x1,
      a0*a0*y0 + 2*a0*t0*cy + t0*t0*y1,
      a1*a1*x0 + 2*a1*t1*cx + t1*t1*x1,
      a1*a1*y0 + 2*a1*t1*cy + t1*t1*y1,
    ]);
  }
  return segs;
}

// ═══════════════════════════════════════════════════════════════
// BODY CREATION
// ═══════════════════════════════════════════════════════════════

function layerToCategory(layer) {
  switch(layer) {
    case 'always':     return CAT.ALWAYS;
    case 'playfield':  return CAT.PLAYFIELD;
    case 'left_ramp':  return CAT.LEFT_RAMP;
    case 'right_ramp': return CAT.RIGHT_RAMP;
    case 'launcher':   return CAT.LAUNCHER;
    default:           return CAT.ALWAYS;
  }
}

const LAYER_COLORS = {
  always:     '#00ffff',
  playfield:  '#ffff00',
  left_ramp:  '#ff8800',
  right_ramp: '#ff00ff',
  launcher:   '#00ff00',
};

// All created bodies stored here for debug rendering
let allWallBodies = [];

function createWallBody(x1, y1, x2, y2, label, layer) {
  const cx = (x1 + x2) / 2;
  const cy = (y1 + y2) / 2;
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx*dx + dy*dy);
  const angle = Math.atan2(dy, dx);
  const cat = layerToCategory(layer);
  // Launcher walls need higher restitution so ball maintains speed through curves
  const wallRestitution = (layer === 'launcher') ? 0.8 : 0.5;
  const wallFriction = (layer === 'launcher') ? 0.005 : 0.01;
  const body = Bodies.rectangle(cx, cy, len, WALL_THICKNESS, {
    isStatic: true,
    angle: angle,
    label: label,
    restitution: wallRestitution,
    friction: wallFriction,
    collisionFilter: { category: cat, mask: CAT.BALL },
    render: { visible: false }
  });
  body._layer = layer;
  body._label = label;
  body._debugColor = LAYER_COLORS[layer];
  allWallBodies.push(body);
  return body;
}

  engine.velocityIterations = 16;

  allWallBodies = [];

  // Off-screen catch walls

    Bodies.rectangle(IMG_W/2, -50, IMG_W+200, 100, { isStatic: true, collisionFilter: { category: CAT.ALWAYS, mask: CAT.BALL } }),

    Bodies.rectangle(-50, IMG_H/2, 100, IMG_H+200, { isStatic: true, collisionFilter: { category: CAT.ALWAYS, mask: CAT.BALL } }),
    Bodies.rectangle(IMG_W+50, IMG_H/2, 100, IMG_H+200, { isStatic: true, collisionFilter: { category: CAT.ALWAYS, mask: CAT.BALL } }),
  ]);

  // Drain sensor between flippers
  const drainSensor = Bodies.rectangle(
    (LEFT_HINGE.x + RIGHT_HINGE.x) / 2, 2350,
    RIGHT_HINGE.x - LEFT_HINGE.x + 200, 30,
    { isStatic: true, isSensor: true, label: 'drain',
      collisionFilter: { category: CAT.ALWAYS, mask: CAT.BALL } }
  );
  drainSensor._layer = 'always';
  drainSensor._label = 'Drain Zone';
  drainSensor._debugColor = '#ff0000';
  allWallBodies.push(drainSensor);
  World.add(world, drainSensor);

  // Launcher floor
  const launcherFloor = Bodies.rectangle(1620, 2100, 120, 20, {
    isStatic: true, label: 'launcher_floor',
    collisionFilter: { category: CAT.LAUNCHER, mask: CAT.BALL }
  });
  launcherFloor._layer = 'launcher';
  launcherFloor._label = 'Launcher Floor';
  launcherFloor._debugColor = LAYER_COLORS.launcher;
  allWallBodies.push(launcherFloor);
  World.add(world, launcherFloor);

  // === CREATE ALL WALLS ===
  for (const w of TABLE_WALLS) {
    const body = createWallBody(w.pts[0], w.pts[1], w.pts[2], w.pts[3], w.label, w.layer);
    World.add(world, body);
  }

  // === CREATE ALL CURVES ===
  for (const c of TABLE_CURVES) {
    const segs = curveSegments(c.pts[0], c.pts[1], c.pts[2], c.pts[3], c.pts[4], c.pts[5], c.n);
    segs.forEach((s, i) => {
      const body = createWallBody(s[0], s[1], s[2], s[3], c.label + ' [' + i + ']', c.layer);
      World.add(world, body);
    });
  }

  // === CREATE BUMPERS ===
  TABLE_BUMPERS.forEach((def, i) => {
    const body = Bodies.circle(def.x, def.y, def.r, {
      isStatic: true, label: 'bumper', restitution: BUMPER_BOUNCE,
      collisionFilter: { category: CAT.PLAYFIELD, mask: CAT.BALL },
      render: { visible: false }
    });
    body._layer = 'playfield';
    body._label = def.label;
    body._debugColor = LAYER_COLORS.playfield;
    body._bumperIndex = i;
    bumperBodies.push(body);
    allWallBodies.push(body);
    World.add(world, body);
  });

  // === Phase 2: CREATE SLINGSHOTS ===
  createSlingshot(
    [{ x: 435, y: 1680 }, { x: 556, y: 2020 }, { x: 180, y: 1900 }],
    'slingshot_left'
  );
  createSlingshot(
    [{ x: 1274, y: 1680 }, { x: 1150, y: 2020 }, { x: 1390, y: 1960 }],
    'slingshot_right'
  );

  createPaddles();
  createPinball();
  createEvents();
}

// ── Phase 2: Slingshots ─────────────────────────────────────
function createSlingshot(vertices, label) {
  const cx = vertices.reduce((s, v) => s + v.x, 0) / 3;
  const cy = vertices.reduce((s, v) => s + v.y, 0) / 3;
  const body = Bodies.fromVertices(cx, cy, [vertices], {
    isStatic: true, isSensor: true, label: label,
    collisionFilter: { category: CAT.ALWAYS, mask: CAT.BALL }
  });
  body._layer = 'always';
  body._label = label;
  body._debugColor = '#ff4444';
  allWallBodies.push(body);
  World.add(world, body);
  return body;
}

// ═══════════════════════════════════════════════════════════════
// FLIPPERS — Static rectangles with updateVelocity=true (Phase 0)
// ═══════════════════════════════════════════════════════════════

const FLIP_REST = 0.55;      // rest angle in radians (~5 o'clock for left, ~7 o'clock for right)
const FLIP_ACTIVE = -0.55;   // active angle (~1 o'clock for left, ~11 o'clock for right)
const FLIP_UP_SPEED = 0.22;  // radians per frame when pressing
const FLIP_DN_SPEED = 0.10;  // radians per frame returning to rest
let leftFlipAngle = FLIP_REST;
let rightFlipAngle = FLIP_REST;

// Phase 0: Position a flipper body with updateVelocity=true for real impulse transfer
function positionFlipper(body, hinge, angle) {
  const halfLen = PADDLE_LEN / 2;
  Body.setAngle(body, angle, true);      // updateVelocity=true
  Body.setPosition(body, {
    x: hinge.x + Math.cos(angle) * halfLen,
    y: hinge.y + Math.sin(angle) * halfLen
  }, true);                                // updateVelocity=true
}

function createPaddles() {
  // Simple static rectangles — we move them directly each frame
  leftPaddle = Bodies.rectangle(0, 0, PADDLE_LEN, PADDLE_WIDTH, {
    isStatic: true, label: 'paddleLeft', chamfer: { radius: 8 },
    collisionFilter: { category: CAT.ALWAYS, mask: CAT.BALL },
    restitution: 0.8, render: { visible: false }
  });
  rightPaddle = Bodies.rectangle(0, 0, PADDLE_LEN, PADDLE_WIDTH, {
    isStatic: true, label: 'paddleRight', chamfer: { radius: 8 },
    collisionFilter: { category: CAT.ALWAYS, mask: CAT.BALL },
    restitution: 0.8, render: { visible: false }
  });
  World.add(world, [leftPaddle, rightPaddle]);

  // Set initial rest positions
  leftFlipAngle = FLIP_REST;
  rightFlipAngle = FLIP_REST;
  positionFlipper(leftPaddle, LEFT_HINGE, FLIP_REST);
  positionFlipper(rightPaddle, RIGHT_HINGE, Math.PI - FLIP_REST);
}

function updateFlippers() {
  // Left flipper: rest = FLIP_REST (5 o'clock), active = FLIP_ACTIVE (1 o'clock)
  const leftTarget = isLeftPaddleUp ? FLIP_ACTIVE : FLIP_REST;
  if (leftFlipAngle !== leftTarget) {
    if (isLeftPaddleUp) {
      leftFlipAngle = Math.max(leftFlipAngle - FLIP_UP_SPEED, leftTarget);
    } else {
      leftFlipAngle = Math.min(leftFlipAngle + FLIP_DN_SPEED, leftTarget);
    }
  }
  positionFlipper(leftPaddle, LEFT_HINGE, leftFlipAngle);

  // Right flipper: mirrored — actual angle = PI - flipAngle
  const rightTarget = isRightPaddleUp ? FLIP_ACTIVE : FLIP_REST;
  if (rightFlipAngle !== rightTarget) {
    if (isRightPaddleUp) {
      rightFlipAngle = Math.max(rightFlipAngle - FLIP_UP_SPEED, rightTarget);
    } else {
      rightFlipAngle = Math.min(rightFlipAngle + FLIP_DN_SPEED, rightTarget);
    }
  }
  positionFlipper(rightPaddle, RIGHT_HINGE, Math.PI - rightFlipAngle);

  // Phase 0: Manual force hack REMOVED — updateVelocity=true handles impulse naturally
}

// ═══════════════════════════════════════════════════════════════
// PINBALL
// ═══════════════════════════════════════════════════════════════

function createPinball() {
  // Phase 1: Updated ball properties
  pinball = Bodies.circle(0, 0, BALL_RADIUS, {
    label: 'pinball',
    collisionFilter: { category: CAT.BALL, mask: LAYER_MASK.launcher },
    render: { visible: false },
    restitution: 0,          // Zero — all bounce comes from walls/bumpers
    friction: 0.05,          // Low — glossy playfield
    frictionAir: 0.015,      // Slight air resistance
    density: 0.003           // Heavier — more momentum, better flipper feel
  });
  World.add(world, pinball);
  Body.setPosition(pinball, { x: -200, y: -200 });
  Body.setStatic(pinball, true);
  ballLayer = 'launcher';
}

function setBallLayer(layer) {
  ballLayer = layer;
  if (pinball) {
    pinball.collisionFilter.mask = LAYER_MASK[layer] || LAYER_MASK.playfield;
  }
  // Update multiball layers too
  multiballs.forEach(mb => {
    mb.collisionFilter.mask = LAYER_MASK.playfield; // extra balls stay on playfield
  });
}

function launchPinball() {
  Body.setStatic(pinball, true);
  Body.setPosition(pinball, { x: 1620, y: 1900 }); // In launcher channel
  Body.setVelocity(pinball, { x: 0, y: 0 });
  Body.setAngularVelocity(pinball, 0);
  setBallLayer('launcher');
  gameState = 'launch';
  plungerPower = 0;
  plungerCharging = false;
  trail = [];
}

// Phase 4: Plunger polish — tuned velocity range
function firePinball() {
  const power = Math.max(0.2, plungerPower);
  const vel = -20 - (power * 40); // range: -28 to -60 (tuned for heavier ball + air friction)
  Body.setStatic(pinball, false);
  Body.setVelocity(pinball, { x: -1 - power * 2, y: vel });
  gameState = 'play';
  plungerPower = 0;
  plungerCharging = false;
  activateBallSave(); // Phase 3: Ball save on launch
  showMessage('BALL ' + ballNum);
  sndLaunch();

  // Test mode: mark ball as launched
  if (TEST_MODE) {
    testBallLaunched = true;
    testBallFrames = 0;
    testBallBumperHits = 0;
    testBallSlingshotHits = 0;
    testBallMaxSpeed = 0;
    testBallStuck = 0;
  }
}

// ═══════════════════════════════════════════════════════════════
// LAYER TRANSITIONS
// ═══════════════════════════════════════════════════════════════

function checkLayerTransitions() {
  if (!pinball || pinball.isStatic) return;
  const bx = pinball.position.x;
  const by = pinball.position.y;
  const bvy = pinball.velocity.y;

  for (const t of TRIGGERS) {
    // Check if ball is in the trigger zone
    if (bx >= t.x && bx <= t.x + t.w && by >= t.y && by <= t.y + t.h) {
      // Check direction (up = negative vy, down = positive vy)
      const dirMatch = (t.dir === 'up' && bvy < -2) || (t.dir === 'down' && bvy > 2) || t.dir === 'any';

      if (ballLayer === t.from && dirMatch) {
        if (t.to === 'moda') {
          // Moda Center — trigger multiball!
          triggerMultiball();
          setBallLayer('right_ramp'); // eject onto right ramp
          Body.setVelocity(pinball, { x: 2, y: -15 }); // launch upward onto ramp
          showMessage('MODA CENTER — MULTIBALL!');
          sndMultiball();
        } else {
          setBallLayer(t.to);
          if (t.to === 'left_ramp' || t.to === 'right_ramp') {
            registerHit(POINTS.RAMP_ENTRY, 'RAMP');
            sndRamp();
          }
        }
      }
    }
  }

  // Launcher exit gate: simulates the one-way gate at the top of the launcher.
  // Ball rounds the curve, reaches the top, and exits into the playfield.
  // Teleport past the right boundary curves (same as a physical one-way gate).
  if (ballLayer === 'launcher' && bx < 1560 && by < 480 && bvy > -5) {
    setBallLayer('playfield');
    Body.setPosition(pinball, { x: 1300, y: 350 });
    Body.setVelocity(pinball, { x: -10, y: 3 });
  }
}

function triggerMultiball() {
  if (isMultiball) return;
  isMultiball = true;
  registerHit(POINTS.MODA_CENTER, 'MODA CENTER');

  // Spawn 2 extra balls
  for (let i = 0; i < 2; i++) {
    const mb = Bodies.circle(
      LEFT_HINGE.x + 200 + i * 150,
      LEFT_HINGE.y - 300,
      BALL_RADIUS,
      {
        label: 'multiball',
        collisionFilter: { category: CAT.BALL, mask: LAYER_MASK.playfield },
        render: { visible: false },
        restitution: 0, friction: 0.05, frictionAir: 0.015, density: 0.003
      }
    );
    Body.setVelocity(mb, { x: rand(-5, 5), y: rand(-15, -8) });
    World.add(world, mb);
    multiballs.push(mb);
  }
}

// ═══════════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════════

function createEvents() {
  Events.on(engine, 'collisionStart', function(event) {
    event.pairs.forEach(pair => {
      let bodyA = pair.bodyA, bodyB = pair.bodyB;
      // Ensure bodyB is always the ball
      if (bodyA.label === 'pinball' || bodyA.label === 'multiball') {
        const tmp = bodyA; bodyA = bodyB; bodyB = tmp;
      }
      if (bodyB.label !== 'pinball' && bodyB.label !== 'multiball') return;

      if (bodyA.label === 'drain') {
        if (bodyB.label === 'multiball') {
          // Remove this multiball
          World.remove(world, bodyB);
          multiballs = multiballs.filter(m => m !== bodyB);
          if (multiballs.length === 0) isMultiball = false;
          emitParticles(bodyB.position.x, bodyB.position.y, RED, 15, 5);
        } else {
          handleDrain();
        }
      } else if (bodyA.label === 'bumper') {
        pingBumper(bodyA, bodyB);
      } else if (bodyA.label && bodyA.label.startsWith('slingshot')) {
        // Phase 2: Slingshot collision
        const dx = bodyB.position.x - bodyA.position.x;
        const dy = bodyB.position.y - bodyA.position.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        Body.applyForce(bodyB, bodyB.position, {
          x: (dx/dist) * 0.06, y: (dy/dist) * 0.06
        });
        registerHit(POINTS.SLINGSHOT, 'SLINGSHOT');
        shake = 8;
        emitParticles(bodyA.position.x, bodyA.position.y, '#ff4444', 10, 6);
        sndSlingshot();
        if (TEST_MODE) testBallSlingshotHits++;
      }
    });
  });

  Events.on(engine, 'beforeUpdate', function() {
    updateFlippers();
    checkLayerTransitions();

    // Ball fell back into launcher channel — allow re-launch
    if (pinball && !pinball.isStatic && gameState === 'play' && ballLayer === 'playfield') {
      const bx = pinball.position.x, by = pinball.position.y;
      // If ball is in the launcher channel area (right side, between the walls)
      if (bx > 1550 && bx < 1690 && by > 1800) {
        // Ball dropped back into the launcher — reset to launch mode
        Body.setStatic(pinball, true);
        Body.setPosition(pinball, { x: 1620, y: 1900 });
        Body.setVelocity(pinball, { x: 0, y: 0 });
        setBallLayer('launcher');
        gameState = 'launch';
        plungerPower = 0;
        plungerCharging = false;
        trail = [];
        showMessage('SHOOT AGAIN');
      }
    }

    // Phase 1: Speed clamping (skip while in launcher — let the ball fly)
    if (pinball && !pinball.isStatic && ballLayer !== 'launcher') {
      const v = pinball.velocity;
      const speed = Math.sqrt(v.x * v.x + v.y * v.y);
      if (speed > MAX_SPEED) {
        const s = MAX_SPEED / speed;
        Body.setVelocity(pinball, { x: v.x * s, y: v.y * s });
      }

      // Test mode: track max speed (after clamping)
      if (TEST_MODE) {
        const postClampSpeed = Math.sqrt(pinball.velocity.x**2 + pinball.velocity.y**2);
        if (postClampSpeed > testBallMaxSpeed) testBallMaxSpeed = postClampSpeed;
        if (postClampSpeed > testData.maxSpeedSeen) testData.maxSpeedSeen = postClampSpeed;
      }
    }
    // Clamp multiballs too
    multiballs.forEach(ball => {
      if (!ball || ball.isStatic) return;
      const v = ball.velocity;
      const speed = Math.sqrt(v.x * v.x + v.y * v.y);
      if (speed > MAX_SPEED) {
        const s = MAX_SPEED / speed;
        Body.setVelocity(ball, { x: v.x * s, y: v.y * s });
      }
    });

    // Phase 1: Stuck ball detection with escalating nudge
    if (pinball && !pinball.isStatic && gameState === 'play') {
      const speed = Math.sqrt(pinball.velocity.x**2 + pinball.velocity.y**2);
      const STUCK_THRESHOLD = TEST_MODE ? 45 : 90; // Faster in test mode (0.75s vs 1.5s)
      if (speed < 0.5 && pinball.position.y < 2100) {
        stuckFrames++;
        if (stuckFrames > STUCK_THRESHOLD) {
          stuckNudgeCount++;
          // If stuck on launcher layer, force to playfield
          if (ballLayer === 'launcher') {
            setBallLayer('playfield');
          }
          if (stuckNudgeCount >= 2 || (TEST_MODE && stuckNudgeCount >= 1 && pinball.position.y < 1500)) {
            // Teleport to center above flippers for quick resolution
            Body.setPosition(pinball, {
              x: (LEFT_HINGE.x + RIGHT_HINGE.x) / 2 + (Math.random()-0.5) * 200,
              y: LEFT_HINGE.y - 200
            });
            Body.setVelocity(pinball, { x: (Math.random()-0.5)*5, y: 5 });
            setBallLayer('playfield');
            stuckNudgeCount = 0;
          } else {
            // First nudge: strong downward kick toward flippers
            Body.setVelocity(pinball, {
              x: (Math.random() - 0.5) * 20,
              y: 10 + Math.random() * 10
            });
          }
          stuckFrames = 0;
          if (TEST_MODE) {
            testBallStuck++;
            testData.stuckIncidents++;
          }
        }
      } else {
        stuckFrames = 0;
        // Only reset nudge count if ball is genuinely moving (speed > 2)
        if (speed > 2) stuckNudgeCount = 0;
      }
    }

    // Safety: if ball escapes bounds, drain it
    if (pinball && !pinball.isStatic && gameState === 'play') {
      const bx = pinball.position.x, by = pinball.position.y;
      if (bx < -50 || bx > IMG_W + 50 || by < -100 || by > IMG_H + 100) {
        if (TEST_MODE) {
          testData.tunnelingIncidents++;
          testData.totalCriticalFailures++;
          console.log('[TEST] Ball escaped bounds at', Math.round(bx), Math.round(by));
        }
        handleDrain();
      }
    }

    // Drain multiballs that escape
    for (let i = multiballs.length - 1; i >= 0; i--) {
      const mb = multiballs[i];
      if (mb.position.y > IMG_H + 50) {
        World.remove(world, mb);
        multiballs.splice(i, 1);
        if (multiballs.length === 0) isMultiball = false;
      }
    }

    // Phase 3: Combo timer decay
    if (comboTimer > 0) {
      comboTimer--;
      if (comboTimer <= 0) comboCount = 0;
    }

    // Phase 3: Ball save timer
    if (ballSaveTimer > 0) {
      ballSaveTimer--;
      if (ballSaveTimer <= 0) ballSaveActive = false;
    }

    // Test mode: frame counting + max ball lifetime
    if (TEST_MODE && testBallLaunched && pinball && !pinball.isStatic && gameState === 'play') {
      testBallFrames++;
      // Force drain after 180 frames (3 seconds) to keep test moving
      if (testBallFrames > 180) {
        ballSaveActive = false; // Don't trigger ball save on force-drain
        handleDrain();
      }
    }
  });

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (e.code === 'ArrowLeft' || e.code === 'KeyZ' || e.code === 'ShiftLeft') {
      isLeftPaddleUp = true;
      if (gameState === 'play' || gameState === 'launch') sndFlipper();
    }
    if (e.code === 'ArrowRight' || e.code === 'KeyM' || e.code === 'ShiftRight') {
      isRightPaddleUp = true;
      if (gameState === 'play' || gameState === 'launch') sndFlipper();
    }
    if (e.code === 'Space') {
      e.preventDefault();
      if (gameState === 'attract') startGame();
      else if (gameState === 'gameover') { gameState = 'attract'; particles = []; attractTimer = 0; }
      else if (gameState === 'launch') plungerCharging = true;
    }
  });

  document.addEventListener('keyup', function(e) {
    if (e.code === 'ArrowLeft' || e.code === 'KeyZ' || e.code === 'ShiftLeft') isLeftPaddleUp = false;
    if (e.code === 'ArrowRight' || e.code === 'KeyM' || e.code === 'ShiftRight') isRightPaddleUp = false;
    if (e.code === 'Space') {
      if (plungerCharging && gameState === 'launch') firePinball();
      plungerCharging = false;
    }
  });

  // Touch
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    for (const touch of e.changedTouches) {
      if (gameState === 'attract') { startGame(); return; }
      if (gameState === 'gameover') { gameState = 'attract'; particles = []; attractTimer = 0; return; }
      if (touch.clientX < canvas.width / 2) { isLeftPaddleUp = true; sndFlipper(); }
      else { isRightPaddleUp = true; sndFlipper(); }
      if (gameState === 'launch') plungerCharging = true;
    }
  }, { passive: false });

  canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      if (touch.clientX < canvas.width / 2) isLeftPaddleUp = false;
      else isRightPaddleUp = false;
      if (plungerCharging && gameState === 'launch') firePinball();
      plungerCharging = false;
    }
  }, { passive: false });
}

function startGame() {
  score = 0; ballNum = 1;
  bumperHitCount = [0, 0, 0, 0];
  bumperFlash = [0, 0, 0, 0];
  trail = []; particles = [];
  isMultiball = false;
  multiballs.forEach(mb => World.remove(world, mb));
  multiballs = [];
  comboCount = 0;
  comboTimer = 0;
  scoreMultiplier = 1;
  ballBonus = 0;
  rampCompletions = 0;
  bumperHitsThisBall = 0;
  ballSaveActive = false;
  ballSaveTimer = 0;
  stuckFrames = 0;
  launchPinball();
}

function handleDrain() {
  if (gameState !== 'play') return;

  // Phase 3: Ball save check
  if (ballSaveActive) {
    ballSaveActive = false;
    ballSaveTimer = 0;
    // Re-launch without losing a ball
    Body.setStatic(pinball, true);
    Body.setPosition(pinball, { x: -200, y: -200 });
    Body.setVelocity(pinball, { x: 0, y: 0 });
    showMessage('BALL SAVED!');
    // Small delay then re-launch
    const saveDelay = TEST_MODE ? 50 : 500;
    setTimeout(function() {
      launchPinball();
      // In test mode, auto-fire after ball save
      if (TEST_MODE) {
        setTimeout(function() {
          plungerPower = 0.3 + Math.random() * 0.7;
          firePinball();
        }, 50);
      }
    }, saveDelay);
    return;
  }

  // Phase 3: End-of-ball bonus
  calculateEndOfBallBonus();

  gameState = 'drain';
  drainTimer = TEST_MODE ? 15 : 90;
  emitParticles(pinball.position.x, pinball.position.y, RED, 30, 8);
  shake = 10;
  sndDrain();
  Body.setStatic(pinball, true);
  Body.setPosition(pinball, { x: -200, y: -200 });
  Body.setVelocity(pinball, { x: 0, y: 0 });

  // Test mode: log ball drain
  if (TEST_MODE && testBallLaunched) {
    testData.ballLifetimes.push(testBallFrames);
    testData.totalBumperHits += testBallBumperHits;
    testData.totalSlingshotHits += testBallSlingshotHits;
    testBallLaunched = false;
  }
}

function pingBumper(bumperBody, ballBody) {
  const idx = bumperBody._bumperIndex;
  if (idx === undefined) return;
  const def = TABLE_BUMPERS[idx];

  // Phase 3: Use registerHit for combo scoring
  registerHit(POINTS.BUMPER, def.label.split('(')[1]?.replace(')', '') || 'BUMPER');
  bumperHitsThisBall++;

  bumperFlash[idx] = 1;
  bumperHitCount[idx]++;
  shake = 12;
  emitParticles(bumperBody.position.x, bumperBody.position.y, RED_GLOW, 15, 8);
  sndBumper();

  // Phase 2: Enhanced bumper directional kick
  const dx = ballBody.position.x - bumperBody.position.x;
  const dy = ballBody.position.y - bumperBody.position.y;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  Body.applyForce(ballBody, ballBody.position, { x: (dx/dist) * 0.08, y: (dy/dist) * 0.08 });

  if (TEST_MODE) testBallBumperHits++;
}

// ═══════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════

function renderFrame() {
  ctx.save();

  if (shake > 0.3) {
    ctx.translate((Math.random()-0.5)*shake*scale*0.5, (Math.random()-0.5)*shake*scale*0.5);
    shake *= SHAKE_DECAY;
  }

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (imageLoaded) {
    ctx.drawImage(tableImg, offX, offY, IMG_W * scale, IMG_H * scale);
  }

  if (gameState === 'attract') {
    renderAttract();
  } else {
    renderFlippers();
    renderBallShadow();
    renderBall();
    renderMultiballs();
    renderBumperFlash();
    renderParticles();
    renderScoreOverlay();
    if (gameState === 'launch') renderPlunger();
    if (gameState === 'drain' || gameState === 'gameover') renderOverlay();
  }

  if (debugPhysics) renderDebugOverlay();

  ctx.restore();
}

// ── ATTRACT ─────────────────────────────────────────────────
function renderAttract() {
  attractTimer++;
  const cx = canvas.width / 2, cy = canvas.height / 2;

  ctx.fillStyle = '#000'; ctx.globalAlpha = 0.6;
  ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.globalAlpha = 1;

  if (attractTimer % 3 === 0) emitParticles(rand(200, 1500), rand(200, 2000), RED_GLOW, 1, 1);

  ctx.globalCompositeOperation = 'lighter';
  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(px(p.x), py(p.y), ps(p.size * p.life), 0, Math.PI * 2);
    ctx.fillStyle = p.color; ctx.globalAlpha = p.life * 0.3; ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1;

  const pulse = 0.85 + Math.sin(attractTimer * 0.04) * 0.15;
  drawNeon('RIP CITY', cx, cy - ps(100), ps(120) * pulse, RED, RED_GLOW);
  drawNeon('PINBALL', cx, cy + ps(10), ps(95) * pulse, WHITE, RED_GLOW);

  const blink = Math.sin(attractTimer * 0.06) * 0.5 + 0.5;
  ctx.font = `bold ${ps(40)}px 'Oswald', sans-serif`;
  ctx.fillStyle = WHITE; ctx.textAlign = 'center';
  ctx.globalAlpha = 0.4 + blink * 0.6;
  ctx.fillText('PRESS SPACE TO PLAY', cx, cy + ps(200));
  ctx.globalAlpha = 1;

  ctx.font = `${ps(22)}px 'Oswald', sans-serif`;
  ctx.fillStyle = SILVER; ctx.globalAlpha = 0.35;
  ctx.fillText('Z / \u2190 = Left     M / \u2192 = Right     SPACE = Launch     Shift+D = Debug', cx, cy + ps(280));
  ctx.globalAlpha = 1;
}

// ── SCORE OVERLAY ───────────────────────────────────────────
function renderScoreOverlay() {
  const barH = ps(80), barX = offX, barW = IMG_W * scale;

  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(barX, offY, barW, barH);

  ctx.strokeStyle = RED; ctx.lineWidth = 2; ctx.globalAlpha = 0.4;
  ctx.beginPath(); ctx.moveTo(barX, offY + barH); ctx.lineTo(barX + barW, offY + barH); ctx.stroke();
  ctx.globalAlpha = 1;

  // Score
  ctx.font = `bold ${ps(55)}px 'Oswald', sans-serif`;
  ctx.fillStyle = RED; ctx.textAlign = 'center';
  ctx.shadowColor = RED_GLOW; ctx.shadowBlur = 15;
  ctx.fillText(score.toLocaleString().padStart(8, ' '), offX + barW / 2, offY + barH * 0.75);
  ctx.shadowBlur = 0;

  // Ball + layer indicator
  ctx.textAlign = 'left';
  ctx.font = `bold ${ps(22)}px 'Oswald', sans-serif`;
  ctx.fillStyle = SILVER;
  ctx.fillText('BALL ' + ballNum, barX + ps(15), offY + barH * 0.50);

  // Layer indicator (during play)
  if (gameState === 'play' || gameState === 'launch') {
    ctx.font = `${ps(16)}px 'Oswald', sans-serif`;
    ctx.fillStyle = LAYER_COLORS[ballLayer] || '#fff';
    ctx.fillText(ballLayer.toUpperCase(), barX + ps(15), offY + barH * 0.80);
  }

  // Combo indicator
  if (comboCount > 1 && comboTimer > 0) {
    ctx.textAlign = 'center';
    ctx.font = `bold ${ps(28)}px 'Oswald', sans-serif`;
    ctx.fillStyle = GOLD;
    const comboAlpha = Math.min(1, comboTimer / 30);
    ctx.globalAlpha = comboAlpha;
    ctx.fillText(comboCount + 'x COMBO', offX + barW / 2, offY + barH + ps(85));
    ctx.globalAlpha = 1;
  }

  // Ball save indicator
  if (ballSaveActive) {
    ctx.textAlign = 'right';
    ctx.font = `bold ${ps(20)}px 'Oswald', sans-serif`;
    ctx.fillStyle = '#00ff00';
    const saveAlpha = (ballSaveTimer % 30 < 15) ? 1 : 0.3;
    ctx.globalAlpha = saveAlpha;
    ctx.fillText('BALL SAVE', barX + barW - ps(15), offY + barH * 0.35);
    ctx.globalAlpha = 1;
  }

  // Multiball indicator
  if (isMultiball) {
    ctx.textAlign = 'right';
    ctx.font = `bold ${ps(24)}px 'Oswald', sans-serif`;
    ctx.fillStyle = GOLD;
    ctx.fillText('MULTIBALL x' + (multiballs.length + 1), barX + barW - ps(15), offY + barH * 0.50);
  }

  // High score
  ctx.textAlign = 'right';
  ctx.font = `${ps(18)}px 'Oswald', sans-serif`;
  ctx.fillStyle = SILVER; ctx.globalAlpha = 0.5;
  ctx.fillText('HI ' + highScore.toLocaleString(), barX + barW - ps(15), offY + barH * 0.80);
  ctx.globalAlpha = 1;

  // Hit message
  if (messageTimer > 0) {
    messageTimer--;
    ctx.textAlign = 'center';
    ctx.font = `bold ${ps(38)}px 'Oswald', sans-serif`;
    ctx.fillStyle = GOLD; ctx.globalAlpha = Math.min(1, messageTimer / 30);
    ctx.shadowColor = GOLD; ctx.shadowBlur = 10;
    ctx.fillText(lastMessage, offX + barW / 2, offY + barH + ps(50));
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  }
}

// ── BUMPER FLASH ────────────────────────────────────────────
function renderBumperFlash() {
  for (let i = 0; i < TABLE_BUMPERS.length; i++) {
    const flash = bumperFlash[i];
    if (flash > 0.05) {
      const body = bumperBodies[i];
      const cx_ = px(body.position.x), cy_ = py(body.position.y);
      const r = ps(TABLE_BUMPERS[i].r);

      // Phase 2: Enhanced bumper flash with screen blend
      ctx.globalCompositeOperation = 'screen';
      ctx.beginPath();
      ctx.arc(cx_, cy_, r * 1.3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 200, 50, ' + (flash * 0.7) + ')';
      ctx.fill();
      ctx.globalCompositeOperation = 'source-over';

      ctx.globalCompositeOperation = 'lighter';
      ctx.beginPath();
      ctx.arc(cx_, cy_, r + ps(30), 0, Math.PI * 2);
      const glow = ctx.createRadialGradient(cx_, cy_, r * 0.2, cx_, cy_, r + ps(30));
      glow.addColorStop(0, 'rgba(255,120,0,0.5)');
      glow.addColorStop(0.5, 'rgba(255,60,0,0.25)');
      glow.addColorStop(1, 'rgba(255,0,0,0)');
      ctx.fillStyle = glow; ctx.globalAlpha = flash; ctx.fill();
      ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1;
      bumperFlash[i] *= 0.92;
    }
  }
}

// ── FLIPPERS ────────────────────────────────────────────────
function renderFlippers() {
  if (!leftPaddle || !rightPaddle) return;

  [leftPaddle, rightPaddle].forEach((comp, idx) => {
    const hinge = idx === 0 ? LEFT_HINGE : RIGHT_HINGE;
    const angle = comp.angle;
    const flipLen = PADDLE_LEN - 20; // visual slightly shorter than physics
    const tipX = hinge.x + Math.cos(angle) * flipLen;
    const tipY = hinge.y + Math.sin(angle) * flipLen;

    const perpX = Math.cos(angle + Math.PI/2);
    const perpY = Math.sin(angle + Math.PI/2);
    const baseW = 28, tipW = 12;

    const p1x = hinge.x + perpX * baseW, p1y = hinge.y + perpY * baseW;
    const p2x = hinge.x - perpX * baseW, p2y = hinge.y - perpY * baseW;
    const p3x = tipX - perpX * tipW,     p3y = tipY - perpY * tipW;
    const p4x = tipX + perpX * tipW,     p4y = tipY + perpY * tipW;

    // Shadow
    ctx.beginPath();
    ctx.moveTo(px(p1x)+ps(3), py(p1y)+ps(4));
    ctx.lineTo(px(p4x)+ps(3), py(p4y)+ps(4));
    ctx.lineTo(px(p3x)+ps(3), py(p3y)+ps(4));
    ctx.lineTo(px(p2x)+ps(3), py(p2y)+ps(4));
    ctx.closePath();
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fill();

    // Chrome body
    ctx.beginPath();
    ctx.moveTo(px(p1x), py(p1y));
    ctx.lineTo(px(p4x), py(p4y));
    ctx.lineTo(px(p3x), py(p3y));
    ctx.lineTo(px(p2x), py(p2y));
    ctx.closePath();

    const flipGrad = ctx.createLinearGradient(px(p1x), py(p1y), px(p2x), py(p2y));
    flipGrad.addColorStop(0, '#d0d0d0');
    flipGrad.addColorStop(0.3, '#f0f0f0');
    flipGrad.addColorStop(0.5, '#ffffff');
    flipGrad.addColorStop(0.7, '#e0e0e0');
    flipGrad.addColorStop(1, '#999');
    ctx.fillStyle = flipGrad; ctx.fill();
    ctx.strokeStyle = '#666'; ctx.lineWidth = ps(2); ctx.stroke();

    // Pivot cap
    ctx.beginPath();
    ctx.arc(px(hinge.x), py(hinge.y), ps(14), 0, Math.PI * 2);
    ctx.fillStyle = '#333'; ctx.fill();
    ctx.strokeStyle = '#777'; ctx.lineWidth = ps(2); ctx.stroke();
    ctx.beginPath();
    ctx.arc(px(hinge.x), py(hinge.y), ps(5), 0, Math.PI * 2);
    ctx.fillStyle = '#666'; ctx.fill();
  });
}

// ── BALL SHADOW ─────────────────────────────────────────────
function renderBallShadow() {
  if (!pinball || pinball.isStatic) return;
  if (gameState === 'drain' || gameState === 'gameover' || gameState === 'attract') return;
  const sx = px(pinball.position.x) + ps(4);
  const sy = py(pinball.position.y) + ps(4);
  const r = ps(BALL_RADIUS);
  const grad = ctx.createRadialGradient(sx, sy, r*0.2, sx, sy, r*1.2);
  grad.addColorStop(0, 'rgba(0,0,0,0.3)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(sx, sy, r * 1.2, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
}

// ── BALL ────────────────────────────────────────────────────
function drawBallAt(bx, by) {
  const sx = px(bx), sy = py(by), r = ps(BALL_RADIUS);

  // Shadow
  ctx.beginPath();
  ctx.arc(sx + ps(3), sy + ps(3), r, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fill();

  // Basketball body
  const bg = ctx.createRadialGradient(sx - r*0.3, sy - r*0.3, 0, sx, sy, r);
  bg.addColorStop(0, '#F5A623');
  bg.addColorStop(0.6, '#E8851C');
  bg.addColorStop(1, '#A85A10');
  ctx.beginPath();
  ctx.arc(sx, sy, r, 0, Math.PI * 2);
  ctx.fillStyle = bg; ctx.fill();

  // Seams
  ctx.save();
  ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.clip();
  ctx.strokeStyle = '#5a3010'; ctx.lineWidth = ps(1.2); ctx.globalAlpha = 0.6;
  ctx.beginPath(); ctx.moveTo(sx - r, sy); ctx.lineTo(sx + r, sy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx, sy - r); ctx.lineTo(sx, sy + r); ctx.stroke();
  ctx.beginPath(); ctx.arc(sx - r*0.3, sy, r*0.7, -Math.PI*0.4, Math.PI*0.4); ctx.stroke();
  ctx.beginPath(); ctx.arc(sx + r*0.3, sy, r*0.7, Math.PI*0.6, Math.PI*1.4); ctx.stroke();
  ctx.restore();

  // Highlight
  ctx.beginPath();
  ctx.arc(sx - r*0.25, sy - r*0.25, r*0.35, 0, Math.PI * 2);
  ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.25; ctx.fill();
  ctx.globalAlpha = 1;
}

function renderBall() {
  if (!pinball || pinball.isStatic) return;
  if (gameState === 'drain' || gameState === 'gameover' || gameState === 'attract') return;

  // Trail
  if (gameState === 'play') {
    trail.push({ x: pinball.position.x, y: pinball.position.y });
    if (trail.length > TRAIL_LEN) trail.shift();
  }

  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < trail.length; i++) {
    const t = trail[i];
    const r = ps(BALL_RADIUS * (i / trail.length) * 0.8);
    ctx.beginPath();
    ctx.arc(px(t.x), py(t.y), r, 0, Math.PI * 2);
    ctx.fillStyle = '#FF8C00'; ctx.globalAlpha = (i / trail.length) * 0.4; ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1;

  drawBallAt(pinball.position.x, pinball.position.y);
}

function renderMultiballs() {
  for (const mb of multiballs) {
    drawBallAt(mb.position.x, mb.position.y);
  }
}

// ── PLUNGER ─────────────────────────────────────────────────
// Phase 4: Enhanced plunger visual
function renderPlunger() {
  const cx_ = offX + IMG_W * scale / 2;
  ctx.textAlign = 'center';
  ctx.font = `bold ${ps(45)}px 'Oswald', sans-serif`;
  ctx.fillStyle = WHITE;
  ctx.globalAlpha = 0.4 + Math.sin(Date.now() * 0.005) * 0.3;
  ctx.fillText('HOLD SPACE TO LAUNCH', cx_, py(1200));
  ctx.globalAlpha = 1;

  if (plungerPower > 0) {
    const mW = ps(20), mH = ps(300);
    const mX = px(1680), mY = py(1600);

    // Background
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(mX - mW/2, mY, mW, mH);

    // Fill (red gradient)
    const fillH = mH * plungerPower;
    const grad = ctx.createLinearGradient(0, mY + mH - fillH, 0, mY + mH);
    grad.addColorStop(0, '#FF2244');
    grad.addColorStop(1, '#C8102E');
    ctx.fillStyle = grad;
    ctx.fillRect(mX - mW/2 + 2, mY + mH - fillH, mW - 4, fillH);

    // Border
    ctx.strokeStyle = '#A2AAAD';
    ctx.lineWidth = 2;
    ctx.strokeRect(mX - mW/2, mY, mW, mH);
  }
}

// ── OVERLAY ─────────────────────────────────────────────────
function renderOverlay() {
  const cx_ = offX + IMG_W * scale / 2;
  const cy_ = py(1100);

  ctx.fillStyle = '#000'; ctx.globalAlpha = 0.55;
  ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.globalAlpha = 1;

  if (gameState === 'gameover') {
    drawNeon('GAME OVER', cx_, cy_ - ps(40), ps(80), RED, RED_GLOW);
    ctx.font = `bold ${ps(50)}px 'Oswald', sans-serif`;
    ctx.fillStyle = GOLD; ctx.textAlign = 'center';
    ctx.fillText(score.toLocaleString() + ' PTS', cx_, cy_ + ps(60));
    const blink = Math.sin(Date.now() * 0.005) * 0.5 + 0.5;
    ctx.font = `${ps(30)}px 'Oswald', sans-serif`;
    ctx.fillStyle = WHITE; ctx.globalAlpha = 0.3 + blink * 0.5;
    ctx.fillText('PRESS SPACE', cx_, cy_ + ps(140));
    ctx.globalAlpha = 1;
  }
}

// ── PARTICLES ───────────────────────────────────────────────
function renderParticles() {
  ctx.globalCompositeOperation = 'lighter';
  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(px(p.x), py(p.y), ps(p.size * p.life), 0, Math.PI * 2);
    ctx.fillStyle = p.color; ctx.globalAlpha = p.life * 0.7; ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1;
}

// ── NEON TEXT ────────────────────────────────────────────────
function drawNeon(text, x, y, size, color, glowColor) {
  ctx.save();
  ctx.font = `bold ${size}px 'Oswald', sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = size * 0.6; ctx.fillStyle = glowColor; ctx.globalAlpha = 0.25; ctx.fillText(text, x, y);
  ctx.shadowBlur = size * 0.3; ctx.globalAlpha = 0.5; ctx.fillText(text, x, y);
  ctx.shadowBlur = 0; ctx.fillStyle = color; ctx.globalAlpha = 1; ctx.fillText(text, x, y);
  ctx.fillStyle = WHITE; ctx.globalAlpha = 0.3; ctx.fillText(text, x, y);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// DEBUG OVERLAY (Shift+D)
// Shows all physics bodies with labels and layer colors
// ═══════════════════════════════════════════════════════════════

let debugPhysics = false;
// Layer filter for debug: null = show all, or a layer name string
let debugLayerFilter = null;
const DEBUG_LAYER_KEYS = ['always', 'playfield', 'left_ramp', 'right_ramp', 'launcher'];

document.addEventListener('keydown', e => {
  if (e.code === 'KeyD' && e.shiftKey) debugPhysics = !debugPhysics;
  // Number keys 1-5 toggle layer filter while in debug mode
  if (debugPhysics) {
    const keyNum = parseInt(e.key);
    if (keyNum >= 1 && keyNum <= 5) {
      const layer = DEBUG_LAYER_KEYS[keyNum - 1];
      debugLayerFilter = (debugLayerFilter === layer) ? null : layer;
    }
    if (e.code === 'Digit0') debugLayerFilter = null; // 0 = show all
  }
});

function renderDebugOverlay() {
  ctx.save();

  // Draw all labeled wall bodies (filtered by debugLayerFilter)
  for (const body of allWallBodies) {
    // Layer filter: skip bodies not matching the active filter
    if (debugLayerFilter && body._layer !== debugLayerFilter) continue;

    const color = body._debugColor || '#0ff';
    const parts = body.parts.length > 1 ? body.parts.slice(1) : [body];

    for (const part of parts) {
      const verts = part.vertices;
      if (!verts || verts.length < 3) continue;

      ctx.beginPath();
      ctx.moveTo(px(verts[0].x), py(verts[0].y));
      for (let i = 1; i < verts.length; i++) ctx.lineTo(px(verts[i].x), py(verts[i].y));
      ctx.closePath();
      ctx.fillStyle = color; ctx.globalAlpha = 0.15; ctx.fill();
      ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.6; ctx.stroke();
    }

    // Label
    if (body._label) {
      const lx = px(body.position.x);
      const ly = py(body.position.y);
      ctx.font = `${ps(14)}px system-ui`;
      ctx.fillStyle = color; ctx.globalAlpha = 0.9;
      ctx.textAlign = 'center';
      ctx.fillText(body._label, lx, ly - ps(8));
      ctx.font = `${ps(10)}px system-ui`;
      ctx.globalAlpha = 0.6;
      ctx.fillText('[' + (body._layer || '?') + ']', lx, ly + ps(6));
    }
  }

  // Draw trigger zones
  for (const t of TRIGGERS) {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.4;
    ctx.setLineDash([6, 4]);
    ctx.strokeRect(px(t.x), py(t.y), ps(t.w), ps(t.h));
    ctx.setLineDash([]);

    // Label
    ctx.font = `bold ${ps(14)}px system-ui`;
    ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.8;
    ctx.textAlign = 'center';
    ctx.fillText(t.label, px(t.x + t.w/2), py(t.y + t.h/2) - ps(4));
    ctx.font = `${ps(11)}px system-ui`;
    ctx.globalAlpha = 0.5;
    ctx.fillText(t.from + ' → ' + t.to + ' (' + t.dir + ')', px(t.x + t.w/2), py(t.y + t.h/2) + ps(10));
  }

  // Ball info
  if (pinball && !pinball.isStatic) {
    const bx = px(pinball.position.x), by = py(pinball.position.y);
    ctx.beginPath();
    ctx.arc(bx, by, ps(BALL_RADIUS + 5), 0, Math.PI * 2);
    ctx.strokeStyle = '#f0f'; ctx.lineWidth = 2; ctx.globalAlpha = 0.8; ctx.stroke();

    ctx.font = `bold ${ps(14)}px system-ui`;
    ctx.fillStyle = '#f0f'; ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
    ctx.fillText('Layer: ' + ballLayer, bx + ps(20), by - ps(10));
    ctx.fillText('Pos: ' + Math.round(pinball.position.x) + ', ' + Math.round(pinball.position.y), bx + ps(20), by + ps(6));
    ctx.fillText('Vel: ' + Math.round(pinball.velocity.x) + ', ' + Math.round(pinball.velocity.y), bx + ps(20), by + ps(22));
  }

  // Layer legend with key bindings
  ctx.textAlign = 'left';
  ctx.font = `bold ${ps(16)}px system-ui`;
  let ly = offY + ps(20);
  // Header
  ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.9;
  ctx.fillText('LAYERS (press # to filter, 0=all):', offX + ps(10), ly);
  ly += ps(24);
  const layerNames = Object.entries(LAYER_COLORS);
  layerNames.forEach(([name, color], i) => {
    const isActive = debugLayerFilter === null || debugLayerFilter === name;
    const isFiltered = debugLayerFilter === name;
    ctx.globalAlpha = isActive ? 0.9 : 0.2;
    ctx.fillStyle = color;
    ctx.fillRect(offX + ps(10), ly - ps(10), ps(14), ps(14));
    ctx.fillText((i+1) + ': ' + name + (isFiltered ? ' ◀' : ''), offX + ps(30), ly);
    ly += ps(22);
  });

  ctx.globalAlpha = 1;
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// UPDATE LOOP
// ═══════════════════════════════════════════════════════════════

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.15;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function update() {
  if (plungerCharging && gameState === 'launch') {
    plungerPower = Math.min(1, plungerPower + 0.018);
  }
  if (gameState === 'drain') {
    drainTimer--;
    if (drainTimer <= 0) {
      if (ballNum >= totalBalls) {
        gameState = 'gameover';
        highScore = Math.max(score, highScore);
        // Test mode: end of game
        if (TEST_MODE) {
          testRound++;
          testData.rounds.push({
            round: testRound,
            score: score,
            bumperHits: testBallBumperHits,
            slingshotHits: testBallSlingshotHits,
          });
          if (testRound >= TEST_ROUNDS) {
            finishTest();
          } else {
            // Start next game after brief delay
            setTimeout(function() {
              startGame();
              // Auto-launch after starting
              setTimeout(function() {
                plungerPower = 0.3 + Math.random() * 0.7;
                firePinball();
              }, 50);
            }, 50);
          }
        }
      } else {
        ballNum++;
        trail = [];
        launchPinball();
        // Test mode: auto-launch next ball
        if (TEST_MODE) {
          setTimeout(function() {
            plungerPower = 0.3 + Math.random() * 0.7;
            firePinball();
          }, 50);
        }
      }
    }
  }
  updateParticles();

  // Test mode: random flipper toggling
  if (TEST_MODE && gameState === 'play') {
    testFlipperTimer++;
    if (testFlipperTimer >= testFlipperInterval) {
      testFlipperTimer = 0;
      testFlipperInterval = 100 + Math.floor(Math.random() * 200);
      // Randomly toggle flippers
      if (Math.random() < 0.5) isLeftPaddleUp = !isLeftPaddleUp;
      if (Math.random() < 0.5) isRightPaddleUp = !isRightPaddleUp;
    }
  }
}

function gameLoop() {
  resize();
  update();
  renderFrame();
  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════════════════════════
// TEST HARNESS
// ═══════════════════════════════════════════════════════════════

function finishTest() {
  const avgLifetime = testData.ballLifetimes.length > 0
    ? Math.round(testData.ballLifetimes.reduce((a,b) => a+b, 0) / testData.ballLifetimes.length)
    : 0;
  const minLifetime = testData.ballLifetimes.length > 0
    ? Math.min(...testData.ballLifetimes)
    : 0;
  const maxLifetime = testData.ballLifetimes.length > 0
    ? Math.max(...testData.ballLifetimes)
    : 0;

  const results = {
    totalRounds: testRound,
    criticalFailures: testData.totalCriticalFailures,
    tunnelingIncidents: testData.tunnelingIncidents,
    stuckIncidents: testData.stuckIncidents,
    jsErrors: testData.jsErrors,
    totalBumperHits: testData.totalBumperHits,
    totalSlingshotHits: testData.totalSlingshotHits,
    maxSpeedSeen: Math.round(testData.maxSpeedSeen * 100) / 100,
    avgBallLifetime: avgLifetime,
    minBallLifetime: minLifetime,
    maxBallLifetime: maxLifetime,
    totalBalls: testData.ballLifetimes.length,
    passed: testData.totalCriticalFailures === 0,
  };

  const el = document.getElementById('test-results');
  el.style.display = 'block';
  el.textContent = JSON.stringify(results, null, 2);
  el.setAttribute('data-complete', 'true');
  console.log('[TEST] Complete:', JSON.stringify(results));
}

// ═══════════════════════════════════════════════════════════════
// INITIALIZE
// ═══════════════════════════════════════════════════════════════

function startEngine() {
  init();
  const runner = Runner.create();
  Runner.run(runner, engine);
  gameLoop();

  // Test mode: auto-start game
  if (TEST_MODE) {
    setTimeout(function() {
      startGame();
      // Auto-launch quickly
      setTimeout(function() {
        plungerPower = 0.3 + Math.random() * 0.7;
        firePinball();
      }, 100);
    }, 100);
  }
}

tableImg.onload = function() {
  imageLoaded = true;
  startEngine();
};

tableImg.onerror = function() {
  console.error('Failed to load table.png — starting without image');
  startEngine();
};
</script>
