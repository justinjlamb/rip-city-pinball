<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RIP CITY PINBALL v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; }

<body>
<canvas id="G"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// RIP CITY PINBALL v2 — Walls from mask contour (wall-data.json)
// Table: table-layer0.png (1694 × 2376)
// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('G');
const ctx = canvas.getContext('2d');

const tableImg = new Image();
tableImg.src = 'table-layer0.png';
let imageLoaded = false;
tableImg.onload = () => { imageLoaded = true; };

const IMG_W = 1694, IMG_H = 2376;

// ── CONSTANTS ───────────────────────────────────────────────
const BALL_RADIUS = 24;
const PADDLE_LEN = 260;
const PADDLE_WIDTH = 30;
const FLIP_REST = 0.5;
const FLIP_ACTIVE = -0.5;
const FLIP_UP_SPEED = 0.35;
const FLIP_DN_SPEED = 0.12;
const WALL_T = 8;
const MAX_SPEED = 38;

// Drain gap: vertices 63→64 (the opening where ball exits)
const DRAIN_VERTEX_A = 63;
const DRAIN_VERTEX_B = 64;

// ── COLLISION CATEGORIES ────────────────────────────────────
const COL = {
  BALL:      0x0001,
  PLAYFIELD: 0x0002,
};

// ── MATTER.JS ───────────────────────────────────────────────
const { Engine, World, Bodies, Body, Composite, Events } = Matter;

const engine = Engine.create();
engine.gravity.y = 1.0;
engine.positionIterations = 30;
engine.velocityIterations = 10;
const world = engine.world;

// ── AUDIO ───────────────────────────────────────────────────
let audioCtx;
let audioReady = false;

function initAudio() {
  if (audioCtx) {
    if (audioCtx.state === 'suspended') {
      audioCtx.resume().then(() => { audioReady = true; });
    }
    return;
  }
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioReady = audioCtx.state === 'running';
    if (!audioReady) {
      audioCtx.resume().then(() => { audioReady = true; });
    }
  } catch(e) {}
}

// Safari requires audio init from multiple gesture types
document.addEventListener('click', initAudio, { once: false });
document.addEventListener('keydown', initAudio, { once: false });
document.addEventListener('touchstart', initAudio, { once: false });

function playTone(freq, dur, type, vol) {
  if (!audioCtx || !audioReady) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol || 0.08, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

function sndBumper()  { playTone(660, 0.08, 'square', 0.1); playTone(880, 0.06, 'sine', 0.06); }
function sndSling()   { playTone(550, 0.06, 'square', 0.08); playTone(770, 0.05, 'sine', 0.05); }
function sndFlipper() { playTone(220, 0.04, 'triangle', 0.05); }
function sndLaunch()  { playTone(110, 0.3, 'sawtooth', 0.06); setTimeout(() => playTone(440, 0.1, 'sine', 0.08), 200); }
function sndDrain()   { playTone(200, 0.15, 'sine', 0.08); setTimeout(() => playTone(150, 0.2, 'sine', 0.06), 100); setTimeout(() => playTone(100, 0.3, 'sine', 0.06), 200); }

// ── STATE ───────────────────────────────────────────────────
let gameState = 'attract';
let ballNum = 0, totalBalls = 3;
let plungerPower = 0, plungerCharging = false;
let isLeftUp = false, isRightUp = false;
let leftAngle = FLIP_REST, rightAngle = FLIP_REST;
let ball;
let drainTimer = 0;
let stuckFrames = 0;
const SLING_FRONT_DEBUG = new Set();

// ── SCORING ─────────────────────────────────────────────────
let score = 0;
let highScore = 0;
let lastMessage = '';
let messageTimer = 0;

const POINTS = {
  BUMPER: 1000,
  SLINGSHOT: 500,
  LAUNCH: 100,
  RAMP: 5000,
};

function addScore(pts, label) {
  score += pts;
  lastMessage = label + ' +' + pts.toLocaleString();
  messageTimer = 90; // 1.5 sec
}

// Loaded from wall-data.json
let LEFT_HINGE = { x: 520, y: 2138 };
let RIGHT_HINGE = { x: 1064, y: 2136 };
let BALL_START = { x: 1535, y: 2100 };

// ── SCALING ─────────────────────────────────────────────────
let scale = 1, offX = 0, offY = 0;
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  scale = Math.min(canvas.width / IMG_W, canvas.height / IMG_H);
  offX = (canvas.width - IMG_W * scale) / 2;
  offY = (canvas.height - IMG_H * scale) / 2;
}
window.addEventListener('resize', resize);
resize();

function px(x) { return offX + x * scale; }
function py(y) { return offY + y * scale; }
function ps(s) { return s * scale; }

// ═══════════════════════════════════════════════════════════════
// WALL LOADING FROM JSON
// ═══════════════════════════════════════════════════════════════

function createWall(x1, y1, x2, y2, label, colCategory) {
  const cx = (x1 + x2) / 2, cy = (y1 + y2) / 2;
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 1) return;
  const ang = Math.atan2(dy, dx);
  const cat = colCategory || COL.PLAYFIELD;
  const w = Bodies.rectangle(cx, cy, len, WALL_T, {
    isStatic: true, angle: ang, label: label || 'wall',
    friction: 0.3, restitution: 0.4,
    collisionFilter: { category: cat, mask: COL.BALL },
  });
  World.add(world, w);
}

const BUMPER_RADIUS = 40;
const BUMPER_FORCE = 20;
const bumperBodies = [];

function createBumper(x, y) {
  const b = Bodies.circle(x, y, BUMPER_RADIUS, {
    isStatic: true, label: 'bumper',
    friction: 0, restitution: 0.5,
    collisionFilter: { category: COL.PLAYFIELD, mask: COL.BALL },
  });
  World.add(world, b);
  bumperBodies.push(b);
}

// ── SCOOP (multiball trigger) ────────────────────────────────
const SCOOP_RADIUS = 35;
let scoopBody = null;
let multiballs = [];       // extra ball bodies during multiball
let isMultiball = false;
let scoopCooldown = 0;     // prevent re-triggering immediately

function createScoop(x, y) {
  // Sensor — detects contact but doesn't physically block the ball
  scoopBody = Bodies.circle(x, y, SCOOP_RADIUS, {
    isStatic: true, isSensor: true, label: 'scoop',
    collisionFilter: { category: COL.PLAYFIELD, mask: COL.BALL },
  });
  World.add(world, scoopBody);
}

function triggerMultiball() {
  if (isMultiball || scoopCooldown > 0) return;
  isMultiball = true;
  scoopCooldown = 300; // 5 sec cooldown

  // Spawn 2 extra balls from the scoop position, fired in different directions
  for (let i = 0; i < 2; i++) {
    const mb = Bodies.circle(scoopBody.position.x, scoopBody.position.y, BALL_RADIUS, {
      label: 'ball', restitution: 0.3, friction: 0.05,
      density: 0.0025, frictionAir: 0.001,
      collisionFilter: { category: COL.BALL, mask: COL.PLAYFIELD },
    });
    const angle = -Math.PI / 2 + (i === 0 ? -0.6 : 0.6); // fan out left and right
    Body.setVelocity(mb, { x: Math.cos(angle) * 22, y: Math.sin(angle) * 22 });
    World.add(world, mb);
    multiballs.push(mb);
  }

  sndMultiball();
  addScore(10000, 'MULTIBALL!');
}

function sndMultiball() {
  playTone(523, 0.1, 'square', 0.12);
  setTimeout(() => playTone(659, 0.1, 'square', 0.1), 100);
  setTimeout(() => playTone(784, 0.15, 'square', 0.12), 200);
}

// ── RAMP (scripted path — ball is animated along bezier, not physics-guided) ──
const RAMP = {
  entrance: { x: 750, y: 1300 },
  control:  { x: 800, y: 300 },
  exit:     { x: 1150, y: 700 },
  width: 180,
  segments: 16,
  duration: 90,
  points: 5000,
  minSpeed: 3,   // low threshold for testing
};

let rampAnimating = false;
let rampT = 0;
let rampBall = null;
let rampRailPoints = [];

function bezierPoint(t, p0, cp, p1) {
  const a = 1 - t;
  return {
    x: a * a * p0.x + 2 * a * t * cp.x + t * t * p1.x,
    y: a * a * p0.y + 2 * a * t * cp.y + t * t * p1.y,
  };
}

function bezierNormal(t, p0, cp, p1) {
  const tx = 2 * (1 - t) * (cp.x - p0.x) + 2 * t * (p1.x - cp.x);
  const ty = 2 * (1 - t) * (cp.y - p0.y) + 2 * t * (p1.y - cp.y);
  const len = Math.sqrt(tx * tx + ty * ty) || 1;
  return { x: -ty / len, y: tx / len };
}

function createRamp() {
  const { entrance, control, exit, width, segments } = RAMP;
  const halfW = width / 2;
  const leftRail = [];
  const rightRail = [];

  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const pt = bezierPoint(t, entrance, control, exit);
    const n = bezierNormal(t, entrance, control, exit);
    leftRail.push({ x: pt.x + n.x * halfW, y: pt.y + n.y * halfW });
    rightRail.push({ x: pt.x - n.x * halfW, y: pt.y - n.y * halfW });
  }

  rampRailPoints = { left: leftRail, right: rightRail };

  // Entrance sensor only — no physics walls, no exit sensor
  const eSensor = Bodies.circle(entrance.x, entrance.y, 60, {
    isStatic: true, isSensor: true, label: 'ramp-entrance',
    collisionFilter: { category: COL.PLAYFIELD, mask: COL.BALL },
  });
  World.add(world, eSensor);

  console.log(`Ramp: scripted path, entrance (${entrance.x},${entrance.y}), exit (${exit.x},${exit.y})`);
}

function renderRamp() {
  if (!rampRailPoints.left) return;
  const { left, right } = rampRailPoints;
  const active = rampAnimating;

  // Ramp surface
  ctx.beginPath();
  ctx.moveTo(px(left[0].x), py(left[0].y));
  for (let i = 1; i < left.length; i++) ctx.lineTo(px(left[i].x), py(left[i].y));
  for (let i = right.length - 1; i >= 0; i--) ctx.lineTo(px(right[i].x), py(right[i].y));
  ctx.closePath();
  ctx.fillStyle = active ? 'rgba(200, 16, 46, 0.25)' : 'rgba(200, 16, 46, 0.15)';
  ctx.fill();

  // Rails
  ctx.strokeStyle = active ? 'rgba(255, 215, 0, 0.8)' : 'rgba(200, 200, 200, 0.6)';
  ctx.lineWidth = ps(4);
  ctx.beginPath();
  ctx.moveTo(px(left[0].x), py(left[0].y));
  for (let i = 1; i < left.length; i++) ctx.lineTo(px(left[i].x), py(left[i].y));
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(px(right[0].x), py(right[0].y));
  for (let i = 1; i < right.length; i++) ctx.lineTo(px(right[i].x), py(right[i].y));
  ctx.stroke();

  // Entrance marker
  ctx.beginPath();
  ctx.arc(px(RAMP.entrance.x), py(RAMP.entrance.y), ps(15), 0, Math.PI * 2);
  ctx.strokeStyle = !active ? 'rgba(0,255,0,0.5)' : 'rgba(100,100,100,0.3)';
  ctx.lineWidth = ps(2);
  ctx.stroke();

  // Exit marker
  ctx.beginPath();
  ctx.arc(px(RAMP.exit.x), py(RAMP.exit.y), ps(15), 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,100,0,0.5)';
  ctx.lineWidth = ps(2);
  ctx.stroke();
}

function createCornerCircle(x, y) {
  const c = Bodies.circle(x, y, WALL_T / 2, {
    isStatic: true, label: 'corner',
    friction: 0.3, restitution: 0.4,
    collisionFilter: { category: COL.PLAYFIELD, mask: COL.BALL },
  });
  World.add(world, c);
}

async function loadWalls() {
  const resp = await fetch('wall-data.json');
  const data = await resp.json();

  // Set positions from JSON
  LEFT_HINGE = data.flipperLeft;
  RIGHT_HINGE = data.flipperRight;
  BALL_START = data.ballStart;

  // Create wall segments, skipping the drain gap
  const walls = data.walls;
  const vertices = data.vertices;

  for (let i = 0; i < walls.length; i++) {
    // Skip the drain opening (segment from vertex DRAIN_VERTEX_A to DRAIN_VERTEX_B)
    if (i === DRAIN_VERTEX_A) continue;

    const [x1, y1, x2, y2] = walls[i];
    createWall(x1, y1, x2, y2, 'w-' + i);
  }

  // Corner circles at each vertex to fill gaps between wall segments
  for (let i = 0; i < vertices.length; i++) {
    // Skip drain gap vertices (don't plug the drain)
    if (i === DRAIN_VERTEX_A || i === DRAIN_VERTEX_B) continue;
    createCornerCircle(vertices[i][0], vertices[i][1]);
  }

  // Interior walls (slingshot triangles, outlane rails)
  // Holes 1-2 are slingshots (0-23, 24-47), holes 3-4 are outlane regions (48+)
  if (data.interiorWalls) {
    for (let i = 0; i < data.interiorWalls.length; i++) {
      const [x1, y1, x2, y2] = data.interiorWalls[i];
      const label = i < 48 ? 'sling-' + i : 'int-' + i;
      createWall(x1, y1, x2, y2, label);
    }
  }
  if (data.interiorVertices) {
    for (const [x, y] of data.interiorVertices) {
      createCornerCircle(x, y);
    }
  }

  const intCount = data.interiorWalls ? data.interiorWalls.length : 0;
  console.log(`Loaded ${walls.length - 1} outer + ${intCount} interior walls`);
  console.log(`Flipper L: (${LEFT_HINGE.x}, ${LEFT_HINGE.y})`);
  console.log(`Flipper R: (${RIGHT_HINGE.x}, ${RIGHT_HINGE.y})`);
  console.log(`Ball start: (${BALL_START.x}, ${BALL_START.y})`);

  // Create flippers after positions are loaded
  createFlippers();

  // Bumpers — three circular pop bumpers in triangle formation
  // Positioned in the upper-mid playfield around the logo area
  createBumper(650, 750);   // upper left
  createBumper(950, 750);   // upper right
  createBumper(800, 1000);  // lower center

  // Scoop — sensor zone that triggers multiball
  // Upper-center, above the bumpers. Ball must approach from the left/below.
  createScoop(800, 480);
  // Shield wall on right side of scoop — blocks launcher exit from dropping straight in
  createWall(850, 380, 880, 550, 'scoop-shield');

  // ── RAMP (left side, curves up and across to right) ───────
  createRamp();

  // Slingshot bounce: when ball hits a sling wall, fire it away
  const SLING_LEFT_CENTER = { x: 383, y: 1780 };
  const SLING_RIGHT_CENTER = { x: 1186, y: 1807 };
  const SLING_FORCE = 18;

  // Front-facing sling walls only (inner face, excluding bottom hook)
  // Left sling: walls 0-5 (stops before bottom curve at y≈1900)
  // Right sling: walls 41-47 (stops before bottom curve at y≈1900)
  for (let i = 0; i <= 5; i++) SLING_FRONT_DEBUG.add('sling-' + i);
  for (let i = 41; i <= 47; i++) SLING_FRONT_DEBUG.add('sling-' + i);

  Events.on(engine, 'collisionStart', event => {
    for (const pair of event.pairs) {
      const a = pair.bodyA, b = pair.bodyB;
      const ballBody = a.label === 'ball' ? a : b.label === 'ball' ? b : null;
      const otherBody = ballBody === a ? b : a;

      if (!ballBody) continue;

      // Slingshot hit (front face only)
      if (SLING_FRONT_DEBUG.has(otherBody.label)) {
        const slingIdx = parseInt(otherBody.label.split('-')[1]);
        const center = slingIdx < 24 ? SLING_LEFT_CENTER : SLING_RIGHT_CENTER;
        const dx = ballBody.position.x - center.x;
        const dy = ballBody.position.y - center.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        Body.setVelocity(ballBody, {
          x: (dx / dist) * SLING_FORCE,
          y: (dy / dist) * SLING_FORCE
        });
        sndSling();
        addScore(POINTS.SLINGSHOT, 'SLINGSHOT');
      }

      // Scoop hit — trigger multiball
      if (otherBody.label === 'scoop') {
        triggerMultiball();
      }

      // Bumper hit — pop the ball away from bumper center
      if (otherBody.label === 'bumper') {
        const dx = ballBody.position.x - otherBody.position.x;
        const dy = ballBody.position.y - otherBody.position.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        Body.setVelocity(ballBody, {
          x: (dx / dist) * BUMPER_FORCE,
          y: (dy / dist) * BUMPER_FORCE
        });
        sndBumper();
        addScore(POINTS.BUMPER, 'BUMPER');
      }

      // Ramp entrance — remove ball from physics, start scripted animation
      if (otherBody.label === 'ramp-entrance' && !rampAnimating) {
        const spd = Math.sqrt(ballBody.velocity.x ** 2 + ballBody.velocity.y ** 2);
        if (ballBody.velocity.y < -3 && spd > RAMP.minSpeed) {
          rampAnimating = true;
          rampT = 0;
          rampBall = ballBody;
          World.remove(world, ballBody);
          sndSling();
        }
      }
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// FLIPPERS
// ═══════════════════════════════════════════════════════════════

let leftPaddle, rightPaddle;

function createFlippers() {
  leftPaddle = Bodies.rectangle(
    LEFT_HINGE.x, LEFT_HINGE.y, PADDLE_LEN, PADDLE_WIDTH,
    { isStatic: true, label: 'left-flipper', chamfer: { radius: PADDLE_WIDTH / 2 },
      friction: 0.8, restitution: 0.1,
      collisionFilter: { category: COL.PLAYFIELD, mask: COL.BALL } }
  );
  rightPaddle = Bodies.rectangle(
    RIGHT_HINGE.x, RIGHT_HINGE.y, PADDLE_LEN, PADDLE_WIDTH,
    { isStatic: true, label: 'right-flipper', chamfer: { radius: PADDLE_WIDTH / 2 },
      friction: 0.8, restitution: 0.1,
      collisionFilter: { category: COL.PLAYFIELD, mask: COL.BALL } }
  );
  World.add(world, [leftPaddle, rightPaddle]);
}

function positionFlipper(body, hinge, angle) {
  const halfLen = PADDLE_LEN / 2;
  Body.setAngle(body, angle, true);
  Body.setPosition(body, {
    x: hinge.x + Math.cos(angle) * halfLen,
    y: hinge.y + Math.sin(angle) * halfLen
  }, true);
}

// ═══════════════════════════════════════════════════════════════
// BALL
// ═══════════════════════════════════════════════════════════════

function createBall(x, y) {
  return Bodies.circle(x, y, BALL_RADIUS, {
    label: 'ball', restitution: 0.3, friction: 0.05,
    density: 0.0025, frictionAir: 0.001,
    collisionFilter: { category: COL.BALL, mask: COL.PLAYFIELD },
  });
}

// ═══════════════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════════════

document.addEventListener('keydown', e => {
  if (e.key === 'z' || e.key === 'Z' || e.key === 'ArrowLeft') { if (!isLeftUp) sndFlipper(); isLeftUp = true; }
  if (e.key === 'm' || e.key === 'M' || e.key === 'ArrowRight') { if (!isRightUp) sndFlipper(); isRightUp = true; }
  if (e.key === ' ') {
    e.preventDefault();
    if (gameState === 'attract') startGame();
    else if (gameState === 'launch') plungerCharging = true;
  }
  if (e.key === 'Enter' && gameState === 'attract') startGame();
});

document.addEventListener('keyup', e => {
  if (e.key === 'z' || e.key === 'Z' || e.key === 'ArrowLeft') isLeftUp = false;
  if (e.key === 'm' || e.key === 'M' || e.key === 'ArrowRight') isRightUp = false;
  if (e.key === ' ' && plungerCharging) {
    e.preventDefault();
    launchBall();
  }
});

// Touch: left half = left flipper, right half = right flipper
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameState === 'attract') { startGame(); return; }
  if (gameState === 'launch') { plungerCharging = true; return; }
  for (const t of e.changedTouches) {
    if (t.clientX < canvas.width / 2) isLeftUp = true;
    else isRightUp = true;
  }
});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (plungerCharging) { launchBall(); return; }
  for (const t of e.changedTouches) {
    if (t.clientX < canvas.width / 2) isLeftUp = false;
    else isRightUp = false;
  }
});

// ═══════════════════════════════════════════════════════════════
// GAME FLOW
// ═══════════════════════════════════════════════════════════════

function startGame() {
  gameState = 'launch';
  ballNum = 1;
  if (score > highScore) highScore = score;
  score = 0;
  lastMessage = '';
  messageTimer = 0;
  serveBall();
}

function serveBall() {
  if (ball) World.remove(world, ball);
  // Clean up any leftover multiball extras
  for (const mb of multiballs) World.remove(world, mb);
  multiballs = [];
  isMultiball = false;
  scoopCooldown = 0;
  rampAnimating = false;
  rampBall = null;

  ball = createBall(BALL_START.x, BALL_START.y);
  Body.setVelocity(ball, { x: 0, y: 0 });
  World.add(world, ball);
  gameState = 'launch';
  plungerPower = 0;
  plungerCharging = false;
}

function launchBall() {
  if (gameState !== 'launch') return;
  const power = Math.min(plungerPower, 1);
  Body.setVelocity(ball, { x: 0, y: -60 * power - 20 });
  sndLaunch();
  addScore(POINTS.LAUNCH, 'LAUNCH');
  gameState = 'play';
  plungerPower = 0;
  plungerCharging = false;
}

function drainBall() {
  if (gameState === 'drain') return;
  gameState = 'drain';
  drainTimer = 90;
  sndDrain();
}

// ═══════════════════════════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════════════════════════

function update() {
  // Plunger
  if (plungerCharging && gameState === 'launch') {
    plungerPower = Math.min(plungerPower + 0.02, 1);
  }

  // Flippers
  if (!leftPaddle) {
    // Walls not loaded yet — skip flipper updates but continue to drain/speed checks
  } else {

  const lTarget = isLeftUp ? FLIP_ACTIVE : FLIP_REST;
  const rTarget = isRightUp ? FLIP_ACTIVE : FLIP_REST;
  const lSpd = isLeftUp ? FLIP_UP_SPEED : FLIP_DN_SPEED;
  const rSpd = isRightUp ? FLIP_UP_SPEED : FLIP_DN_SPEED;

  if (leftAngle < lTarget) leftAngle = Math.min(leftAngle + lSpd, lTarget);
  else if (leftAngle > lTarget) leftAngle = Math.max(leftAngle - lSpd, lTarget);

  if (rightAngle < rTarget) rightAngle = Math.min(rightAngle + rSpd, rTarget);
  else if (rightAngle > rTarget) rightAngle = Math.max(rightAngle - rSpd, rTarget);

  positionFlipper(leftPaddle, LEFT_HINGE, leftAngle);
  positionFlipper(rightPaddle, RIGHT_HINGE, Math.PI - rightAngle);

  } // end flipper guard

  // Ramp scripted animation — move ball along bezier path
  if (rampAnimating && rampBall) {
    rampT += 1 / RAMP.duration;
    if (rampT >= 1) {
      // Ramp complete — re-add ball to physics at exit point
      rampT = 1;
      rampAnimating = false;
      Body.setPosition(rampBall, { x: RAMP.exit.x, y: RAMP.exit.y });
      Body.setVelocity(rampBall, { x: 8, y: 12 });
      World.add(world, rampBall);
      rampBall = null;
      addScore(RAMP.points, 'RAMP COMPLETE');
      sndMultiball();
    } else {
      // Animate ball position along the bezier
      const pt = bezierPoint(rampT, RAMP.entrance, RAMP.control, RAMP.exit);
      Body.setPosition(rampBall, pt);
    }
  }

  // Speed clamp
  if (ball) {
    const v = ball.velocity;
    const spd = Math.sqrt(v.x * v.x + v.y * v.y);
    if (spd > MAX_SPEED) {
      const f = MAX_SPEED / spd;
      Body.setVelocity(ball, { x: v.x * f, y: v.y * f });
    }
  }

  // Drain detection (skip while ball is on ramp — it's not in physics)
  if (ball && gameState === 'play' && !rampAnimating) {
    if (ball.position.y > IMG_H + 100) {
      if (isMultiball && multiballs.length > 0) {
        // During multiball, losing the main ball isn't game over —
        // promote an extra ball to main ball and keep playing
        World.remove(world, ball);
        ball = multiballs.pop();
      } else {
        drainBall();
      }
    }

    // Launcher re-entry: if ball rolls back into the launcher channel,
    // switch to launch state so the player can fire it again
    if (ball.position.x > 1480 && ball.position.y > 1800) {
      const spd = Math.sqrt(ball.velocity.x ** 2 + ball.velocity.y ** 2);
      if (spd < 2) {
        gameState = 'launch';
        plungerPower = 0;
        plungerCharging = false;
        stuckFrames = 0;
      }
    }

    // Stuck ball detection: if ball is nearly stationary for 3 seconds, nudge it
    const spd = Math.sqrt(ball.velocity.x ** 2 + ball.velocity.y ** 2);
    if (spd < 0.5) {
      stuckFrames++;
      if (stuckFrames > 180) { // 3 sec at 60fps
        Body.setVelocity(ball, { x: (Math.random() - 0.5) * 8, y: -5 });
        stuckFrames = 0;
      }
    } else {
      stuckFrames = 0;
    }
  }

  // Multiball management — remove drained extra balls
  if (multiballs.length > 0) {
    for (let i = multiballs.length - 1; i >= 0; i--) {
      const mb = multiballs[i];
      if (mb.position.y > IMG_H + 100) {
        World.remove(world, mb);
        multiballs.splice(i, 1);
        continue;
      }
      // Speed clamp extra balls too
      const v = mb.velocity;
      const spd = Math.sqrt(v.x * v.x + v.y * v.y);
      if (spd > MAX_SPEED) {
        const f = MAX_SPEED / spd;
        Body.setVelocity(mb, { x: v.x * f, y: v.y * f });
      }
    }
    if (multiballs.length === 0) {
      isMultiball = false;
    }
  }

  // Scoop cooldown
  if (scoopCooldown > 0) scoopCooldown--;

  // Message timer
  if (messageTimer > 0) messageTimer--;

  // Drain timer
  if (gameState === 'drain') {
    drainTimer--;
    if (drainTimer <= 0) {
      ballNum++;
      if (ballNum > totalBalls) gameState = 'attract';
      else serveBall();
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (imageLoaded) {
    ctx.drawImage(tableImg, offX, offY, IMG_W * scale, IMG_H * scale);
  }

  // Ramp rails (drawn before ball so ball appears on top)
  renderRamp();

  // Scoop
  if (scoopBody) {
    const sx = px(scoopBody.position.x), sy = py(scoopBody.position.y);
    const sr = ps(SCOOP_RADIUS);
    // Outer glow when ready, dim when on cooldown
    const ready = scoopCooldown === 0 && !isMultiball;
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fillStyle = ready ? 'rgba(255, 215, 0, 0.3)' : 'rgba(80, 80, 80, 0.3)';
    ctx.fill();
    ctx.strokeStyle = ready ? '#FFD700' : '#555';
    ctx.lineWidth = ps(3);
    ctx.stroke();
    // Inner ring
    ctx.beginPath();
    ctx.arc(sx, sy, sr * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = ready ? '#FFD700' : '#444';
    ctx.fill();
    // Label
    ctx.fillStyle = ready ? '#000' : '#888';
    ctx.font = `bold ${ps(14)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('MB', sx, sy + ps(5));
  }

  // Bumpers
  for (const b of bumperBodies) {
    const bx = px(b.position.x), by = py(b.position.y);
    const br = ps(BUMPER_RADIUS);
    // Outer ring
    ctx.beginPath();
    ctx.arc(bx, by, br, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200, 16, 46, 0.85)';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = ps(3);
    ctx.stroke();
    // Inner circle
    ctx.beginPath();
    ctx.arc(bx, by, br * 0.55, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();
    ctx.strokeStyle = '#C8102E';
    ctx.lineWidth = ps(2);
    ctx.stroke();
  }

  // Ball
  if (ball && gameState !== 'attract') {
    const bx = px(ball.position.x), by = py(ball.position.y);
    const br = ps(BALL_RADIUS);
    ctx.beginPath();
    ctx.arc(bx, by, br, 0, Math.PI * 2);
    ctx.fillStyle = '#c0c0c0';
    ctx.fill();
    ctx.strokeStyle = '#888';
    ctx.lineWidth = ps(2);
    ctx.stroke();
    // Highlight
    ctx.beginPath();
    ctx.arc(bx - br * 0.25, by - br * 0.25, br * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fill();
  }

  // Multiball extra balls
  for (const mb of multiballs) {
    const mx = px(mb.position.x), my = py(mb.position.y);
    const mr = ps(BALL_RADIUS);
    ctx.beginPath();
    ctx.arc(mx, my, mr, 0, Math.PI * 2);
    ctx.fillStyle = '#FFD700';
    ctx.fill();
    ctx.strokeStyle = '#B8860B';
    ctx.lineWidth = ps(2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(mx - mr * 0.25, my - mr * 0.25, mr * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fill();
  }

  // Flippers
  if (leftPaddle) {
    drawFlipper(leftPaddle, 1);   // left: red prominent on top in world space
    drawFlipper(rightPaddle, -1); // right: flip asymmetry
  }

  // Plunger power bar
  if (gameState === 'launch') {
    const bx = px(BALL_START.x - 25), by = py(BALL_START.y);
    const bh = ps(160), bw = ps(50);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(bx, by - bh, bw, bh);
    const fh = bh * plungerPower;
    ctx.fillStyle = plungerPower > 0.8 ? '#ff2244' : '#ff6b35';
    ctx.fillRect(bx, by - fh, bw, fh);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = ps(2);
    ctx.strokeRect(bx, by - bh, bw, bh);

    ctx.fillStyle = '#fff';
    ctx.font = `bold ${ps(14)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('HOLD', px(BALL_START.x), py(BALL_START.y - 180));
    ctx.fillText('SPACE', px(BALL_START.x), py(BALL_START.y - 160));
  }

  // HUD
  if (gameState === 'play' || gameState === 'launch') {
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${ps(26)}px sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText('BALL ' + ballNum + '/' + totalBalls, px(75), py(55));
    // Score
    ctx.textAlign = 'right';
    ctx.fillText(score.toLocaleString(), px(IMG_W - 75), py(55));
    // High score
    if (highScore > 0) {
      ctx.font = `${ps(16)}px sans-serif`;
      ctx.fillStyle = '#aaa';
      ctx.fillText('HI ' + highScore.toLocaleString(), px(IMG_W - 75), py(85));
    }
  }

  // Score popup message
  if (messageTimer > 0 && gameState === 'play') {
    const alpha = Math.min(1, messageTimer / 30);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.font = `bold ${ps(32)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(lastMessage, px(IMG_W / 2), py(IMG_H / 2 - 200));
  }

  // Attract mode
  if (gameState === 'attract') {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.font = `bold ${ps(56)}px sans-serif`;
    ctx.fillText('RIP CITY PINBALL', px(IMG_W / 2), py(IMG_H / 2 - 40));
    ctx.font = `${ps(28)}px sans-serif`;
    ctx.fillText('PRESS SPACE TO START', px(IMG_W / 2), py(IMG_H / 2 + 40));
    ctx.font = `${ps(20)}px sans-serif`;
    ctx.fillText('Z / \u2190  Left Flipper    M / \u2192  Right Flipper    SPACE  Plunger', px(IMG_W / 2), py(IMG_H / 2 + 90));
  }

  // Drain / game over
  if (gameState === 'drain') {
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${ps(44)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(
      ballNum >= totalBalls ? 'GAME OVER' : 'BALL ' + (ballNum + 1),
      px(IMG_W / 2), py(IMG_H / 2)
    );
  }
}

function drawFlipper(body, side) {
  // side: 1 = left, -1 = right. Flips all world-relative lighting.
  ctx.save();
  ctx.translate(px(body.position.x), py(body.position.y));
  ctx.rotate(body.angle);

  const w = ps(PADDLE_LEN), h = ps(PADDLE_WIDTH);
  const baseH = h * 1.8;
  const tipH = h * 1.0;
  const edgeW = ps(5);
  const top = -side;

  function taperPath(bH, tH, len) {
    const bR = bH / 2, tR = tH / 2;
    ctx.beginPath();
    ctx.arc(-len/2 + bR, 0, bR, Math.PI/2, -Math.PI/2);
    ctx.lineTo(len/2 - tR, -tR);
    ctx.arc(len/2 - tR, 0, tR, -Math.PI/2, Math.PI/2);
    ctx.lineTo(-len/2 + bR, bR);
    ctx.closePath();
  }

  // 1. Drop shadow
  ctx.save();
  ctx.translate(ps(3) * side, ps(5) * side);
  taperPath(baseH, tipH, w);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fill();
  ctx.restore();

  // 2. Red edge — beveled gradient + lengthwise variation
  taperPath(baseH, tipH, w);
  const redGrad = ctx.createLinearGradient(0, top * baseH/2, 0, -top * baseH/2);
  redGrad.addColorStop(0, '#8C1822');
  redGrad.addColorStop(0.35, '#6E1219');
  redGrad.addColorStop(1, '#2E080E');
  ctx.fillStyle = redGrad;
  ctx.fill();

  ctx.save();
  taperPath(baseH, tipH, w);
  ctx.clip();
  const lenGrad = ctx.createLinearGradient(-w/2, 0, w/2, 0);
  lenGrad.addColorStop(0, 'rgba(0,0,0,0.15)');
  lenGrad.addColorStop(0.15, 'rgba(0,0,0,0.03)');
  lenGrad.addColorStop(0.5, 'rgba(0,0,0,0)');
  lenGrad.addColorStop(0.88, 'rgba(0,0,0,0.02)');
  lenGrad.addColorStop(1, 'rgba(0,0,0,0.12)');
  ctx.fillStyle = lenGrad;
  ctx.fillRect(-w/2, -baseH/2, w, baseH);
  const sheenGrad = ctx.createLinearGradient(0, top * baseH/2, 0, 0);
  sheenGrad.addColorStop(0, 'rgba(255,255,255,0.16)');
  sheenGrad.addColorStop(0.35, 'rgba(255,255,255,0.09)');
  sheenGrad.addColorStop(0.7, 'rgba(255,255,255,0.03)');
  sheenGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = sheenGrad;
  ctx.fillRect(-w/2, -baseH/2, w, baseH);
  ctx.restore();

  // 3. Black body with soft shadow onto red bezel
  const iBH = baseH - edgeW * 2, iTH = tipH - edgeW * 2;
  const iW = w - edgeW * 2;

  ctx.save();
  ctx.translate(0, ps(2.5) * side);
  ctx.beginPath();
  ctx.rect(-w, -baseH, w * 2, baseH * 2);
  taperPath(iBH, iTH, iW);
  ctx.clip('evenodd');
  ctx.shadowColor = 'rgba(0,0,0,0.75)';
  ctx.shadowBlur = ps(10);
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = top * ps(2);
  taperPath(iBH, iTH, iW);
  ctx.fillStyle = '#000';
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(0, ps(2.5) * side);
  taperPath(iBH, iTH, iW);
  const bodyGrad = ctx.createLinearGradient(0, top * iBH/2, 0, -top * iBH/2);
  bodyGrad.addColorStop(0, '#252525');
  bodyGrad.addColorStop(0.15, '#1a1a1a');
  bodyGrad.addColorStop(0.5, '#0d0d0d');
  bodyGrad.addColorStop(1, '#050505');
  ctx.fillStyle = bodyGrad;
  ctx.fill();
  ctx.restore();

  // 4. Specular band
  ctx.save();
  ctx.translate(0, ps(2.5) * side);
  taperPath(iBH * 0.65, iTH * 0.65, iW * 0.9);
  ctx.translate(0, top * iBH * 0.12);
  const specGrad = ctx.createLinearGradient(0, top * iBH * 0.2, 0, -top * iBH * 0.1);
  specGrad.addColorStop(0, 'rgba(255,255,255,0.12)');
  specGrad.addColorStop(0.5, 'rgba(255,255,255,0.04)');
  specGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = specGrad;
  ctx.fill();
  ctx.restore();

  // 5. Edge highlight
  const hlSign = top;
  ctx.beginPath();
  ctx.moveTo(-iW/2 + iBH/2, hlSign * (iBH/2 - ps(2)) + ps(2.5) * side);
  ctx.lineTo(iW/2 - iTH/2, hlSign * (iTH/2 - ps(2)) + ps(2.5) * side);
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = ps(1);
  ctx.stroke();

  // 6. Anchor bolt
  const bodyOffY = ps(2.5) * side;
  const hingeX = -w/2 + baseH/2;
  const hingeY = bodyOffY;
  const boltR = ps(9);
  const hlO = ps(2.5);

  ctx.beginPath();
  ctx.arc(hingeX - ps(0.5) * top, hingeY - ps(0.5) * top, boltR + ps(1), 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(hingeX, hingeY, boltR + ps(0.5), 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fill();

  const domeGrad = ctx.createRadialGradient(
    hingeX + hlO * top, hingeY + hlO * top, 0,
    hingeX, hingeY, boltR
  );
  domeGrad.addColorStop(0, '#f5f5f5');
  domeGrad.addColorStop(0.08, '#e8e8e8');
  domeGrad.addColorStop(0.2, '#d0d0d0');
  domeGrad.addColorStop(0.35, '#b0b0b0');
  domeGrad.addColorStop(0.5, '#8a8a8a');
  domeGrad.addColorStop(0.7, '#666');
  domeGrad.addColorStop(0.85, '#4a4a4a');
  domeGrad.addColorStop(1, '#333');
  ctx.beginPath();
  ctx.arc(hingeX, hingeY, boltR, 0, Math.PI * 2);
  ctx.fillStyle = domeGrad;
  ctx.fill();
  ctx.strokeStyle = '#222';
  ctx.lineWidth = ps(0.8);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(
    hingeX + hlO * top * 0.7,
    hingeY + hlO * top * 0.7,
    ps(1.8), 0, Math.PI * 2
  );
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.fill();

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// DEBUG — Shift+D shows all physics bodies
// ═══════════════════════════════════════════════════════════════

let debug = false;
document.addEventListener('keydown', e => {
  if (e.key === 'D' && e.shiftKey) debug = !debug;
});

function renderDebug() {
  if (!debug) return;
  const bodies = Composite.allBodies(world);
  for (const b of bodies) {
    if (b.label === 'ball') continue;
    ctx.beginPath();
    ctx.moveTo(px(b.vertices[0].x), py(b.vertices[0].y));
    for (let i = 1; i < b.vertices.length; i++)
      ctx.lineTo(px(b.vertices[i].x), py(b.vertices[i].y));
    ctx.closePath();
    // Color by type: green = active sling face, cyan = wall, yellow = corner
    let color = 'rgba(0,255,255,0.6)';
    let lineW = 1;
    if (b.label === 'corner') {
      color = 'rgba(255,255,0,0.3)';
    } else if (b.label.startsWith('sling-') && SLING_FRONT_DEBUG.has(b.label)) {
      color = 'rgba(0,255,0,1)';
      lineW = 3;
    } else if (b.label.startsWith('sling-')) {
      color = 'rgba(255,0,255,0.5)';
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = lineW;
    ctx.stroke();
  }

  if (ball) {
    ctx.fillStyle = '#0f0';
    ctx.font = '12px monospace';
    const v = ball.velocity;
    const spd = Math.sqrt(v.x * v.x + v.y * v.y).toFixed(1);
    ctx.fillText(
      `ball: (${ball.position.x.toFixed(0)}, ${ball.position.y.toFixed(0)}) spd:${spd}`,
      px(70), py(IMG_H - 30)
    );
  }
}

// ═══════════════════════════════════════════════════════════════
// INIT — load walls then start game loop
// ═══════════════════════════════════════════════════════════════

let lastTime = 0;
function gameLoop(ts) {
  const dt = Math.min(ts - lastTime, 32);
  lastTime = ts;

  // CRITICAL: update flipper positions BEFORE physics step
  // so the engine sees their velocity during collision resolution
  update();
  Engine.update(engine, dt / 2);
  Engine.update(engine, dt / 2);

  render();
  renderDebug();
  requestAnimationFrame(gameLoop);
}

// Load walls, then start
loadWalls().then(() => {
  requestAnimationFrame(gameLoop);
}).catch(err => {
  console.error('Failed to load wall-data.json:', err);
  // Start anyway with no walls
  requestAnimationFrame(gameLoop);
});
</script>
