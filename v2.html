<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RIP CITY PINBALL v2</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Share Tech Mono', monospace; }
#arcade { display: grid; grid-template-columns: 1fr calc(100vh * 1694 / 2376) 1fr; height: 100vh; width: 100vw; }
#game-col { position: relative; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
canvas { display: block; width: 100%; height: 100%; }
#panel-left { display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding: 2.5rem 1.5rem 1.5rem; color: #fff; text-align: center; background: linear-gradient(180deg, #0a0a0a 0%, #0d0d0d 30%, #111 50%, #0d0d0d 70%, #0a0a0a 100%); border-right: 2px solid #222; }
.backglass { display: flex; flex-direction: column; align-items: center; gap: 1.2rem; width: 100%; }
.bg-title { font-family: 'Press Start 2P', monospace; font-size: clamp(2.5rem, 4vw, 4.5rem); color: #C8102E; text-shadow: 0 0 30px rgba(200,16,46,0.6), 0 0 60px rgba(200,16,46,0.3), 0 2px 0 #600; letter-spacing: 3px; }
.bg-title-sub { font-family: 'Press Start 2P', monospace; font-size: clamp(1.2rem, 2vw, 2.2rem); color: #C8102E; text-shadow: 0 0 20px rgba(200,16,46,0.4); letter-spacing: 6px; opacity: 0.8; margin-top: -0.3rem; }
.bg-divider { width: 80%; height: 2px; background: linear-gradient(90deg, transparent, #333, #555, #333, transparent); margin: 1rem 0; }
.bg-score-label { font-family: 'Press Start 2P', monospace; font-size: 1.2rem; color: #666; letter-spacing: 4px; }
.bg-score { font-family: 'Press Start 2P', monospace; font-size: clamp(2.5rem, 4vw, 4rem); color: #FFD700; text-shadow: 0 0 20px rgba(255,215,0,0.5), 0 0 40px rgba(255,215,0,0.2); min-height: 4rem; }
.bg-highscore { font-family: 'Share Tech Mono', monospace; font-size: 1.4rem; color: #555; }
.bg-highscore span { color: #888; }
.bg-balls-label { font-family: 'Press Start 2P', monospace; font-size: 1.2rem; color: #666; letter-spacing: 3px; }
.bg-balls { display: flex; gap: 1.8rem; margin: 0.8rem 0; }
.ball-pip { width: 40px; height: 40px; border-radius: 50%; border: 3px solid #444; background: #1a1a1a; transition: all 0.3s; }
.ball-pip.active { border-color: #FFD700; background: radial-gradient(circle at 35% 35%, #fff, #FFD700 40%, #b8860b); box-shadow: 0 0 16px rgba(255,215,0,0.6); }
.ball-pip.used { border-color: #333; background: #222; opacity: 0.4; }
.bg-message { font-family: 'Press Start 2P', monospace; font-size: clamp(1rem, 1.8vw, 1.6rem); color: #FFD700; min-height: 4rem; display: flex; align-items: center; justify-content: center; text-align: center; text-shadow: 0 0 10px rgba(255,215,0,0.4); transition: opacity 0.3s; line-height: 1.4; }
.controls-box { background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 8px; padding: 1.5rem 2rem; display: flex; flex-direction: column; gap: 1.2rem; width: 100%; max-width: 400px; margin-top: auto; }
.controls-title { font-family: 'Press Start 2P', monospace; font-size: 1rem; color: #666; margin-bottom: 0.5rem; letter-spacing: 2px; }
.control-row { font-size: 1.4rem; color: #aaa; display: flex; align-items: center; gap: 1rem; }
.key { display: inline-block; background: #222; border: 1px solid #444; border-radius: 4px; padding: 6px 12px; font-family: 'Press Start 2P', monospace; font-size: 1rem; color: #fff; min-width: 3rem; text-align: center; }
.credit-text { font-family: 'Press Start 2P', monospace; font-size: 0.8rem; color: #666; letter-spacing: 3px; margin-top: 2rem; }
.start-prompt { font-family: 'Press Start 2P', monospace; font-size: clamp(1.8rem, 3vw, 2.8rem); color: #FFD700; letter-spacing: 3px; line-height: 1.6; animation: blink-prompt 1.2s ease-in-out infinite; text-shadow: 0 0 20px rgba(255,215,0,0.5), 0 0 40px rgba(255,215,0,0.2); padding: 1.5rem 0; }
.start-prompt.hidden { display: none; }
@keyframes blink-prompt { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
.event-feed { display: flex; flex-direction: column; gap: 0.5rem; width: 100%; max-height: 45vh; overflow: hidden; }
.feed-item { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 1.2rem; border-radius: 6px; font-family: 'Share Tech Mono', monospace; font-size: 2rem; animation: feed-in 0.3s ease-out; transition: opacity 0.5s, transform 0.5s; }
.feed-item.major { background: rgba(200,16,46,0.15); border-left: 4px solid #C8102E; color: #fff; font-size: 2.2rem; }
.feed-item.minor { background: rgba(255,255,255,0.02); border-left: 3px solid #222; color: #555; font-size: 1.6rem; }
.feed-item.minor .feed-pts { color: #997a00; font-size: 1.6rem; }
.feed-item.epic { background: linear-gradient(90deg, rgba(255,215,0,0.12), rgba(200,16,46,0.08)); border-left: 4px solid #FFD700; color: #FFD700; font-size: 2.4rem; animation: feed-epic 0.5s ease-out; }
.feed-item.epic .feed-pts { color: #fff; font-size: 2.6rem; text-shadow: 0 0 12px rgba(255,215,0,0.6); }
@keyframes feed-epic { 0% { transform: scale(1.08) translateY(-10px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
@keyframes feed-pulse { 0% { transform: scale(1.2); } 100% { transform: scale(1); } }
.epic-banner { padding: 1.2rem; text-align: center; font-family: 'Press Start 2P', monospace; font-size: 1.6rem; color: #FFD700; background: linear-gradient(90deg, rgba(255,215,0,0.2), rgba(200,16,46,0.15), rgba(255,215,0,0.2)); border: 2px solid rgba(255,215,0,0.4); border-radius: 6px; text-shadow: 0 0 15px rgba(255,215,0,0.5); width: 100%; }
.epic-banner.hidden { display: none; }
@keyframes banner-slide { 0% { transform: translateY(-100%); opacity: 0; } 10% { transform: translateY(0); opacity: 1; } 80% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100%); opacity: 0; } }
.feed-item .feed-pts { color: #FFD700; font-weight: bold; margin-left: 1rem; white-space: nowrap; font-size: 2.2rem; }
.feed-item.major .feed-pts { color: #FFD700; text-shadow: 0 0 8px rgba(255,215,0,0.4); font-size: 2.4rem; }
@keyframes feed-in { from { transform: translateY(-15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.bg-streak { display: flex; align-items: center; justify-content: center; gap: 1rem; padding: 0.5rem; animation: streak-pulse 0.5s ease-out; }
.bg-streak.hidden { display: none; }
.streak-label { font-family: 'Press Start 2P', monospace; font-size: 0.8rem; color: #C8102E; letter-spacing: 2px; }
.streak-multi { font-family: 'Press Start 2P', monospace; font-size: 2rem; color: #FFD700; text-shadow: 0 0 20px rgba(255,215,0,0.6); }
@keyframes streak-pulse { 0% { transform: scale(1.3); } 100% { transform: scale(1); } }
.streak-fire { color: #ff4400 !important; text-shadow: 0 0 20px rgba(255,68,0,0.8), 0 0 40px rgba(255,68,0,0.4) !important; }
#panel-right { display: flex; flex-direction: column; padding: 2rem 1.5rem; color: #fff; background: linear-gradient(180deg, #0a0a0a 0%, #111 50%, #0a0a0a 100%); border-left: 2px solid #222; overflow: hidden; }
.lb-title { font-family: 'Press Start 2P', monospace; font-size: clamp(2.5rem, 4vw, 4rem); color: #FFD700; text-align: center; margin-bottom: 1.5rem; text-shadow: 0 0 15px rgba(255,215,0,0.4); }
.lb-header { display: grid; grid-template-columns: 4.5rem 1fr auto; gap: 0.8rem; padding: 0.6rem 1rem; border-bottom: 2px solid #333; font-family: 'Press Start 2P', monospace; font-size: 1.2rem; color: #666; letter-spacing: 1px; }
#leaderboard { list-style: none; flex: 1; overflow-y: auto; padding: 0; }
#leaderboard li { display: grid; grid-template-columns: 4.5rem 1fr auto; gap: 0.8rem; padding: 0.6rem 1rem; border-bottom: 1px solid #1a1a1a; font-size: 2.3rem; align-items: center; }
#leaderboard li:nth-child(-n+3) .lb-rank { color: #FFD700; }
#leaderboard li:nth-child(-n+3) .lb-name { color: #fff; }
.lb-rank { color: #555; font-family: 'Press Start 2P', monospace; font-size: 1.8rem; text-align: right; }
.lb-name { color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 2rem; }
.lb-score { color: #C8102E; font-family: 'Share Tech Mono', monospace; font-weight: bold; font-size: 2.3rem; }
#lb-status { text-align: center; color: #555; font-size: 1.6rem; padding: 1rem 0; }
.lb-highlight { animation: highlight-pulse 2s ease-out; }
@keyframes highlight-pulse { 0% { background: rgba(255,215,0,0.3); } 100% { background: transparent; } }
#gameover-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; background: rgba(0,0,0,0.75); z-index: 10; }
#gameover-overlay.hidden { display: none; }
.gameover-title { font-family: 'Press Start 2P', monospace; font-size: 4rem; color: #C8102E; text-shadow: 0 0 20px rgba(200,16,46,0.5); }
@keyframes slam-in { 0% { transform: scale(3); opacity: 0; } 60% { transform: scale(0.9); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
.gameover-score { font-family: 'Press Start 2P', monospace; font-size: 2rem; color: #FFD700; text-align: center; }
.gameover-form { display: flex; flex-direction: column; align-items: center; gap: 0.8rem; }
.gameover-form label { font-family: 'Press Start 2P', monospace; font-size: 1.2rem; color: #aaa; letter-spacing: 2px; }
#player-name { background: #111; border: 2px solid #333; border-radius: 4px; color: #fff; font-family: 'Share Tech Mono', monospace; font-size: 1.2rem; padding: 0.6rem 1rem; text-align: center; width: 280px; outline: none; }
#player-name:focus { border-color: #FFD700; }
#submit-score { font-family: 'Press Start 2P', monospace; font-size: 0.7rem; padding: 0.7rem 2rem; background: #C8102E; color: #fff; border: none; border-radius: 4px; cursor: pointer; letter-spacing: 2px; }
#submit-score:hover { background: #e0132f; }
#submit-score:disabled { background: #555; cursor: wait; }
.gameover-skip { font-size: 1rem; color: #555; cursor: pointer; font-family: 'Press Start 2P', monospace; }
.gameover-skip:hover { color: #888; }

/* ── MOBILE HUD (hidden on desktop) ── */
#mobile-hud { display: none; }
#mobile-touch-hint { display: none; }

/* ── MOBILE LAYOUT ── */
@media (max-width: 900px) {
  #arcade { grid-template-columns: 1fr; }
  #panel-left, #panel-right { display: none !important; }
  #game-col { height: 100vh; height: 100dvh; }
  canvas { width: 100vw; height: 100vh; height: 100dvh; object-fit: contain; }

  /* Mobile HUD overlay */
  #mobile-hud {
    display: flex; position: absolute; top: 0; left: 0; right: 0; z-index: 5;
    justify-content: space-between; align-items: center;
    padding: 0.6rem 1rem; pointer-events: none;
    background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 100%);

  .mhud-score { font-family: 'Press Start 2P', monospace; font-size: 1.1rem; color: #FFD700; text-shadow: 0 0 8px rgba(255,215,0,0.5); }
  .mhud-balls { display: flex; gap: 0.4rem; }
  .mhud-pip { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #444; background: #1a1a1a; }
  .mhud-pip.active { border-color: #FFD700; background: radial-gradient(circle at 35% 35%, #fff, #FFD700 40%, #b8860b); box-shadow: 0 0 6px rgba(255,215,0,0.5); }
  .mhud-pip.used { border-color: #333; background: #222; opacity: 0.4; }
  .mhud-streak { font-family: 'Press Start 2P', monospace; font-size: 0.7rem; color: #FFD700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
  .mhud-streak.hidden { display: none; }

  /* Mobile feed overlay */
  #mobile-feed {
    display: flex; flex-direction: column; align-items: center; gap: 0.15rem;
    position: absolute; top: 2.2rem; left: 0; right: 0; z-index: 5;
    pointer-events: none; overflow: hidden;
  }
  .mfeed-item {
    font-family: 'Share Tech Mono', monospace; font-size: 0.7rem;
    color: rgba(255,255,255,0.8); padding: 0.15rem 0.6rem;
    background: rgba(0,0,0,0.5); border-radius: 3px;
    animation: mfeed-in 0.4s ease-out;
  }
  .mfeed-item.major { color: #fff; }
  .mfeed-item.epic { color: #FFD700; }
  .mfeed-item .mfeed-pts { color: #FFD700; margin-left: 0.3rem; }
  @keyframes mfeed-in { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  /* Touch zone hints */
  #mobile-touch-hint {
    display: flex; position: absolute; inset: 0; z-index: 6;
    pointer-events: none; opacity: 0; transition: opacity 0.5s;
  }
  #mobile-touch-hint.visible { opacity: 1; }
  .touch-zone {
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-family: 'Press Start 2P', monospace; font-size: 0.7rem;
    color: rgba(255,255,255,0.3); letter-spacing: 2px;
  }
  .touch-zone-left { border-right: 1px solid rgba(255,255,255,0.1); }

  /* Mobile start prompt on canvas */
  #mobile-start {
    display: none; position: absolute; inset: 0; z-index: 7;
    flex-direction: column; align-items: center; justify-content: center;
    pointer-events: none;
  }
  #mobile-start.visible { display: flex; }
  .mstart-text {
    font-family: 'Press Start 2P', monospace; font-size: 1.4rem;
    color: #FFD700; text-shadow: 0 0 20px rgba(255,215,0,0.5);
    animation: blink-prompt 1.2s ease-in-out infinite; line-height: 2;

  }

  .gameover-title { font-size: 2.8rem; }
  .gameover-score { font-size: 1.6rem; }
  #player-name { width: 220px; font-size: 1rem; padding: 0.5rem 0.8rem; }
  .gameover-form label { font-size: 1rem; }
  #submit-score { font-size: 0.6rem; padding: 0.6rem 1.5rem; }

  /* Mobile leaderboard in game over */
  #mobile-leaderboard {
    display: none; max-height: 30vh; overflow-y: auto; width: 280px;
    margin-top: 0.5rem; border-top: 1px solid #333; padding-top: 0.5rem;
  }
  #mobile-leaderboard.visible { display: block; }
  .mlb-title { font-family: 'Press Start 2P', monospace; font-size: 0.5rem; color: #FFD700; text-align: center; margin-bottom: 0.4rem; }
  .mlb-row { display: flex; justify-content: space-between; padding: 0.2rem 0.3rem; font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; }
  .mlb-row .mlb-rank { color: #555; width: 1.5rem; }
  .mlb-row .mlb-name { color: #ccc; flex: 1; }
  .mlb-row .mlb-pts { color: #C8102E; }
  .mlb-row:nth-child(-n+4) .mlb-rank { color: #FFD700; }
}
</style>

    const ol = document.getElementById('leaderboard');
    ol.innerHTML = '';
    (data || []).forEach((s, i) => {
      const li = document.createElement('li');
      const rank = document.createElement('span'); rank.className = 'lb-rank'; rank.textContent = (i+1) + '.';

  } catch (e) { console.warn('Leaderboard load failed:', e); document.getElementById('lb-status').textContent = 'OFFLINE'; }
}

async function submitScore(name, finalScore) {
  if (!sb) return false;
  const timeout = (ms) => new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms));
  try {
    const { error } = await Promise.race([
      sb.from('pinball_scores').insert({ player_name: name, score: finalScore }),
      timeout(5000)
    ]);
    if (error) throw error;
    // Score saved — leaderboard refresh is best-effort
    try { await Promise.race([loadLeaderboard(name), timeout(5000)]); }
    catch (e) { console.warn('Leaderboard refresh failed:', e); }
    return true;
  } catch (e) { console.warn('Score submit failed:', e); return false; }
}

function updateGameOverSequence() {
  if (gameOverPhase === 0) return;
  gameOverTimer++;

  if (gameOverPhase === 1 && gameOverTimer > 40) {
    // Phase 2: score countup
    gameOverPhase = 2;
    gameOverTimer = 0;
    gameOverCountupVal = 0;
  }

  if (gameOverPhase === 2) {
    const duration = 90; // 1.5 seconds
    const t = Math.min(gameOverTimer / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3);
    gameOverCountupVal = Math.floor(gameOverFinalScore * eased);
    document.getElementById('final-score').textContent = gameOverCountupVal.toLocaleString() + ' POINTS';
    // Tick sound
    if (gameOverTimer % 4 === 0 && t < 1) {
      playTone(800 + Math.random() * 400, 0.02, 'square', 0.03);
    }
    if (t >= 1) {
      // Reveal flourish
      playTone(1047, 0.15, 'sine', 0.1);
      gameOverPhase = 3;
      gameOverTimer = 0;
    }
  }

  if (gameOverPhase === 3) {
    // Check if high score
    if (gameOverTimer === 1) {
      // Check if this is THE highest score — #1 on the board
      const entries = document.querySelectorAll('#leaderboard li');
      const topScore = entries.length > 0 ? parseInt(entries[0].querySelector('.lb-score').textContent.replace(/,/g, '')) || 0 : 0;
      const isNumber1 = gameOverFinalScore > 0 && gameOverFinalScore > topScore;
      // Always insert placeholder if it makes the board
      const makesBoard = gameOverFinalScore > 0;
      if (makesBoard) {
        insertLeaderboardPlaceholder(gameOverFinalScore);
      }
      if (isNumber1) {
        // Show "NEW HIGH SCORE!" briefly
        const scoreEl = document.getElementById('final-score');
        scoreEl.innerHTML = gameOverFinalScore.toLocaleString() + ' POINTS<br><span style="color:#C8102E;font-size:0.7em;animation:blink-prompt 0.8s ease-in-out infinite;">NEW HIGH SCORE</span>';
        triggerFlash('rgb(255,215,0)', 30, 0.2);
        sndHighScore();
      }
    }
    if (gameOverTimer > 60) {
      // Phase 4: show form
      gameOverPhase = 4;
      document.querySelector('.gameover-form').style.display = 'flex';
      setTimeout(() => document.getElementById('player-name').focus(), 100);
    }
  }
}

function insertLeaderboardPlaceholder(finalScore) {
  const ol = document.getElementById('leaderboard');
  const items = ol.querySelectorAll('li');
  let insertIdx = items.length;
  for (let i = 0; i < items.length; i++) {
    const scoreText = items[i].querySelector('.lb-score').textContent.replace(/,/g, '');

  li.id = 'lb-placeholder';
  li.classList.add('lb-highlight');
  const rank = document.createElement('span'); rank.className = 'lb-rank'; rank.style.color = '#FFD700'; rank.textContent = (insertIdx + 1) + '.';
  const name = document.createElement('span'); name.className = 'lb-name'; name.style.cssText = 'color:#FFD700;animation:blink-prompt 1s ease-in-out infinite;'; name.textContent = '???';
  const sc = document.createElement('span'); sc.className = 'lb-score'; sc.style.color = '#FFD700'; sc.textContent = finalScore.toLocaleString();
  li.append(rank, name, sc);
  if (insertIdx < items.length) {
    ol.insertBefore(li, items[insertIdx]);

    for (let i = insertIdx + 1; i < allItems.length; i++) {

  }
}

function initAudio() {
  if (audioReady) return;
  try {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    // iOS Safari requires resume() + playing a buffer inside a user gesture
    audioCtx.resume().then(() => {
      // Play a silent buffer to fully unlock the audio pipeline on iOS
      const buf = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(audioCtx.destination);
      src.start(0);
      audioReady = true;
    }).catch(e => { console.warn('Audio resume failed:', e.message); });
  } catch(e) { console.warn('Audio:', e.message); }
}

// Safari requires audio init from multiple gesture types
document.addEventListener('click', initAudio, { once: false });
document.addEventListener('keydown', initAudio, { once: false });
document.addEventListener('touchstart', initAudio, { once: false });

function playTone(freq, dur, type, vol) {
  if (!audioCtx || !audioReady) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol || 0.08, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.start(); o.stop(audioCtx.currentTime + dur);
    o.onended = () => { o.disconnect(); g.disconnect(); };
  } catch(e) { console.warn('Audio:', e.message); }
}

function sndThunder() {
  if (!audioCtx || !audioReady) return;
  const now = audioCtx.currentTime;

  // Layer 1: Sharp crack — wide-band noise, loud and instant
  const crack = audioCtx.createBufferSource();
  const crackBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.4, audioCtx.sampleRate);
  const cd = crackBuf.getChannelData(0);
  for (let i = 0; i < cd.length; i++) cd[i] = (Math.random() * 2 - 1);
  crack.buffer = crackBuf;
  const crackHP = audioCtx.createBiquadFilter();
  crackHP.type = 'highpass'; crackHP.frequency.value = 800;
  const crackEnv = audioCtx.createGain();
  crackEnv.gain.setValueAtTime(0.25, now);
  crackEnv.gain.exponentialRampToValueAtTime(0.05, now + 0.05);
  crackEnv.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  crack.connect(crackHP); crackHP.connect(crackEnv); crackEnv.connect(audioCtx.destination);
  crack.start(now); crack.stop(now + 0.4);
  crack.onended = () => { crack.disconnect(); crackHP.disconnect(); crackEnv.disconnect(); };

  // Layer 2: Mid rumble — bandpass noise, rolls in after the crack
  const rumble = audioCtx.createBufferSource();
  const rumbleBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 1.2, audioCtx.sampleRate);
  const rd = rumbleBuf.getChannelData(0);
  for (let i = 0; i < rd.length; i++) rd[i] = (Math.random() * 2 - 1);
  rumble.buffer = rumbleBuf;
  const rumbleBP = audioCtx.createBiquadFilter();
  rumbleBP.type = 'bandpass'; rumbleBP.frequency.value = 200; rumbleBP.Q.value = 0.5;
  const rumbleEnv = audioCtx.createGain();
  rumbleEnv.gain.setValueAtTime(0.001, now);
  rumbleEnv.gain.linearRampToValueAtTime(0.15, now + 0.08);
  rumbleEnv.gain.setValueAtTime(0.15, now + 0.3);
  rumbleEnv.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
  rumble.connect(rumbleBP); rumbleBP.connect(rumbleEnv); rumbleEnv.connect(audioCtx.destination);
  rumble.start(now + 0.02); rumble.stop(now + 1.2);
  rumble.onended = () => { rumble.disconnect(); rumbleBP.disconnect(); rumbleEnv.disconnect(); };

  // Layer 3: Sub-bass — you feel this, don't hear it
  const sub = audioCtx.createOscillator();
  sub.type = 'sine';
  sub.frequency.setValueAtTime(35, now);
  sub.frequency.exponentialRampToValueAtTime(20, now + 0.8);
  const subEnv = audioCtx.createGain();
  subEnv.gain.setValueAtTime(0.001, now);
  subEnv.gain.linearRampToValueAtTime(0.2, now + 0.05);
  subEnv.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
  sub.connect(subEnv); subEnv.connect(audioCtx.destination);
  sub.start(now); sub.stop(now + 0.85);
  sub.onended = () => { sub.disconnect(); subEnv.disconnect(); };
}

function sndThunderCrack() {
  if (!audioCtx || !audioReady) return;
  const now = audioCtx.currentTime;
  // Quick crack — for lightning during storm
  const noise = audioCtx.createBufferSource();
  const nBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.25, audioCtx.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = (Math.random() * 2 - 1);
  noise.buffer = nBuf;
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass'; hp.frequency.value = 600;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 2000; bp.Q.value = 0.3;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.15, now);
  g.gain.exponentialRampToValueAtTime(0.02, now + 0.04);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  noise.connect(hp); hp.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
  noise.start(now); noise.stop(now + 0.25);
  noise.onended = () => { noise.disconnect(); hp.disconnect(); bp.disconnect(); g.disconnect(); };
  // Rumble tail
  const tail = audioCtx.createOscillator();
  tail.type = 'sine';
  tail.frequency.value = 30 + Math.random() * 20;
  const tg = audioCtx.createGain();
  tg.gain.setValueAtTime(0.08, now + 0.03);
  tg.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
  tail.connect(tg); tg.connect(audioCtx.destination);
  tail.start(now + 0.03); tail.stop(now + 0.35);
  tail.onended = () => { tail.disconnect(); tg.disconnect(); };
}

function updateStorm() {
  // ── Announcement phases (ball frozen) ──
  if (stormPhase === 'booked' || stormPhase === 'getready') {
    stormPhaseTimer--;
    // Keep ball frozen
    if (ball && stormFrozenBallPos) {
      Body.setPosition(ball, stormFrozenBallPos);
      Body.setVelocity(ball, { x: 0, y: 0 });
    }
    if (stormPhase === 'booked' && stormPhaseTimer <= 0) {
      stormPhase = 'getready';
      stormPhaseTimer = 60; // 1 second for "GET READY"
    }
    if (stormPhase === 'getready' && stormPhaseTimer <= 0) {
      startStormRain();
    }
    return;
  }

  // ── Active storm ──
  if (!stormActive) return;
  stormTimer--;
  if (stormTimer <= 0) { endStorm(); return; }

  // Spawn ball every 5 seconds (after the initial 3)
  stormBallTimer--;
  if (stormBallTimer <= 0 && gameState === 'play') {
    spawnStormBall();
    stormBallTimer = STORM_BALL_INTERVAL;
  }

  // Lightning flashes — occasional early, frequent late
  const lightningChance = stormTimer < 300 ? 0.06 : (stormTimer < 900 ? 0.02 : 0.008);
  if (Math.random() < lightningChance) {
    stormFlashTimer = 10;
    triggerFlash('rgb(200,220,255)', 15, 0.35);
    sndThunderCrack();
  }

  // Clean up drained storm balls
  for (let i = stormBalls.length - 1; i >= 0; i--) {
    if (stormBalls[i].position.y > IMG_H + 100) {
      stormBalls.splice(i, 1);
    }
  }
}

function renderStorm() {
  // ── Announcement phase rendering ──
  if (stormPhase === 'booked' || stormPhase === 'getready') {
    const sw = window.innerWidth, sh = window.innerHeight;
    stormCtx.clearRect(0, 0, sw, sh);
    // Dim
    stormCtx.fillStyle = 'rgba(0,0,0,0.5)';
    stormCtx.fillRect(0, 0, sw, sh);
    // Center text on game canvas
    const gameCol = document.getElementById('game-col');
    const gcr = gameCol ? gameCol.getBoundingClientRect() : { left: 0, width: sw, top: 0, height: sh };
    const cx = gcr.left + gcr.width / 2;
    const cy = gcr.top + gcr.height * 0.4;
    const blink = Math.floor(Date.now() / 300) % 2 === 0;

    stormCtx.save();
    stormCtx.textAlign = 'center';
    stormCtx.textBaseline = 'middle';

    if (stormPhase === 'booked') {
      stormCtx.font = `bold ${Math.floor(gcr.width * 0.06)}px "Press Start 2P", monospace`;
      stormCtx.fillStyle = blink ? '#FFD700' : '#C8102E';
      stormCtx.fillText('ALL ROOMS', cx, cy - gcr.width * 0.04);
      stormCtx.fillText('BOOKED!', cx, cy + gcr.width * 0.04);
    } else {
      stormCtx.font = `bold ${Math.floor(gcr.width * 0.07)}px "Press Start 2P", monospace`;
      stormCtx.fillStyle = blink ? '#fff' : '#FFD700';
      stormCtx.fillText('GET READY', cx, cy);
    }
    stormCtx.restore();
    return;
  }

  if (!stormActive) return;
  const sw = window.innerWidth, sh = window.innerHeight;
  stormCtx.clearRect(0, 0, sw, sh);

  const progress = 1 - (stormTimer / STORM_DURATION);
  const intensity = 0.5 + progress * 0.5;

  // ── Layer 1: Rain (base layer — nothing covers it) ──
  const rainCount = Math.floor(12 + progress * 25);
  for (let i = 0; i < rainCount; i++) {
    stormRaindrops.push({
      x: Math.random() * (sw + 300) - 150,
      y: -10 - Math.random() * 60,
      speed: 18 + Math.random() * 16 + progress * 14,
      len: 22 + Math.random() * 35,
      alpha: 0.25 + Math.random() * 0.5,
    });
  }

  stormCtx.lineWidth = 1.5;
  for (let i = stormRaindrops.length - 1; i >= 0; i--) {
    const r = stormRaindrops[i];
    r.y += r.speed;
    r.x -= r.speed * 0.15;

    if (r.y > sh + r.len) {
      stormRaindrops.splice(i, 1);
      continue;
    }

    stormCtx.strokeStyle = `rgba(180,200,230,${r.alpha})`;
    stormCtx.beginPath();
    stormCtx.moveTo(r.x, r.y);
    stormCtx.lineTo(r.x - r.len * 0.15, r.y + r.len);
    stormCtx.stroke();
  }

  if (stormRaindrops.length > 700) stormRaindrops.splice(0, stormRaindrops.length - 700);

  // ── Layer 2: Dim overlay ──
  const dimAlpha = 0.3 + progress * 0.15;
  stormCtx.fillStyle = `rgba(0,0,0,${dimAlpha})`;
  stormCtx.fillRect(0, 0, sw, sh);

  // ── Layer 3: Spotlights (punch through dim) ──
  const cx = sw / 2;
  const cy = sh * 0.4;
  const spotRadius = Math.max(sw, sh) * 0.8;

  stormSpotAngle += 0.02 + (progress > 0.6 ? (progress - 0.6) * 0.08 : 0);

  const spots = [];
  for (let s = 0; s < 2; s++) {
    const angle = stormSpotAngle + s * Math.PI;
    spots.push({
      x: cx + Math.cos(angle) * spotRadius * 0.5,
      y: cy + Math.sin(angle) * spotRadius * 0.35,
    });
  }

  // Punch holes in the dim
  stormCtx.save();
  stormCtx.globalCompositeOperation = 'destination-out';
  for (const sp of spots) {
    const grad = stormCtx.createRadialGradient(sp.x, sp.y, 0, sp.x, sp.y, spotRadius * 0.55);
    grad.addColorStop(0, `rgba(0,0,0,${1.0 * intensity})`);
    grad.addColorStop(0.25, `rgba(0,0,0,${0.8 * intensity})`);
    grad.addColorStop(0.5, `rgba(0,0,0,${0.3 * intensity})`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    stormCtx.fillStyle = grad;
    stormCtx.fillRect(0, 0, sw, sh);
  }
  stormCtx.restore();

  // Spotlight color glow — white and Blazers red
  const spotColors = [
    { r: 255, g: 255, b: 255 },
    { r: 200, g: 16, b: 46 },
  ];
  for (let i = 0; i < spots.length; i++) {
    const sp = spots[i];
    const c = spotColors[i];
    const grad = stormCtx.createRadialGradient(sp.x, sp.y, 0, sp.x, sp.y, spotRadius * 0.5);
    grad.addColorStop(0, `rgba(${c.r},${c.g},${c.b},${0.6 * intensity})`);
    grad.addColorStop(0.15, `rgba(${c.r},${c.g},${c.b},${0.35 * intensity})`);
    grad.addColorStop(0.4, `rgba(${c.r},${c.g},${c.b},${0.1 * intensity})`);
    grad.addColorStop(1, `rgba(${c.r},${c.g},${c.b},0)`);
    stormCtx.fillStyle = grad;
    stormCtx.fillRect(0, 0, sw, sh);
  }

  // ── Layer 4: "MAKE IT RAIN" flashing on side panels ──
  const leftPanel = document.getElementById('panel-left');
  const rightPanel = document.getElementById('panel-right');
  const lpr = leftPanel ? leftPanel.getBoundingClientRect() : null;
  const rpr = rightPanel ? rightPanel.getBoundingClientRect() : null;
  const flash = Math.floor(Date.now() / 400) % 2 === 0; // flashes every 400ms

  if (flash) {
    stormCtx.save();
    stormCtx.font = `bold ${Math.floor(sh * 0.04)}px "Press Start 2P", monospace`;
    stormCtx.textAlign = 'center';
    stormCtx.textBaseline = 'middle';
    stormCtx.fillStyle = 'rgba(255,215,0,0.95)';

    if (lpr) {
      stormCtx.fillText('MAKE IT', lpr.left + lpr.width / 2, sh * 0.55);
      stormCtx.fillText('RAIN', lpr.left + lpr.width / 2, sh * 0.55 + sh * 0.06);
      stormCtx.fillText('x2', lpr.left + lpr.width / 2, sh * 0.55 + sh * 0.14);
    }
    if (rpr) {
      stormCtx.fillText('MAKE IT', rpr.left + rpr.width / 2, sh * 0.55);
      stormCtx.fillText('RAIN', rpr.left + rpr.width / 2, sh * 0.55 + sh * 0.06);
      stormCtx.fillText('x2', rpr.left + rpr.width / 2, sh * 0.55 + sh * 0.14);
    }
    stormCtx.restore();
  }

  // ── Layer 5: Lightning flash ──
  if (stormFlashTimer > 0) {
    stormCtx.fillStyle = `rgba(200,220,255,${stormFlashTimer / 12 * 0.5})`;
    stormCtx.fillRect(0, 0, sw, sh);
    stormFlashTimer--;
  }

  // ── Layer 6: Countdown bar at bottom ──
  const barW = sw * 0.5;
  const barH = 8;
  const barX = (sw - barW) / 2;
  const barY = sh - 40;
  const remaining = stormTimer / STORM_DURATION;

  stormCtx.fillStyle = 'rgba(50,50,50,0.5)';
  stormCtx.fillRect(barX, barY, barW, barH);

  const barColor = remaining > 0.3 ? 'rgba(255,215,0,0.8)' : 'rgba(255,60,60,0.9)';
  stormCtx.fillStyle = barColor;
  stormCtx.fillRect(barX, barY, barW * remaining, barH);
}

function getEventTier(label) {
  if (EPIC_EVENTS.some(e => label.toUpperCase().includes(e))) return 'epic';
  if (MAJOR_EVENTS_FEED.some(e => label.toUpperCase().includes(e))) return 'major';
  return 'minor';
}
function isMinor(label) { return MINOR_COLLAPSIBLE.some(e => label.toUpperCase().includes(e.toUpperCase())); }
function getMinorKey(label) { return MINOR_COLLAPSIBLE.find(e => label.toUpperCase().includes(e.toUpperCase())) || label; }

function addScore(pts, label, elementType) {
  // Variety streak
  if (elementType) {
    varietySet.add(elementType);
    varietyTimer = VARIETY_WINDOW;
    const distinct = varietySet.size;
    if (distinct >= 4) {
      varietyMultiplier = 3;
      if (distinct === 4) triggerFlash('rgb(255,68,0)', 35, 0.18);
    } else if (distinct >= 3) {
      varietyMultiplier = 2;
    } else {
      varietyMultiplier = 1;
    }
  }

  const finalPts = pts * varietyMultiplier * allTargetsMultiplier;
  score += finalPts;

  // Variety HUD — only show at x3
  const streakEl = document.getElementById('hud-streak');
  const multiEl = document.getElementById('streak-multi');
  if (varietyMultiplier >= 3) {
    streakEl.classList.remove('hidden');
    multiEl.textContent = 'VARIETY x3';
    multiEl.className = 'streak-multi streak-fire';
    streakEl.style.animation = 'none';
    streakEl.offsetHeight;
    streakEl.style.animation = 'streak-pulse 0.5s ease-out';
  } else {
    streakEl.classList.add('hidden');
  }

  // Event feed
  if (finalPts === 0 && !label) return;
  const feed = document.getElementById('event-feed');
  const tier = getEventTier(label);
  const minorKey = isMinor(label) ? getMinorKey(label) : null;

  if (minorKey) {
    let existing = feed.querySelector('[data-minor="' + minorKey + '"]');
    if (existing) {
      const count = parseInt(existing.dataset.count) + 1;
      const runPts = parseInt(existing.dataset.runpts) + finalPts;
      existing.dataset.count = count;
      existing.dataset.runpts = runPts;
      const origLabel = existing.dataset.origLabel || minorKey;
      existing.querySelector('.feed-label').textContent = origLabel + ' x' + count;
      existing.querySelector('.feed-pts').textContent = '+' + runPts.toLocaleString();
      existing.querySelector('.feed-pts').style.animation = 'none';
      existing.querySelector('.feed-pts').offsetHeight;
      existing.querySelector('.feed-pts').style.animation = 'feed-pulse 0.3s ease-out';
      existing.dataset.expires = Date.now() + 6000;
      feed.insertBefore(existing, feed.firstChild);
    } else {
      addFeedItem(label, finalPts, 'minor', minorKey, 1, finalPts);
    }
  } else {
    addFeedItem(label, finalPts, tier, null, 0, 0);
    if (tier === 'epic') showEpicBanner(label);
  }

  while (feed.children.length > MAX_FEED_ITEMS) feed.removeChild(feed.lastChild);
}

function addFeedItem(label, pts, tier, minorKey, count, runPts) {
  const feed = document.getElementById('event-feed');
  const div = document.createElement('div');
  div.className = 'feed-item ' + tier;
  div.innerHTML = '<span class="feed-label">' + label + '</span><span class="feed-pts">' + (pts > 0 ? '+' + pts.toLocaleString() : '') + '</span>';
  div.dataset.expires = Date.now() + 6000;
  div.style.overflow = 'hidden';
  if (minorKey) {
    div.dataset.minor = minorKey;
    div.dataset.origLabel = label;
    div.dataset.count = count;
    div.dataset.runpts = runPts;
  }
  feed.insertBefore(div, feed.firstChild);
}

function expireFeedItems() {
  const feed = document.getElementById('event-feed');
  const now = Date.now();
  for (let i = feed.children.length - 1; i >= 0; i--) {
    const item = feed.children[i];
    const expires = parseInt(item.dataset.expires || '0');
    if (expires && now > expires) {
      item.dataset.expires = '0';
      item.style.opacity = '0';
      item.style.transform = 'translateX(-20px)';
      item.style.maxHeight = item.scrollHeight + 'px';
      setTimeout(() => {
        item.style.transition = 'max-height 0.3s ease-in, padding 0.3s ease-in';
        item.style.maxHeight = '0';
        item.style.padding = '0 1rem';
      }, 300);
      setTimeout(() => { if (item.parentNode) item.parentNode.removeChild(item); }, 600);
    }
  }
}

// Multiball sequence: catch ball → pause → announce → launch 3 from launcher
let multiballPhase = 'idle'; // idle, caught, announcing, launching
let multiballTimer = 0;
let multiballLaunchCount = 0;
let multiballCaughtBall = null; // stashed ball reference during catch sequence

function triggerMultiball() {
  if (scoopCooldown > 0 || multiballPhase !== 'idle') return;

  // Phase 1: Catch the ball — remove from physics
  multiballPhase = 'caught';
  multiballTimer = 60; // 1 sec pause
  multiballCaughtBall = ball;
  shakeTrauma = 0.6; // stash reference for re-add later
  World.remove(world, ball);
  ball = null; // prevent speed clamp / sweep from operating on phantom body
  sndMultiball();
}

function updateMultiballSequence() {
  if (multiballPhase === 'idle') return;

  // Countdown for caught/announcing, count UP handled separately in launching
  if (multiballPhase !== 'launching') multiballTimer--;

  if (multiballPhase === 'caught' && multiballTimer <= 0) {
    // Phase 2: Announce
    multiballPhase = 'announcing';
    multiballTimer = 90; // 1.5 sec announcement
    addScore(POINTS.MULTIBALL, 'MULTIBALL!', 'multiball');
  }

  if (multiballPhase === 'announcing' && multiballTimer <= 0) {
    // Phase 3: Eject all balls from the scoop area
    multiballPhase = 'launching';
    multiballLaunchCount = 0;
    multiballTimer = 0;
    isMultiball = true;
    scoopCooldown = 180;

    // Eject the original ball from the scoop back onto the playfield
    const scoopX = scoopBody.position.x;
    const scoopY = scoopBody.position.y;
    ball = multiballCaughtBall;
    multiballCaughtBall = null;
    Body.setPosition(ball, { x: scoopX, y: scoopY });
    // Random angle through the scoop opening (0.035 to 1.923 rad, with margin from wall edges)
    const origA = 0.035 + Math.random() * 1.888;
    Body.setVelocity(ball, { x: Math.cos(origA) * 21, y: Math.sin(origA) * 21 });
    World.add(world, ball);
    sndLaunch();
  }

  if (multiballPhase === 'launching') {
    multiballTimer++;
    // Stagger-launch 3 extra balls from the scoop, one every 25 frames
    if (multiballTimer % 40 === 0 && multiballLaunchCount < 3) {
      const scoopX = scoopBody.position.x;
      const scoopY = scoopBody.position.y;
      const mb = Bodies.circle(scoopX, scoopY, BALL_RADIUS, {
        label: 'ball', restitution: 0.3, friction: 0.05,
        density: 0.0025, frictionAir: 0.001,
        collisionFilter: { category: COL.BALL, mask: COL.PLAYFIELD | COL.BALL },
      });
      // Tighter fan, varied speeds
      const ejAngles = [0.4, 0.9, 1.4];
      const ejSpeeds = [17, 20, 23];
      const a = ejAngles[multiballLaunchCount];
      const spd = ejSpeeds[multiballLaunchCount];
      Body.setVelocity(mb, { x: Math.cos(a) * spd, y: Math.sin(a) * spd });
      World.add(world, mb);
      multiballs.push(mb);
      multiballLaunchCount++;
      sndLaunch();

      if (multiballLaunchCount >= 3) {
        multiballPhase = 'idle';
      }
    }
  }
}

// ── RAMP (scripted cubic bezier — ball animated along path) ──
const RAMP = {
  entrance: { x: 1152, y: 1038 },
  cp1:      { x: 2025, y: 6 },
  cp2:      { x: 272, y: -97 },
  exit:     { x: 683, y: 535 },
  widthEntrance: 140,  // wide funnel at mouth
  widthChannel: 70,    // narrows to this
  taperEnd: 0.25,      // funnel over first 25% of curve
  segments: 24,
  duration: 90,
  minSpeed: 3,
};

let rampAnimating = false;
let rampT = 0;
let rampBall = null;
let rampRailPoints = [];

function cubicPoint(t, p0, p1, p2, p3) {
  const a = 1 - t;
  return {
    x: a*a*a*p0.x + 3*a*a*t*p1.x + 3*a*t*t*p2.x + t*t*t*p3.x,
    y: a*a*a*p0.y + 3*a*a*t*p1.y + 3*a*t*t*p2.y + t*t*t*p3.y,
  };
}

function cubicTangent(t, p0, p1, p2, p3) {
  const a = 1 - t;
  return {
    x: 3*a*a*(p1.x-p0.x) + 6*a*t*(p2.x-p1.x) + 3*t*t*(p3.x-p2.x),
    y: 3*a*a*(p1.y-p0.y) + 6*a*t*(p2.y-p1.y) + 3*t*t*(p3.y-p2.y),
  };
}

function createRamp() {
  const { entrance, cp1, cp2, exit, widthEntrance, widthChannel, taperEnd, segments } = RAMP;
  const leftRail = [];
  const rightRail = [];

  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const pt = cubicPoint(t, entrance, cp1, cp2, exit);
    const tg = cubicTangent(t, entrance, cp1, cp2, exit);
    const len = Math.sqrt(tg.x * tg.x + tg.y * tg.y) || 1;
    const nx = -tg.y / len, ny = tg.x / len;
    // Tapered width: wide at entrance, narrows to channel
    const taperT = Math.min(t / taperEnd, 1);
    const halfW = (widthEntrance + (widthChannel - widthEntrance) * taperT) / 2;
    leftRail.push({ x: pt.x + nx * halfW, y: pt.y + ny * halfW });
    rightRail.push({ x: pt.x - nx * halfW, y: pt.y - ny * halfW });
  }

  rampRailPoints = { left: leftRail, right: rightRail };

  // Entrance sensor — wider to match funnel
  const eSensor = Bodies.circle(entrance.x, entrance.y, 80, {
    isStatic: true, isSensor: true, label: 'ramp-entrance',
    collisionFilter: { category: COL.PLAYFIELD, mask: COL.BALL },
  });
  World.add(world, eSensor);
}

function renderRamp() {
  if (!rampRailPoints.left) return;
  return; // HIDDEN — ramp visuals replaced by table image, keeping code for future edits
  const { left, right } = rampRailPoints;
  const active = rampAnimating;

  // Ramp surface
  ctx.beginPath();
  ctx.moveTo(px(left[0].x), py(left[0].y));
  for (let i = 1; i < left.length; i++) ctx.lineTo(px(left[i].x), py(left[i].y));
  for (let i = right.length - 1; i >= 0; i--) ctx.lineTo(px(right[i].x), py(right[i].y));
  ctx.closePath();
  ctx.fillStyle = active ? 'rgba(200, 16, 46, 0.25)' : 'rgba(200, 16, 46, 0.12)';
  ctx.fill();

  // Rails
  ctx.strokeStyle = active ? 'rgba(255, 215, 0, 0.8)' : 'rgba(200, 200, 200, 0.5)';
  ctx.lineWidth = ps(3);
  ctx.beginPath();
  ctx.moveTo(px(left[0].x), py(left[0].y));
  for (let i = 1; i < left.length; i++) ctx.lineTo(px(left[i].x), py(left[i].y));
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(px(right[0].x), py(right[0].y));
  for (let i = 1; i < right.length; i++) ctx.lineTo(px(right[i].x), py(right[i].y));
  ctx.stroke();
}

function createCornerCircle(x, y) {
  const c = Bodies.circle(x, y, WALL_T / 2, {
    isStatic: true, label: 'corner',
    friction: 0.3, restitution: 0.4,
    collisionFilter: { category: COL.PLAYFIELD, mask: COL.BALL },
  });
  World.add(world, c);
}

async function loadWalls() {
  const resp = await fetch('wall-data.json');
  const data = await resp.json();

  // Set positions from JSON
  LEFT_HINGE = data.flipperLeft;
  RIGHT_HINGE = data.flipperRight;
  BALL_START = data.ballStart;

  // Create wall segments, skipping the drain gap
  const walls = data.walls;
  const vertices = data.vertices;

  for (let i = 0; i < walls.length; i++) {
    // Skip the drain opening (segment from vertex DRAIN_VERTEX_A to DRAIN_VERTEX_B)
    if (i === DRAIN_VERTEX_A) continue;

    const [x1, y1, x2, y2] = walls[i];
    createWall(x1, y1, x2, y2, 'w-' + i);
  }

  // Corner circles at each vertex to fill gaps between wall segments
  for (let i = 0; i < vertices.length; i++) {
    // Skip drain gap vertices (don't plug the drain)
    if (i === DRAIN_VERTEX_A || i === DRAIN_VERTEX_B) continue;
    createCornerCircle(vertices[i][0], vertices[i][1]);
  }

  // Interior walls (slingshot triangles, outlane rails)
  // Holes 1-2 are slingshots (0-23, 24-47), holes 3-4 are outlane regions (48+)
  if (data.interiorWalls) {
    for (let i = 0; i < data.interiorWalls.length; i++) {
      const [x1, y1, x2, y2] = data.interiorWalls[i];
      const label = i < 48 ? 'sling-' + i : 'int-' + i;
      createWall(x1, y1, x2, y2, label);
    }
  }
  if (data.interiorVertices) {
    for (const [x, y] of data.interiorVertices) {
      createCornerCircle(x, y);
    }
  }

  const intCount = data.interiorWalls ? data.interiorWalls.length : 0;
  console.log(`Loaded ${walls.length - 1} outer + ${intCount} interior walls`);
  console.log(`Flipper L: (${LEFT_HINGE.x}, ${LEFT_HINGE.y})`);
  console.log(`Flipper R: (${RIGHT_HINGE.x}, ${RIGHT_HINGE.y})`);
  console.log(`Ball start: (${BALL_START.x}, ${BALL_START.y})`);

  // Create flippers after positions are loaded
  createFlippers();

  // Bumpers — from element editor
  createBumper(641, 698, 'bumper-B1');   // B1 — left mid (Excel)
  createBumper(977, 697, 'bumper-B2');   // B2 — right mid (Outlook)
  createBumper(818, 862, 'bumper-B3');   // B3 — bottom center (Momentus)
  createBumper(818, 504, 'bumper-B4');   // B4 — top center (Slack)

  // Scoop — multiball trigger, upper-left area
  createScoop(387, 649);

  // Drop targets — T1-T3 left wall (hit from right), T4-T6 right wall (hit from left)
  createTarget(246, 1091, 7.924, 0);
  createTarget(246, 1232, 1.641, 1);
  createTarget(245, 1376, 1.641, 2);
  createTarget(1341, 1149, 7.802, 3);
  createTarget(1343, 1289, 7.802, 4);
  createTarget(1344, 1431, 7.837, 5);

  // ── ONE-WAY GATE at top of launcher channel ───────
  // Prevents ball from falling back into the launcher after exiting
  launcherGate = Bodies.rectangle(1474, 277, 120, WALL_T, {
    isStatic: true, label: 'launcher-gate', angle: -0.500,
    friction: 0.1, restitution: 0.5,
    collisionFilter: { category: 0, mask: 0 }, // starts disabled
  });
  World.add(world, launcherGate);

  // ── RAMP (left side, curves up and across to right) ───────
  createRamp();

  // Slingshot: reflect ball velocity off the face normal + add kick energy
  const SLING_KICK = 8; // extra energy added on top of reflection
  // Normals perpendicular to each sling face (pointing into the playfield)
  const SLING_LEFT_NORMAL = { x: 0.6, y: -0.8 };
  const SLING_RIGHT_NORMAL = { x: -0.6, y: -0.8 };

  // Front-facing sling walls only (inner face, excluding bottom hook)
  for (let i = 0; i <= 5; i++) SLING_FRONT_DEBUG.add('sling-' + i);
  for (let i = 41; i <= 47; i++) SLING_FRONT_DEBUG.add('sling-' + i);

  Events.on(engine, 'collisionStart', event => {
    for (const pair of event.pairs) {
      const a = pair.bodyA, b = pair.bodyB;
      const ballBody = a.label === 'ball' ? a : b.label === 'ball' ? b : null;
      const otherBody = ballBody === a ? b : a;

      if (!ballBody) continue;

      // Slingshot hit — reflect velocity off face + kick
      if (SLING_FRONT_DEBUG.has(otherBody.label)) {
        const slingIdx = parseInt(otherBody.label.split('-')[1]);
        const n = slingIdx < 24 ? SLING_LEFT_NORMAL : SLING_RIGHT_NORMAL;
        const vx = ballBody.velocity.x, vy = ballBody.velocity.y;
        // Reflect: v' = v - 2(v·n)n
        const dot = vx * n.x + vy * n.y;
        const rx = vx - 2 * dot * n.x;
        const ry = vy - 2 * dot * n.y;
        // Add kick energy along the normal
        Body.setVelocity(ballBody, {
          x: rx + n.x * SLING_KICK,
          y: ry + n.y * SLING_KICK
        });
        sndSling();
        (function() {
          const slingPhrases = [
            "DETAILS FORM, PLEASE",
            "EVENT ALERT SENT",
            "CALENDAR UPDATED",
            "DEPARTMENT NOTIFIED",
            "8 DEPARTMENTS PINGED",
            "NEW SHOW INCOMING",
            "ADD-AN EVENT",
            "SETTLEMENT FILED",
            "ARENA CALENDAR SENT",
            "SHADOWING AN EVENT"
          ];
          ballStats.slings++;
          addScore(POINTS.SLINGSHOT, slingPhrases[Math.floor(Math.random() * slingPhrases.length)], 'sling');
        })();
      }

      // Scoop hit — trigger multiball (only main ball)
      if (otherBody.label === 'scoop' && ballBody === ball) {
        triggerMultiball();
      }

      // Drop target hit
      if (otherBody.label.startsWith('target-')) {
        const idx = parseInt(otherBody.label.split('-')[1]);
        hitTarget(idx, ballBody);
      }

      // Bumper hit — pop the ball away from bumper center
      if (otherBody.label && otherBody.label.startsWith('bumper')) {
        const dx = ballBody.position.x - otherBody.position.x;
        const dy = ballBody.position.y - otherBody.position.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        Body.setVelocity(ballBody, {
          x: (dx / dist) * BUMPER_FORCE,
          y: (dy / dist) * BUMPER_FORCE
        });
        // Rising pitch on bumper streaks
        bumperStreakCount++;
        bumperStreakTimer = 120;
        const freq = 660 + Math.min(bumperStreakCount, 12) * 40;
        playTone(Math.min(freq, 1200), 0.08, 'square', 0.1);
        playTone(Math.min(freq + 220, 1400), 0.06, 'sine', 0.06);
        // Bumper message — first hit shows name, rapid hits consolidate
        const bumperNames = {
          'bumper-B1': 'NEW SPREADSHEET FORMULA',
          'bumper-B2': "YOU'VE GOT MAIL",
          'bumper-B3': 'CHECKING MOMENTUS',
          'bumper-B4': 'NEW SLACK MESSAGE',
        };
        if (bumperStreakCount <= 1) {
          // First hit or isolated hit — show the bumper's personality
          if (!bumperFirstHit.has(otherBody.label)) {
            bumperFirstHit.add(otherBody.label);
            showMessage(bumperNames[otherBody.label] || 'BUMPER', 72);
          }
        } else {
          // Rapid streak — consolidate into escalating message
          const streakLabels = [
            '', '', 'NOTIFICATIONS PILING UP',
            'INBOX FLOODING', 'INBOX OVERLOAD',
            'TOTAL CHAOS', 'INFORMATION AVALANCHE'
          ];
          const idx = Math.min(bumperStreakCount, streakLabels.length - 1);
          showMessage(streakLabels[idx] + ' x' + bumperStreakCount, 90);
        }
        ballStats.bumpers++;
        addScore(POINTS.BUMPER, bumperNames[otherBody.label] || 'BUMPER', 'bumper');
        // Trigger glow overlay flash
        if (bumperGlowTimers.hasOwnProperty(otherBody.label)) {
          bumperGlowTimers[otherBody.label] = BUMPER_FLASH_DURATION;
        }
      }

      // Ramp entrance — any ball can use it
      if (otherBody.label === 'ramp-entrance' && !rampAnimating) {
        const spd = Math.sqrt(ballBody.velocity.x ** 2 + ballBody.velocity.y ** 2);
        if (ballBody.velocity.y < -3 && spd > RAMP.minSpeed) {
          rampAnimating = true;
          rampT = 0;
          rampBall = ballBody;
          // Remove from multiballs array if it's an extra ball
          const mbIdx = multiballs.indexOf(ballBody);
          if (mbIdx >= 0) multiballs.splice(mbIdx, 1);
          World.remove(world, ballBody);
          sndSling();
        }
      }
    }
  });
}

let leftPaddle, rightPaddle;

function createFlippers() {
  leftPaddle = Bodies.rectangle(
    LEFT_HINGE.x, LEFT_HINGE.y, PADDLE_LEN, PADDLE_WIDTH,
    { isStatic: true, label: 'left-flipper', chamfer: { radius: PADDLE_WIDTH / 2 },
      friction: 0.8, restitution: 0.1,
      collisionFilter: { category: COL.PLAYFIELD, mask: COL.BALL } }
  );
  rightPaddle = Bodies.rectangle(
    RIGHT_HINGE.x, RIGHT_HINGE.y, PADDLE_LEN, PADDLE_WIDTH,
    { isStatic: true, label: 'right-flipper', chamfer: { radius: PADDLE_WIDTH / 2 },
      friction: 0.8, restitution: 0.1,
      collisionFilter: { category: COL.PLAYFIELD, mask: COL.BALL } }
  );
  World.add(world, [leftPaddle, rightPaddle]);
}

function positionFlipper(body, hinge, angle) {
  const halfLen = PADDLE_LEN / 2;
  Body.setAngle(body, angle, true);
  Body.setPosition(body, {
    x: hinge.x + Math.cos(angle) * halfLen,
    y: hinge.y + Math.sin(angle) * halfLen
  }, true);
}

// ── FLIPPER ANTI-TUNNELING ─────────────────────────────
// Subdivide flipper arc into substeps, check for ball collision at each.
// Prevents ball phasing through a fast-moving flipper.
const FLIPPER_SUBSTEPS = 6;

function flipperHitsBall(hinge, angle, ballPos) {
  // Point-to-line-segment distance: flipper centerline vs ball center
  const ax = hinge.x, ay = hinge.y;
  const bx = hinge.x + Math.cos(angle) * PADDLE_LEN;
  const by = hinge.y + Math.sin(angle) * PADDLE_LEN;
  const dx = bx - ax, dy = by - ay;
  const len2 = dx * dx + dy * dy;
  let t = ((ballPos.x - ax) * dx + (ballPos.y - ay) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  const cx = ax + t * dx, cy = ay + t * dy;
  const dist = Math.hypot(ballPos.x - cx, ballPos.y - cy);
  return dist < BALL_RADIUS + PADDLE_WIDTH / 2 + 2;
}

function sweepFlipper(body, hinge, fromAngle, toAngle) {
  // Exclude ramp-animating ball and null refs
  const mainBallOnRamp = rampAnimating && (rampBall === ball || !ball);
  const allBalls = (mainBallOnRamp ? [] : (ball ? [ball] : [])).concat(multiballs).filter(Boolean);
  if (allBalls.length === 0) {
    positionFlipper(body, hinge, toAngle);
    return;
  }

  for (let i = 0; i <= FLIPPER_SUBSTEPS; i++) {
    const frac = i / FLIPPER_SUBSTEPS;
    const angle = fromAngle + (toAngle - fromAngle) * frac;
    positionFlipper(body, hinge, angle);

    for (const b of allBalls) {
      if (flipperHitsBall(hinge, angle, b.position)) {
        // Tangential impulse from flipper's angular velocity at contact point
        const dx = b.position.x - hinge.x;
        const dy = b.position.y - hinge.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const angularVel = toAngle - fromAngle;
        const tangentialSpeed = Math.abs(angularVel) * dist;

        // Tangent direction (perpendicular to radius from hinge)
        const nx = -dy / dist, ny = dx / dist;
        const sign = angularVel < 0 ? 1 : -1;
        const impulseScale = 0.55;

        Body.setVelocity(b, {
          x: b.velocity.x + nx * tangentialSpeed * sign * impulseScale,
          y: b.velocity.y + ny * tangentialSpeed * sign * impulseScale
        });

        // Push ball clear — use nearest point on flipper centerline, not body center
        const ax = hinge.x, ay = hinge.y;
        const bx = hinge.x + Math.cos(angle) * PADDLE_LEN;
        const by = hinge.y + Math.sin(angle) * PADDLE_LEN;
        const fdx = bx - ax, fdy = by - ay;
        const flen2 = fdx * fdx + fdy * fdy;
        let ft = ((b.position.x - ax) * fdx + (b.position.y - ay) * fdy) / flen2;
        ft = Math.max(0, Math.min(1, ft));
        const nearX = ax + ft * fdx, nearY = ay + ft * fdy;
        const pdx = b.position.x - nearX, pdy = b.position.y - nearY;
        const pDist = Math.sqrt(pdx * pdx + pdy * pdy) || 1;
        const clearance = BALL_RADIUS + PADDLE_WIDTH / 2 + 4;
        Body.setPosition(b, {
          x: nearX + (pdx / pDist) * clearance,
          y: nearY + (pdy / pDist) * clearance
        });
        break;
      }
    }
  }
}

function createBall(x, y) {
  return Bodies.circle(x, y, BALL_RADIUS, {
    label: 'ball', restitution: 0.3, friction: 0.05,
    density: 0.0025, frictionAir: 0.001,
    collisionFilter: { category: COL.BALL, mask: COL.PLAYFIELD | COL.BALL },
  });
}

document.addEventListener('keydown', e => {
  if (gameState === 'gameover') return;
  if (e.key === 'z' || e.key === 'Z' || e.key === 'ArrowLeft') { if (!isLeftUp) sndFlipper(); isLeftUp = true; }
  if (e.key === 'm' || e.key === 'M' || e.key === 'ArrowRight') { if (!isRightUp) sndFlipper(); isRightUp = true; }
  if (gameState === 'attract' && e.key !== 'Shift' && e.key !== 'Control' && e.key !== 'Alt' && e.key !== 'Meta') {
    startGame();
    return;
  }
  if (e.key === ' ') {
    e.preventDefault();
    if (gameState === 'launch') plungerCharging = true;
  }
});

document.addEventListener('keyup', e => {
  if (e.key === 'z' || e.key === 'Z' || e.key === 'ArrowLeft') isLeftUp = false;
  if (e.key === 'm' || e.key === 'M' || e.key === 'ArrowRight') isRightUp = false;
  if (e.key === ' ' && plungerCharging) {
    e.preventDefault();
    launchBall();
  }
});

// Touch: left half = left flipper, right half = right flipper
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio(); // Must be called inside touch gesture for iOS
  if (gameState === 'gameover') return;
  if (gameState === 'attract') { startGame(); return; }
  if (gameState === 'launch') { plungerCharging = true; return; }
  const rect = canvas.getBoundingClientRect();
  const mid = rect.left + rect.width / 2;
  for (const t of e.changedTouches) {
    if (t.clientX < mid) isLeftUp = true;
    else isRightUp = true;
  }
});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const midEnd = canvas.getBoundingClientRect().left + canvas.getBoundingClientRect().width / 2;
  for (const t of e.changedTouches) {
    if (t.clientX < midEnd) isLeftUp = false;
    else isRightUp = false;
  }
  if (plungerCharging) { launchBall(); return; }
});
canvas.addEventListener('touchcancel', e => {
  isLeftUp = false;
  isRightUp = false;
  plungerCharging = false;
});

// GAME FLOW
