// Progressive difficulty — gravity ramps after 2 minutes
let gameStartTime = 0;
const NORMAL_GRAVITY = 1.0;
const MAX_GRAVITY = 1.5;
const RAMP_START = 120; // seconds before difficulty starts increasing
const RAMP_DURATION = 60; // seconds to go from normal to max

function updateDifficulty() {
  if (gameState === 'attract' || gameState === 'gameover') return;
  const elapsed = (Date.now() - gameStartTime) / 1000;
  if (elapsed < RAMP_START) {
    engine.gravity.y = NORMAL_GRAVITY;
  } else {
    const t = Math.min((elapsed - RAMP_START) / RAMP_DURATION, 1);
    engine.gravity.y = NORMAL_GRAVITY + (MAX_GRAVITY - NORMAL_GRAVITY) * t;
  }
}

function startGame() {
  if (stormActive || stormPhase !== 'idle') endStorm();
  resetTargets();
  gameState = 'launch';
  ballNum = 1;
  if (score > highScore) highScore = score;
  score = 0;
  gameStartTime = Date.now();
  engine.gravity.y = NORMAL_GRAVITY;
  clearFeed();
  document.getElementById('start-prompt').classList.add('hidden');
  serveBall();
}

function serveBall() {
  if (ball) World.remove(world, ball);
  // Clean up any leftover multiball extras
  for (const mb of multiballs) World.remove(world, mb);
  multiballs = [];
  isMultiball = false;
  scoopCooldown = 0;
  rampAnimating = false;
  rampBall = null;
  stuckFrames = 0;
  multiballPhase = 'idle';
  multiballTimer = 0;
  multiballCaughtBall = null;
  allTargetsTimer = 0;
  // Don't reset targets on ball drain — rooms stay booked across balls
  // Targets only reset after completing all 6 (allTargetsTimer countdown)

  // Disable launcher gate so ball can be placed in channel
  if (launcherGate) {
    launcherGate.collisionFilter.category = 0;
    launcherGate.collisionFilter.mask = 0;
    launcherGateActive = false;
  }

  ball = createBall(BALL_START.x, BALL_START.y);
  Body.setVelocity(ball, { x: 0, y: 0 });
  World.add(world, ball);
  gameState = 'launch';
  plungerPower = 0;
  plungerCharging = false;
  springCompression = 0;
  springPos = 0;
  springVel = 0;
  springBouncing = false;
  launchParticles = [];
  shakeTrauma = 0;
  // Ball save
  ballSaveTimer = (ballNum === 1) ? 900 : 600;
  ballSaveActive = true;
  // Reset multipliers per ball
  varietySet = new Set();
  varietyTimer = 0;
  varietyMultiplier = 1;
  allTargetsMultiplier = 1;
  allTargetsMultiTimer = 0;
  document.getElementById('hud-streak').classList.add('hidden');
  // Per-ball resets
  drainBonusPhase = 0;
  drainBonusTimer = 0;
  drainBonusTotal = 0;
  slingHitCount = 0;
  bumperFirstHit = new Set();
  bumperStreakCount = 0;
  bumperStreakTimer = 0;
  ballStats = { bumpers: 0, targets: 0, ramps: 0, slings: 0 };
}

function launchBall() {
  if (gameState !== 'launch') return;
  const power = Math.min(plungerPower, 1);
  Body.setVelocity(ball, { x: 0, y: -60 * power - 20 });
  sndLaunch();
  score += POINTS.LAUNCH; // silent, no feed
  gameState = 'play';

  // Spring bounce-back
  springBouncing = true;
  springPos = springCompression;
  springVel = 0;

  // Launch effects — particles at ball contact point
  emitLaunchParticles(BALL_START.x, BALL_START.y + BALL_RADIUS);
  shakeTrauma = 0.3 + power * 0.35;

  plungerPower = 0;
  plungerCharging = false;
}

let drainBonusPhase = 0;
let drainBonusTimer = 0;
let drainBonusLines = [];
let drainBonusTotal = 0;

function drainBall() {
  if (gameState === 'drain') return;
  // Reset multiball launch sequence to prevent orphaned balls
  if (multiballPhase !== 'idle') {
    multiballPhase = 'idle';
    if (multiballCaughtBall) { World.remove(world, multiballCaughtBall); multiballCaughtBall = null; }
  }
  if (ballSaveActive) {
    ballSaveActive = false;
    ballSaveTimer = 0;
    drainBonusPhase = 0;
    drainBonusTimer = 0;
    drainBonusTotal = 0;
    showMessage('BALL SAVED', 90);
    if (ball) World.remove(world, ball);
    // Disable launcher gate so ball can sit in channel
    if (launcherGate) {
      launcherGate.collisionFilter.category = 0;
      launcherGate.collisionFilter.mask = 0;
      launcherGateActive = false;
    }
    ball = createBall(BALL_START.x, BALL_START.y);
    Body.setVelocity(ball, { x: 0, y: 0 });
    World.add(world, ball);
    gameState = 'launch';
    plungerPower = 0;
    plungerCharging = false;
    springCompression = 0;
    springPos = 0;
    springVel = 0;
    springBouncing = false;
    return;
  }
  // Calculate end-of-ball bonus
  drainBonusLines = [];
  drainBonusTotal = 0;
  const targetsDown = targetStates.filter(s => !s).length;
  if (ballStats.bumpers > 0) {
    const pts = ballStats.bumpers * POINTS.BUMPER;
    drainBonusLines.push({ label: 'BUMPERS x' + ballStats.bumpers, pts: pts });
    drainBonusTotal += pts;
  }
  if (targetsDown > 0) {
    const pts = targetsDown * 2000;
    drainBonusLines.push({ label: 'ROOMS ' + targetsDown + '/6', pts: pts });
    drainBonusTotal += pts;
  }
  if (ballStats.ramps > 0) {
    const pts = ballStats.ramps * POINTS.RAMP;
    drainBonusLines.push({ label: 'RAMPS x' + ballStats.ramps, pts: pts });
    drainBonusTotal += pts;
  }
  if (ballStats.slings > 0) {
    const pts = ballStats.slings * 200;
    drainBonusLines.push({ label: 'SLINGS x' + ballStats.slings, pts: pts });
    drainBonusTotal += pts;
  }
  score += drainBonusTotal;

  if (drainBonusTotal > 0) {
    drainBonusPhase = 1;
    drainBonusTimer = 0;
    gameState = 'drain';
    drainTimer = 60 + drainBonusLines.length * 25 + 40; // time for animation
  } else {
    gameState = 'drain';
    drainTimer = 90;
  }
  sndDrain();
}

function renderDrainBonus() {
  if (drainBonusPhase === 0 || drainBonusTotal === 0) return;
  drainBonusTimer++;

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = px(IMG_W / 2);
  let startY = py(IMG_H / 2 - 150);
  const lineH = ps(90);

  ctx.textAlign = 'center';
  ctx.font = 'bold ' + ps(56) + 'px "Press Start 2P", monospace';
  ctx.fillStyle = '#FFD700';
  ctx.fillText('BALL BONUS', cx, startY);
  startY += lineH * 1.2;

  ctx.font = ps(40) + 'px "Share Tech Mono", monospace';
  for (let i = 0; i < drainBonusLines.length; i++) {
    const frameThreshold = 20 + i * 25;
    if (drainBonusTimer < frameThreshold) break;

    const line = drainBonusLines[i];
    const t = Math.min((drainBonusTimer - frameThreshold) / 15, 1);
    const displayPts = Math.floor(line.pts * t);

    ctx.fillStyle = '#ccc';
    ctx.textAlign = 'left';
    ctx.fillText(line.label, px(IMG_W / 2 - 450), startY + i * lineH);
    ctx.fillStyle = '#FFD700';
    ctx.textAlign = 'right';
    ctx.fillText('+' + displayPts.toLocaleString(), px(IMG_W / 2 + 450), startY + i * lineH);

    // Tick sound on first frame of each line
    if (drainBonusTimer === frameThreshold) {
      playTone(600 + i * 100, 0.08, 'square', 0.06);
    }
  }

  // Total line
  const totalFrame = 20 + drainBonusLines.length * 25 + 10;
  if (drainBonusTimer >= totalFrame) {
    const y = startY + drainBonusLines.length * lineH + lineH * 0.5;
    // Divider
    ctx.strokeStyle = '#555';
    ctx.lineWidth = ps(2);
    ctx.beginPath();
    ctx.moveTo(px(IMG_W / 2 - 450), y - lineH * 0.3);
    ctx.lineTo(px(IMG_W / 2 + 450), y - lineH * 0.3);
    ctx.stroke();
    // Total
    ctx.font = 'bold ' + ps(52) + 'px "Press Start 2P", monospace';
    ctx.fillStyle = '#FFD700';
    ctx.textAlign = 'center';
    ctx.fillText('TOTAL: +' + drainBonusTotal.toLocaleString(), cx, y);

    if (drainBonusTimer === totalFrame) {
      playTone(1047, 0.15, 'sine', 0.1);
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════════════════════════

function update() {
  // Plunger + spring compression
  if (gameState === 'launch') {
    if (plungerCharging) {
      plungerPower = Math.min(plungerPower + 0.02, 1);
      springCompression = Math.pow(plungerPower, 2.5) * SPRING_MAX_COMP;
    }
    // Ball stays at start position — spring pulls AWAY, then snaps back to hit ball
    if (ball) {
      Body.setPosition(ball, { x: BALL_START.x, y: BALL_START.y });
      Body.setVelocity(ball, { x: 0, y: 0 });
    }
  }

  // Flippers
  if (!leftPaddle) {
    // Walls not loaded yet — skip flipper updates but continue to drain/speed checks
  } else {

  const lTarget = isLeftUp ? FLIP_ACTIVE : FLIP_REST;
  const rTarget = isRightUp ? FLIP_ACTIVE : FLIP_REST;
  const lSpd = isLeftUp ? FLIP_UP_SPEED : FLIP_DN_SPEED;
  const rSpd = isRightUp ? FLIP_UP_SPEED : FLIP_DN_SPEED;

  // Save previous angles for sweep
  const prevLeftAngle = leftAngle;
  const prevRightAngle = rightAngle;

  if (leftAngle < lTarget) leftAngle = Math.min(leftAngle + lSpd, lTarget);
  else if (leftAngle > lTarget) leftAngle = Math.max(leftAngle - lSpd, lTarget);

  if (rightAngle < rTarget) rightAngle = Math.min(rightAngle + rSpd, rTarget);
  else if (rightAngle > rTarget) rightAngle = Math.max(rightAngle - rSpd, rTarget);

  // Use sweep when flipper is actively moving, simple position when stationary
  if (leftAngle !== prevLeftAngle) {
    sweepFlipper(leftPaddle, LEFT_HINGE, prevLeftAngle, leftAngle);
  } else {
    positionFlipper(leftPaddle, LEFT_HINGE, leftAngle);
  }

  if (rightAngle !== prevRightAngle) {
    sweepFlipper(rightPaddle, RIGHT_HINGE, Math.PI - prevRightAngle, Math.PI - rightAngle);
  } else {
    positionFlipper(rightPaddle, RIGHT_HINGE, Math.PI - rightAngle);
  }

  } // end flipper guard

  // Ramp scripted animation — move ball along cubic bezier path
  if (rampAnimating && rampBall) {
    rampT += 1 / RAMP.duration;
    if (rampT >= 1) {
      rampT = 1;
      rampAnimating = false;
      // Don't re-add ball to physics if game is draining or over
      if (gameState === 'drain' || gameState === 'gameover' || gameState === 'attract') {
        rampBall = null;
        return;
      }
      Body.setPosition(rampBall, { x: RAMP.exit.x, y: RAMP.exit.y });
      // Randomize exit velocity so ramp doesn't feel robotic
      const vx = 5 + (Math.random() - 0.4) * 6;  // 2 to 8.6, biased right
      const vy = 9 + Math.random() * 5;           // 9 to 14
      Body.setVelocity(rampBall, { x: vx, y: vy });
      World.add(world, rampBall);
      if (rampBall === ball || !ball) {
        ball = rampBall;
      } else {
        // Re-add multiball extra back to the array
        multiballs.push(rampBall);
      }
      rampBall = null;
      ballStats.ramps++;
      addScore(POINTS.RAMP, 'BOOKING REQUEST RECEIVED', 'ramp');
      sndMultiball();
    } else {
      const pt = cubicPoint(rampT, RAMP.entrance, RAMP.cp1, RAMP.cp2, RAMP.exit);
      Body.setPosition(rampBall, pt);
    }
  }

  // Multiball sequence
  updateMultiballSequence();

  // Drop target reset timer
  if (allTargetsTimer > 0) {
    allTargetsTimer--;
    if (allTargetsTimer <= 0) resetTargets();
  }

  // One-way launcher gate — enable when ball exits upward past gate position
  if (ball && launcherGate && !launcherGateActive) {
    if (ball.position.y < 200 && ball.velocity.y < 0 && gameState === 'play') {
      launcherGate.collisionFilter.category = COL.PLAYFIELD;
      launcherGate.collisionFilter.mask = COL.BALL;
      launcherGateActive = true;
    }
  }

  // Speed clamp
  if (ball) {
    const v = ball.velocity;
    const spd = Math.sqrt(v.x * v.x + v.y * v.y);
    if (spd > MAX_SPEED) {
      const f = MAX_SPEED / spd;
      Body.setVelocity(ball, { x: v.x * f, y: v.y * f });
    }
  }

  // ── Physics anomaly detection (logging only) ──
  if (ball && gameState === 'play' && !rampAnimating) {
    const bx = ball.position.x, by = ball.position.y;
    if (lastBallPos) {
      const dx = bx - lastBallPos.x, dy = by - lastBallPos.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > TELEPORT_THRESHOLD) {
        anomalyCount++;
        physicsLog.push({ type: 'TELEPORT', from: { ...lastBallPos }, to: { x: bx, y: by }, dist: Math.round(dist) });
        console.warn('TELEPORT', physicsLog[physicsLog.length - 1]);
      }
    }
    if (bx < -OOB_MARGIN || bx > IMG_W + OOB_MARGIN || by < -OOB_MARGIN) {
      anomalyCount++;
      physicsLog.push({ type: 'OOB', pos: { x: Math.round(bx), y: Math.round(by) } });
      console.warn('OOB', physicsLog[physicsLog.length - 1]);
    }
    if (bumperStreakCount >= 6 && bumperStreakTimer > 100) {
      if (!physicsLog.length || physicsLog[physicsLog.length - 1].type !== 'BUMPER_TRAP' || physicsLog[physicsLog.length - 1].streak !== bumperStreakCount) {
        anomalyCount++;
        physicsLog.push({ type: 'BUMPER_TRAP', streak: bumperStreakCount, pos: { x: Math.round(bx), y: Math.round(by) } });
        console.warn('BUMPER_TRAP', physicsLog[physicsLog.length - 1]);
      }
    }
    lastBallPos = { x: bx, y: by };
  }

  // Drain detection (skip while ball is on ramp or caught in scoop, but allow during launching)
  if (ball && gameState === 'play' && !rampAnimating &&
      multiballPhase !== 'caught' && multiballPhase !== 'announcing') {
    if (ball.position.y > IMG_H + 100) {
      if (multiballs.length > 0) {
        // Extra balls still in play — promote one to main ball
        World.remove(world, ball);
        ball = multiballs.pop();
        isMultiball = multiballs.length > 0;
      } else if (stormActive && stormBalls.length > 0) {
        // Storm balls pending but not yet in multiballs — don't drain
        World.remove(world, ball);
        ball = null;
      } else {
        drainBall();
      }
    }

    // Skip remaining checks if drainBall changed state
    if (gameState !== 'play') { /* drainBall fired — skip launcher/stuck checks */ }

    // Launcher re-entry: if ball rolls back into the launcher channel,
    // switch to launch state so the player can fire it again
    else if (ball && ball.position.x > 1480 && ball.position.y > 1800) {
      const spd = Math.sqrt(ball.velocity.x ** 2 + ball.velocity.y ** 2);
      if (spd < 2) {
        gameState = 'launch';
        plungerPower = 0;
        plungerCharging = false;
        springCompression = 0; springPos = 0; springVel = 0; springBouncing = false;
        stuckFrames = 0;
      }
    }

    if (ball && gameState === 'play') {
      // Stuck ball detection: if ball is nearly stationary for 3 seconds, nudge it
      const spd = Math.sqrt(ball.velocity.x ** 2 + ball.velocity.y ** 2);
      if (spd < 0.5) {
        stuckFrames++;
        if (stuckFrames > 180) { // 3 sec at 60fps
          Body.setVelocity(ball, { x: (Math.random() - 0.5) * 8, y: -5 });
          stuckFrames = 0;
        }
      } else {
        stuckFrames = 0;
      }
    }
  }

  // Multiball management — remove drained extra balls
  if (multiballs.length > 0) {
    for (let i = multiballs.length - 1; i >= 0; i--) {
      const mb = multiballs[i];
      if (mb.position.y > IMG_H + 100) {
        World.remove(world, mb);
        multiballs.splice(i, 1);
        continue;
      }
      // Speed clamp extra balls too
      const v = mb.velocity;
      const spd = Math.sqrt(v.x * v.x + v.y * v.y);
      if (spd > MAX_SPEED) {
        const f = MAX_SPEED / spd;
        Body.setVelocity(mb, { x: v.x * f, y: v.y * f });
      }
    }
    if (multiballs.length === 0) {
      isMultiball = false;
    }
  }

  // Spring bounce-back after launch
  if (springBouncing) {
    const dt = 1 / 60;
    const force = (-SPRING_STIFFNESS * springPos) + (-SPRING_DAMPING * springVel);
    springVel += (force / SPRING_MASS) * dt;
    springPos += springVel * dt;
    springCompression = Math.max(0, springPos);
    if (Math.abs(springPos) < 0.3 && Math.abs(springVel) < 3) {
      springPos = 0; springVel = 0; springCompression = 0;
      springBouncing = false;
    }
  }

  // Launch particles
  for (const p of launchParticles) {
    const dt = 1 / 60;
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 450 * dt; p.life -= dt;
  }
  launchParticles = launchParticles.filter(p => p.life > 0);

  // Screen shake decay
  if (shakeTrauma > 0) { shakeTrauma -= (1/60) * 7; if (shakeTrauma < 0) shakeTrauma = 0; }

  // Scoop cooldown
  if (scoopCooldown > 0) scoopCooldown--;

  // Drain timer
  if (gameState === 'drain') {
    drainTimer--;
    if (drainTimer <= 0) {
      ballNum++;
      if (ballNum > totalBalls) {
        gameState = 'gameover';
        startGameOverSequence();
      }
      else serveBall();
    }
  }

  // Game over sequence
  if (gameState === 'gameover') {
    updateGameOverSequence();
  }
}

// ═══════════════════════════════════════════════════════════════
// SPRING LAUNCHER RENDERING
// ═══════════════════════════════════════════════════════════════

function getSpringCoilPositions(comp) {
  // Returns array of Y positions (world coords), index 0 = bottom anchor, N-1 = top
  const anchorY = BALL_START.y + 170;  // bottom anchor
  const positions = [];
  for (let i = 0; i < SPRING_COILS; i++) {
    const restY = anchorY - i * SPRING_COIL_SPACING;
    if (comp <= 0) { positions.push(restY); continue; }
    const frac = i / (SPRING_COILS - 1);
    let moveFrac = Math.pow(frac, 1.5);
    if (i === 0) moveFrac = 0;
    else if (i === 1) moveFrac *= 0.3;
    else if (i === SPRING_COILS - 1) moveFrac *= 0.85;
    else if (i === SPRING_COILS - 2) moveFrac *= 0.92;
    positions.push(restY + comp * moveFrac);
  }
  return positions;
}

function springTopY(comp) { return getSpringCoilPositions(comp)[SPRING_COILS - 1]; }

function springBallY(comp) { return springTopY(comp) - 12 - BALL_RADIUS - 2; }

function chromeGradH(sx, sw) {
  const g = ctx.createLinearGradient(sx, 0, sx + sw, 0);
  g.addColorStop(0,    '#2a2a2e');
  g.addColorStop(0.08, '#606068');
  g.addColorStop(0.18, '#b0b0b8');
  g.addColorStop(0.28, '#e8e8f0');
  g.addColorStop(0.38, '#ffffff');
  g.addColorStop(0.48, '#c0c0c8');
  g.addColorStop(0.56, '#909098');
  g.addColorStop(0.65, '#d0d0d8');
  g.addColorStop(0.75, '#b8b8c0');
  g.addColorStop(0.88, '#686870');
  g.addColorStop(1,    '#2a2a2e');
  return g;
}

function drawSpringRod(wcx, topWY, bottomWY) {
  const hw = 7;  // half-width in world units
  const sx = px(wcx - hw), sy = py(topWY);
  const sw = ps(hw * 2), sh = ps(bottomWY - topWY);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(sx - ps(2), sy, sw + ps(4), sh);

  // Chrome rod
  ctx.fillStyle = chromeGradH(sx, sw);
  ctx.fillRect(sx, sy, sw, sh);

  // Edge highlights
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = ps(0.5);
  ctx.beginPath(); ctx.moveTo(sx + ps(2), sy); ctx.lineTo(sx + ps(2), sy + sh); ctx.stroke();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.moveTo(sx + sw - ps(1), sy); ctx.lineTo(sx + sw - ps(1), sy + sh); ctx.stroke();

  // E-clip ring
  const clipSY = sy + sh - ps(10);
  ctx.fillStyle = chromeGradH(sx - ps(2), sw + ps(4));
  ctx.fillRect(sx - ps(2), clipSY, sw + ps(4), ps(2.5));
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(sx - ps(2), clipSY, sw + ps(4), ps(0.8));
}

function drawSpringRubberTip(wcx, wy) {
  const w = ps(16), h = ps(12);
  const sx = px(wcx), sy = py(wy);
  const g = ctx.createRadialGradient(sx, sy - h * 0.6, ps(2), sx, sy - h * 0.4, w);
  g.addColorStop(0, '#3a3a3a');
  g.addColorStop(0.4, '#252525');
  g.addColorStop(1, '#111');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(sx - w / 2, sy);
  ctx.quadraticCurveTo(sx - w / 2 - ps(2), sy - h * 0.6, sx, sy - h - ps(2));
  ctx.quadraticCurveTo(sx + w / 2 + ps(2), sy - h * 0.6, sx + w / 2, sy);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(120,120,120,0.2)';
  ctx.lineWidth = ps(0.8);
  ctx.beginPath();
  ctx.arc(sx, sy - h * 0.5, w * 0.25, Math.PI * 1.15, Math.PI * 1.85);
  ctx.stroke();
}

function drawSpringBasePlate(wcx, wy) {
  const pw = ps(50), ph = ps(7);
  const sx = px(wcx) - pw / 2, sy = py(wy);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.roundRect(sx + ps(1.5), sy + ps(1.5), pw, ph, ps(2)); ctx.fill();
  ctx.fillStyle = chromeGradH(sx, pw);
  ctx.beginPath(); ctx.roundRect(sx, sy, pw, ph, ps(2)); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = ps(0.4);
  ctx.beginPath(); ctx.moveTo(sx + ps(3), sy + ps(0.8)); ctx.lineTo(sx + pw - ps(3), sy + ps(0.8)); ctx.stroke();
}

function drawSpringCoils(wcx, coilPositions) {
  // Build helix segments across all coils
  const allSegs = [];
  for (let c = 0; c < SPRING_COILS - 1; c++) {
    const wy0 = coilPositions[c];      // bottom of section
    const wy1 = coilPositions[c + 1];  // top of section
    const isDead = (c === 0 || c === SPRING_COILS - 2);
    for (let s = 0; s < SPRING_SEGMENTS; s++) {
      const t0 = s / SPRING_SEGMENTS;
      const t1 = (s + 1) / SPRING_SEGMENTS;
      const a0 = t0 * Math.PI * 2;
      const a1 = t1 * Math.PI * 2;
      const wx0 = wcx + Math.cos(a0) * SPRING_COIL_RADIUS;
      const wx1 = wcx + Math.cos(a1) * SPRING_COIL_RADIUS;
      const wpy0 = wy0 + (wy1 - wy0) * t0;
      const wpy1 = wy0 + (wy1 - wy0) * t1;
      const z = (Math.sin(a0) + Math.sin(a1)) / 2;  // -1 back, +1 front
      allSegs.push({ wx0, wpy0, wx1, wpy1, z, isDead });
    }
  }
  // Sort back-to-front
  allSegs.sort((a, b) => a.z - b.z);

  for (const seg of allSegs) {
    const { wx0, wpy0, wx1, wpy1, z, isDead } = seg;
    const depth = (z + 1) / 2;  // 0 = back, 1 = front
    const wireW = ps(SPRING_WIRE_DIAM * (0.55 + depth * 0.55));
    const b = springWireBrightness(depth);

    // Convert to screen coords
    const sx0 = px(wx0), sy0 = py(wpy0);
    const sx1 = px(wx1), sy1 = py(wpy1);

    // Shadow (front segments only)
    if (depth > 0.5) {
      ctx.beginPath(); ctx.moveTo(sx0 + ps(1.2), sy0 + ps(1.5)); ctx.lineTo(sx1 + ps(1.2), sy1 + ps(1.5));
      ctx.strokeStyle = `rgba(0,0,0,${0.25 * depth})`;
      ctx.lineWidth = wireW + ps(1.5); ctx.lineCap = 'round'; ctx.stroke();
    }

    // Dark outline
    ctx.beginPath(); ctx.moveTo(sx0, sy0); ctx.lineTo(sx1, sy1);
    const ob = b * (isDead ? 0.3 : 0.25);
    ctx.strokeStyle = `rgb(${ob|0},${ob|0},${(ob * 1.04)|0})`;
    ctx.lineWidth = wireW + ps(1.2); ctx.lineCap = 'round'; ctx.stroke();

    // Wire body
    ctx.beginPath(); ctx.moveTo(sx0, sy0); ctx.lineTo(sx1, sy1);
    const r = Math.min(255, b * (isDead ? 0.77 : 0.96));
    const g = Math.min(255, b * (isDead ? 0.77 : 0.96));
    const bl = Math.min(255, b * (isDead ? 0.8 : 1.02));
    ctx.strokeStyle = `rgb(${r|0},${g|0},${bl|0})`;
    ctx.lineWidth = wireW; ctx.lineCap = 'round'; ctx.stroke();

    // Specular highlight (front only)
    if (depth > 0.55) {
      ctx.beginPath();
      ctx.moveTo(sx0, sy0 - wireW * 0.25); ctx.lineTo(sx1, sy1 - wireW * 0.25);
      const specA = Math.pow((depth - 0.55) / 0.45, 1.5) * 0.55;
      ctx.strokeStyle = `rgba(255,255,255,${specA})`;
      ctx.lineWidth = wireW * 0.28; ctx.lineCap = 'round'; ctx.stroke();
    }
  }
}

function springWireBrightness(depth) {
  if (depth < 0.2) return 60 + depth * 200;
  if (depth < 0.5) return 100 + (depth - 0.2) * 300;
  if (depth < 0.8) return 190 + (depth - 0.5) * 200;
  return 250;
}

function renderSpringLauncher() {
  const wcx = BALL_START.x;
  const coilPositions = getSpringCoilPositions(springCompression);
  const anchorY = BALL_START.y + 170;
  const topY = coilPositions[SPRING_COILS - 1];

  drawSpringBasePlate(wcx, anchorY + 8);
  drawSpringRod(wcx, topY - 3, anchorY + 10);
  drawSpringCoils(wcx, coilPositions);
  drawSpringRubberTip(wcx, topY);
}

function emitLaunchParticles(wx, wy) {
  for (let i = 0; i < 20; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 50 + Math.random() * 300;
    launchParticles.push({
      x: px(wx) + (Math.random() - 0.5) * ps(10),
      y: py(wy),
      vx: Math.cos(a) * spd * 0.5,
      vy: Math.sin(a) * spd - 60,
      life: 0.2 + Math.random() * 0.4,
      maxLife: 0.2 + Math.random() * 0.4,
      size: 1 + Math.random() * 2.5,
      gold: Math.random() > 0.25
    });
  }
}

function renderLaunchParticles() {
  for (const p of launchParticles) {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = p.gold
      ? `rgba(255,${(180 + alpha * 75)|0},${(alpha * 40)|0},${alpha})`
      : `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (0.3 + alpha * 0.7), 0, Math.PI * 2);
    ctx.fill();
    // Glow
    ctx.fillStyle = p.gold
      ? `rgba(255,180,50,${alpha * 0.12})`
      : `rgba(200,220,255,${alpha * 0.15})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha * 3.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Screen shake
  const shake = shakeTrauma * shakeTrauma;
  const shakeX = shake > 0 ? (Math.random() - 0.5) * shake * ps(4) : 0;
  const shakeY = shake > 0 ? (Math.random() - 0.5) * shake * ps(4) : 0;
  if (shake > 0) { ctx.save(); ctx.translate(shakeX, shakeY); }

  if (imageLoaded) {
    ctx.drawImage(tableImg, offX, offY, IMG_W * scale, IMG_H * scale);
  }

  // Bumper glow overlays — flash on hit, fade out
  for (const label in bumperGlowTimers) {
    if (bumperGlowTimers[label] > 0) {
      const img = bumperGlowImgs[label];
      if (img.complete && img.naturalWidth > 0) {

        ctx.drawImage(img, offX, offY, IMG_W * scale, IMG_H * scale);
      }

    }
  }

  renderRamp();

  renderTargets();

  // Scoop — HIDDEN, visuals replaced by table image, keeping code for future edits
  // if (scoopBody) {
  //   const sx = px(scoopBody.position.x), sy = py(scoopBody.position.y);

  //   ctx.fill();
  //   ctx.strokeStyle = ready ? '#FFD700' : '#555';
  //   ctx.lineWidth = ps(3);
  //   ctx.stroke();
  //   ctx.beginPath();
  //   ctx.arc(sx, sy, sr * 0.5, 0, Math.PI * 2);
  //   ctx.fillStyle = ready ? '#FFD700' : '#444';
  //   ctx.fill();
  //   ctx.fillStyle = ready ? '#000' : '#888';
  //   ctx.font = `bold ${ps(14)}px sans-serif`;
  //   ctx.textAlign = 'center';
  //   ctx.fillText('MB', sx, sy + ps(5));
  // }

  // Bumpers — HIDDEN, visuals replaced by table image, keeping code for future edits
  // for (const b of bumperBodies) {
  //   const bx = px(b.position.x), by = py(b.position.y);
  //   const br = ps(BUMPER_RADIUS);
  //   ctx.beginPath();
  //   ctx.arc(bx, by, br, 0, Math.PI * 2);
  //   ctx.fillStyle = 'rgba(200, 16, 46, 0.85)';
  //   ctx.fill();
  //   ctx.strokeStyle = '#fff';
  //   ctx.lineWidth = ps(3);
  //   ctx.stroke();
  //   ctx.beginPath();
  //   ctx.arc(bx, by, br * 0.55, 0, Math.PI * 2);
  //   ctx.fillStyle = '#111';
  //   ctx.fill();
  //   ctx.strokeStyle = '#C8102E';
  //   ctx.lineWidth = ps(2);
  //   ctx.stroke();
  // }

  // Ball (chrome steel)
  if (ball && gameState !== 'attract' && multiballPhase !== 'caught' && multiballPhase !== 'announcing') {
    const bx = px(ball.position.x), by = py(ball.position.y);
    const br = ps(BALL_RADIUS);
    // Drop shadow
    const bshd = ctx.createRadialGradient(bx + ps(1.5), by + ps(3), br * 0.5, bx + ps(1.5), by + ps(3), br * 1.6);
    bshd.addColorStop(0, 'rgba(0,0,0,0.35)'); bshd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = bshd; ctx.beginPath(); ctx.arc(bx + ps(1.5), by + ps(3), br * 1.6, 0, Math.PI * 2); ctx.fill();
    // Base
    const bgrad = ctx.createRadialGradient(bx - br * 0.25, by - br * 0.25, br * 0.1, bx, by, br);
    bgrad.addColorStop(0, '#f0f0f4'); bgrad.addColorStop(0.25, '#d0d0d8');
    bgrad.addColorStop(0.5, '#a0a0a8'); bgrad.addColorStop(0.75, '#707078');
    bgrad.addColorStop(0.92, '#505058'); bgrad.addColorStop(1, '#383840');
    ctx.fillStyle = bgrad; ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fill();
    // Primary specular
    const bspec = ctx.createRadialGradient(bx - br * 0.35, by - br * 0.35, 0, bx - br * 0.35, by - br * 0.35, br * 0.4);
    bspec.addColorStop(0, 'rgba(255,255,255,0.9)'); bspec.addColorStop(0.3, 'rgba(255,255,255,0.5)');
    bspec.addColorStop(0.6, 'rgba(255,255,255,0.12)'); bspec.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = bspec; ctx.beginPath(); ctx.arc(bx - br * 0.35, by - br * 0.35, br * 0.4, 0, Math.PI * 2); ctx.fill();
    // Secondary reflection
    const bspec2 = ctx.createRadialGradient(bx + br * 0.3, by + br * 0.25, 0, bx + br * 0.3, by + br * 0.25, br * 0.22);
    bspec2.addColorStop(0, 'rgba(200,200,210,0.2)'); bspec2.addColorStop(1, 'rgba(200,200,210,0)');
    ctx.fillStyle = bspec2; ctx.beginPath(); ctx.arc(bx + br * 0.3, by + br * 0.25, br * 0.22, 0, Math.PI * 2); ctx.fill();
    // Rim
    ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = ps(0.5);
    ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.stroke();
  }

  // Storm balls (chrome, same as main ball)
  for (const mb of stormBalls) {
    if (mb.position.y > IMG_H + 100) continue;
    const bx = px(mb.position.x), by = py(mb.position.y);
    const br = ps(BALL_RADIUS);
    const bshd = ctx.createRadialGradient(bx + ps(1.5), by + ps(3), br * 0.5, bx + ps(1.5), by + ps(3), br * 1.6);
    bshd.addColorStop(0, 'rgba(0,0,0,0.35)'); bshd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = bshd; ctx.beginPath(); ctx.arc(bx + ps(1.5), by + ps(3), br * 1.6, 0, Math.PI * 2); ctx.fill();
    const bgrad = ctx.createRadialGradient(bx - br * 0.25, by - br * 0.25, br * 0.1, bx, by, br);
    bgrad.addColorStop(0, '#f0f0f4'); bgrad.addColorStop(0.25, '#d0d0d8');
    bgrad.addColorStop(0.5, '#a0a0a8'); bgrad.addColorStop(0.75, '#707078');
    bgrad.addColorStop(0.92, '#505058'); bgrad.addColorStop(1, '#383840');
    ctx.fillStyle = bgrad; ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fill();
    const bspec = ctx.createRadialGradient(bx - br * 0.35, by - br * 0.35, 0, bx - br * 0.35, by - br * 0.35, br * 0.4);
    bspec.addColorStop(0, 'rgba(255,255,255,0.9)'); bspec.addColorStop(0.3, 'rgba(255,255,255,0.5)');
    bspec.addColorStop(0.6, 'rgba(255,255,255,0.12)'); bspec.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = bspec; ctx.beginPath(); ctx.arc(bx - br * 0.35, by - br * 0.35, br * 0.4, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = ps(0.5);
    ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.stroke();
  }

  // Multiball extra balls (metallic gold) — skip storm balls
  for (const mb of multiballs) {
    if (stormBalls.includes(mb)) continue;
    const bx = px(mb.position.x), by = py(mb.position.y);
    const br = ps(BALL_RADIUS);
    // Drop shadow
    const gshd = ctx.createRadialGradient(bx + ps(1.5), by + ps(3), br * 0.5, bx + ps(1.5), by + ps(3), br * 1.6);
    gshd.addColorStop(0, 'rgba(0,0,0,0.35)'); gshd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gshd; ctx.beginPath(); ctx.arc(bx + ps(1.5), by + ps(3), br * 1.6, 0, Math.PI * 2); ctx.fill();
    // Base gold sphere
    const ggrad = ctx.createRadialGradient(bx - br * 0.25, by - br * 0.25, br * 0.1, bx, by, br);
    ggrad.addColorStop(0, '#fff8e0'); ggrad.addColorStop(0.2, '#ffd740');
    ggrad.addColorStop(0.45, '#c8a020'); ggrad.addColorStop(0.7, '#8a6e10');
    ggrad.addColorStop(0.9, '#5a4408'); ggrad.addColorStop(1, '#3a2a04');
    ctx.fillStyle = ggrad; ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fill();
    // Primary specular
    const gspec = ctx.createRadialGradient(bx - br * 0.35, by - br * 0.35, 0, bx - br * 0.35, by - br * 0.35, br * 0.4);
    gspec.addColorStop(0, 'rgba(255,255,240,0.9)'); gspec.addColorStop(0.3, 'rgba(255,245,200,0.5)');
    gspec.addColorStop(0.6, 'rgba(255,230,150,0.12)'); gspec.addColorStop(1, 'rgba(255,220,100,0)');
    ctx.fillStyle = gspec; ctx.beginPath(); ctx.arc(bx - br * 0.35, by - br * 0.35, br * 0.4, 0, Math.PI * 2); ctx.fill();
    // Secondary reflection
    const gspec2 = ctx.createRadialGradient(bx + br * 0.3, by + br * 0.25, 0, bx + br * 0.3, by + br * 0.25, br * 0.22);
    gspec2.addColorStop(0, 'rgba(255,220,120,0.2)'); gspec2.addColorStop(1, 'rgba(255,200,80,0)');
    ctx.fillStyle = gspec2; ctx.beginPath(); ctx.arc(bx + br * 0.3, by + br * 0.25, br * 0.22, 0, Math.PI * 2); ctx.fill();
    // Rim
    ctx.strokeStyle = 'rgba(60,40,0,0.25)'; ctx.lineWidth = ps(0.5);
    ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.stroke();
  }

  // Overlays — elevated playfield elements drawn after balls for depth
  if (overlayLoaded) {
    ctx.drawImage(tableOverlayImg, offX, offY, IMG_W * scale, IMG_H * scale);
  }
  if (rampOverlayLoaded) {
    ctx.globalAlpha = 0.65;
    ctx.drawImage(rampOverlayImg, offX, offY, IMG_W * scale, IMG_H * scale);
    ctx.globalAlpha = 1.0;
  }

  // Ball on ramp — drawn AFTER overlays so it appears on top of the ramp chrome
  if (rampAnimating && rampBall) {
    const bx = px(rampBall.position.x), by = py(rampBall.position.y);
    const br = ps(BALL_RADIUS);
    const isMain = rampBall === ball || !ball;
    if (isMain) {
      const bshd = ctx.createRadialGradient(bx + ps(1.5), by + ps(3), br * 0.5, bx + ps(1.5), by + ps(3), br * 1.6);
      bshd.addColorStop(0, 'rgba(0,0,0,0.35)'); bshd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = bshd; ctx.beginPath(); ctx.arc(bx + ps(1.5), by + ps(3), br * 1.6, 0, Math.PI * 2); ctx.fill();
      const bgrad = ctx.createRadialGradient(bx - br * 0.25, by - br * 0.25, br * 0.1, bx, by, br);
      bgrad.addColorStop(0, '#f0f0f4'); bgrad.addColorStop(0.25, '#d0d0d8');
      bgrad.addColorStop(0.5, '#a0a0a8'); bgrad.addColorStop(0.75, '#707078');
      bgrad.addColorStop(0.92, '#505058'); bgrad.addColorStop(1, '#383840');
      ctx.fillStyle = bgrad; ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fill();
      const bspec = ctx.createRadialGradient(bx - br * 0.35, by - br * 0.35, 0, bx - br * 0.35, by - br * 0.35, br * 0.4);
      bspec.addColorStop(0, 'rgba(255,255,255,0.9)'); bspec.addColorStop(0.3, 'rgba(255,255,255,0.5)');
      bspec.addColorStop(0.6, 'rgba(255,255,255,0.12)'); bspec.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = bspec; ctx.beginPath(); ctx.arc(bx - br * 0.35, by - br * 0.35, br * 0.4, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = ps(0.5);
      ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.stroke();
    } else {
      const gshd = ctx.createRadialGradient(bx + ps(1.5), by + ps(3), br * 0.5, bx + ps(1.5), by + ps(3), br * 1.6);
      gshd.addColorStop(0, 'rgba(0,0,0,0.35)'); gshd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gshd; ctx.beginPath(); ctx.arc(bx + ps(1.5), by + ps(3), br * 1.6, 0, Math.PI * 2); ctx.fill();
      const ggrad = ctx.createRadialGradient(bx - br * 0.25, by - br * 0.25, br * 0.1, bx, by, br);
      ggrad.addColorStop(0, '#fff8e0'); ggrad.addColorStop(0.2, '#ffd740');
      ggrad.addColorStop(0.45, '#c8a020'); ggrad.addColorStop(0.7, '#8a6e10');
      ggrad.addColorStop(0.9, '#5a4408'); ggrad.addColorStop(1, '#3a2a04');
      ctx.fillStyle = ggrad; ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fill();
      const gspec = ctx.createRadialGradient(bx - br * 0.35, by - br * 0.35, 0, bx - br * 0.35, by - br * 0.35, br * 0.4);
      gspec.addColorStop(0, 'rgba(255,255,240,0.9)'); gspec.addColorStop(0.3, 'rgba(255,245,200,0.5)');
      gspec.addColorStop(0.6, 'rgba(255,230,150,0.12)'); gspec.addColorStop(1, 'rgba(255,220,100,0)');
      ctx.fillStyle = gspec; ctx.beginPath(); ctx.arc(bx - br * 0.35, by - br * 0.35, br * 0.4, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(60,40,0,0.25)'; ctx.lineWidth = ps(0.5);
      ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.stroke();
    }
  }

  // Flippers
  if (leftPaddle) {
    drawFlipper(leftPaddle, 1);   // left: red prominent on top in world space
    drawFlipper(rightPaddle, -1); // right: flip asymmetry
  }

  // Spring launcher — always visible (permanent table fixture)
  if (gameState !== 'attract') {
    renderSpringLauncher();
  }

  // Launch particles
  if (launchParticles.length > 0) renderLaunchParticles();

  // HUD — rendered in left panel DOM, not on canvas
  if (gameState === 'play' || gameState === 'launch') {
    document.getElementById('hud-score').textContent = score.toLocaleString();
    document.getElementById('hud-highscore').textContent = highScore.toLocaleString();
    // Ball pips — start full, drain as balls are lost
    const pips = document.querySelectorAll('.ball-pip');
    pips.forEach((p, i) => {
      p.className = 'ball-pip';
      if (i < totalBalls - ballNum + 1) p.classList.add('active');
      else p.classList.add('used');
    });
    // Mobile HUD mirror
    if (isMobile) {
      document.getElementById('mhud-score').textContent = score.toLocaleString();
      const mpips = document.querySelectorAll('.mhud-pip');
      mpips.forEach((p, i) => {
        p.className = 'mhud-pip';
        if (i < totalBalls - ballNum + 1) p.classList.add('active');
        else p.classList.add('used');
      });
    }
  }

  // Progressive difficulty
  updateDifficulty();

  // Variety streak timer countdown
  if (varietyTimer > 0) {
    varietyTimer--;
    if (varietyTimer <= 0) {
      varietySet = new Set();
      varietyMultiplier = 1;
      document.getElementById('hud-streak').classList.add('hidden');
    }
  }
  // All-targets multiplier countdown
  if (allTargetsMultiTimer > 0) {
    allTargetsMultiTimer--;
    if (allTargetsMultiTimer <= 0) { allTargetsMultiplier = 1; }
  }
  // Storm mode update
  updateStorm();
  // Ball save countdown
  if (ballSaveTimer > 0) {
    ballSaveTimer--;
    if (ballSaveTimer <= 0) { ballSaveActive = false; }
  }
  // Bumper streak countdown
  if (bumperStreakTimer > 0) {
    bumperStreakTimer--;
    if (bumperStreakTimer <= 0) { bumperStreakCount = 0; }
  }
  // Message callout countdown
  if (messageDisplayTimer > 0) {
    messageDisplayTimer--;
    if (messageDisplayTimer <= 0) {
      const el = document.querySelector('.bg-message');
      if (el) el.style.opacity = '0';
    }
  }
  // Expire old feed items
  expireFeedItems();

  // Multiball announcement overlay
  if (multiballPhase === 'caught' || multiballPhase === 'announcing') {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#FFD700';
    ctx.font = `bold ${ps(52)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('MULTIBALL!', px(IMG_W / 2), py(IMG_H / 2 - 20));
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${ps(24)}px sans-serif`;
    ctx.fillText(multiballPhase === 'caught' ? 'GET READY...' : POINTS.MULTIBALL.toLocaleString() + ' POINTS', px(IMG_W / 2), py(IMG_H / 2 + 30));
  }

  // Attract mode — dim overlay only, start prompt is in left panel
  if (gameState === 'attract') {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // Game over dim (HTML overlay handles UI)
  if (gameState === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // Screen flash for big moments
  if (screenFlashTimer > 0) {
    const t = screenFlashTimer / screenFlashMax;
    const alpha = t * t * screenFlashPeak;
    ctx.fillStyle = `rgba(${screenFlashColor.slice(4, -1)}, ${alpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    screenFlashTimer--;
  }

  // Drain bonus overlay
  if (gameState === 'drain') renderDrainBonus();

  // Drain — no feed entry needed, ball pips handle the visual

  // Storm overlay (renders on its own full-screen canvas)
  renderStorm();

  // Physics anomaly counter (temporary debug HUD)
  if (anomalyCount > 0) {
    ctx.save();
    ctx.font = '14px monospace';
    ctx.fillStyle = 'rgba(255,60,60,0.8)';
    ctx.textAlign = 'left';
    ctx.fillText('ANOMALIES: ' + anomalyCount, 10, canvas.height - 10);
    ctx.restore();
  }

  // End screen shake
  if (shake > 0) ctx.restore();
}

function drawFlipper(body, side) {
  // side: 1 = left, -1 = right. Flips all world-relative lighting.
  ctx.save();
  ctx.translate(px(body.position.x), py(body.position.y));
  ctx.rotate(body.angle);

  const w = ps(PADDLE_LEN), h = ps(PADDLE_WIDTH);
  const baseH = h * 1.8;
  const tipH = h * 1.0;
  const edgeW = ps(5);
  const top = -side;

  function taperPath(bH, tH, len) {
    const bR = bH / 2, tR = tH / 2;
    ctx.beginPath();
    ctx.arc(-len/2 + bR, 0, bR, Math.PI/2, -Math.PI/2);
    ctx.lineTo(len/2 - tR, -tR);
    ctx.arc(len/2 - tR, 0, tR, -Math.PI/2, Math.PI/2);
    ctx.lineTo(-len/2 + bR, bR);
    ctx.closePath();
  }

  // 1. Drop shadow
  ctx.save();
  ctx.translate(ps(3) * side, ps(5) * side);
  taperPath(baseH, tipH, w);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fill();
  ctx.restore();

  // 2. Red edge — beveled gradient + lengthwise variation
  taperPath(baseH, tipH, w);
  const redGrad = ctx.createLinearGradient(0, top * baseH/2, 0, -top * baseH/2);
  redGrad.addColorStop(0, '#8C1822');
  redGrad.addColorStop(0.35, '#6E1219');
  redGrad.addColorStop(1, '#2E080E');
  ctx.fillStyle = redGrad;
  ctx.fill();

  ctx.save();
  taperPath(baseH, tipH, w);
  ctx.clip();
  const lenGrad = ctx.createLinearGradient(-w/2, 0, w/2, 0);
  lenGrad.addColorStop(0, 'rgba(0,0,0,0.15)');
  lenGrad.addColorStop(0.15, 'rgba(0,0,0,0.03)');
  lenGrad.addColorStop(0.5, 'rgba(0,0,0,0)');
  lenGrad.addColorStop(0.88, 'rgba(0,0,0,0.02)');
  lenGrad.addColorStop(1, 'rgba(0,0,0,0.12)');
  ctx.fillStyle = lenGrad;
  ctx.fillRect(-w/2, -baseH/2, w, baseH);
  const sheenGrad = ctx.createLinearGradient(0, top * baseH/2, 0, 0);
  sheenGrad.addColorStop(0, 'rgba(255,255,255,0.16)');
  sheenGrad.addColorStop(0.35, 'rgba(255,255,255,0.09)');
  sheenGrad.addColorStop(0.7, 'rgba(255,255,255,0.03)');
  sheenGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = sheenGrad;
  ctx.fillRect(-w/2, -baseH/2, w, baseH);
  ctx.restore();

  // 3. White body with black border and soft shadow onto red bezel
  const iBH = baseH - edgeW * 2, iTH = tipH - edgeW * 2;
  const iW = w - edgeW * 2;

  // Inner shadow cast onto red bezel
  ctx.save();
  ctx.translate(0, ps(2.5) * side);
  ctx.beginPath();
  ctx.rect(-w, -baseH, w * 2, baseH * 2);
  taperPath(iBH, iTH, iW);
  ctx.clip('evenodd');
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = ps(8);
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = top * ps(2);
  taperPath(iBH, iTH, iW);
  ctx.fillStyle = '#000';
  ctx.fill();
  ctx.restore();

  // Black border ring
  ctx.save();
  ctx.translate(0, ps(2.5) * side);
  taperPath(iBH, iTH, iW);
  ctx.fillStyle = '#1a1a1a';
  ctx.fill();
  ctx.restore();

  // White body (inset from black border)
  const borderW = ps(3.5);
  const wBH = iBH - borderW * 2, wTH = iTH - borderW * 2;
  const wW = iW - borderW * 2;

  ctx.save();
  ctx.translate(0, ps(2.5) * side);
  taperPath(wBH, wTH, wW);
  const bodyGrad = ctx.createLinearGradient(0, top * wBH/2, 0, -top * wBH/2);
  bodyGrad.addColorStop(0, '#efe5d8');
  bodyGrad.addColorStop(0.15, '#e8ddd0');
  bodyGrad.addColorStop(0.5, '#ddd2c4');
  bodyGrad.addColorStop(0.85, '#c9bfb2');
  bodyGrad.addColorStop(1, '#b0a89c');
  ctx.fillStyle = bodyGrad;
  ctx.fill();
  ctx.restore();

  // 4. Specular sheen on white surface
  ctx.save();
  ctx.translate(0, ps(2.5) * side);
  taperPath(wBH * 0.55, wTH * 0.55, wW * 0.88);
  ctx.translate(0, top * wBH * 0.14);
  const specGrad = ctx.createLinearGradient(0, top * wBH * 0.2, 0, -top * wBH * 0.1);
  specGrad.addColorStop(0, 'rgba(255,255,255,0.8)');
  specGrad.addColorStop(0.4, 'rgba(255,255,255,0.4)');
  specGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = specGrad;
  ctx.fill();
  ctx.restore();

  // 5. Subtle shadow edge on underside
  ctx.save();
  ctx.translate(0, ps(2.5) * side);
  taperPath(wBH, wTH, wW);
  ctx.clip();
  const shadowEdge = ctx.createLinearGradient(0, -top * wBH/2, 0, -top * wBH * 0.1);
  shadowEdge.addColorStop(0, 'rgba(0,0,0,0.12)');
  shadowEdge.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = shadowEdge;
  ctx.fillRect(-wW/2, -wBH/2, wW, wBH);
  ctx.restore();

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// DEBUG — Shift+D shows all physics bodies
// ═══════════════════════════════════════════════════════════════

let debug = false;
document.addEventListener('keydown', e => {
  if (e.key === 'D' && e.shiftKey) debug = !debug;
  // Dev shortcut: R triggers storm mode instantly
  if (e.key === 'r' && gameState === 'play' && !stormActive && stormPhase === 'idle') {
    for (let i = 0; i < targetStates.length; i++) {
      targetStates[i] = false;
      TARGET_LABELS[i].lit = true;
      World.remove(world, targetBodies[i]);
    }
    allTargetsMultiplier = 2;
    allTargetsMultiTimer = 1800;
    allTargetsTimer = 180;
    shakeTrauma = 0.5;
    startStorm();
  }
});

function renderDebug() {
  if (!debug) return;
  const bodies = Composite.allBodies(world);
  for (const b of bodies) {
    if (b.label === 'ball') continue;
    ctx.beginPath();
    ctx.moveTo(px(b.vertices[0].x), py(b.vertices[0].y));
    for (let i = 1; i < b.vertices.length; i++)
      ctx.lineTo(px(b.vertices[i].x), py(b.vertices[i].y));
    ctx.closePath();
    // Color by type: green = active sling face, cyan = wall, yellow = corner
    let color = 'rgba(0,255,255,0.6)';
    let lineW = 1;
    if (b.label === 'corner') {
      color = 'rgba(255,255,0,0.3)';
    } else if (b.label.startsWith('sling-') && SLING_FRONT_DEBUG.has(b.label)) {
      color = 'rgba(0,255,0,1)';
      lineW = 3;
    } else if (b.label.startsWith('sling-')) {
      color = 'rgba(255,0,255,0.5)';
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = lineW;
    ctx.stroke();
  }

  if (ball) {
    ctx.fillStyle = '#0f0';
    ctx.font = '12px monospace';
    const v = ball.velocity;
    const spd = Math.sqrt(v.x * v.x + v.y * v.y).toFixed(1);
    ctx.fillText(
      `ball: (${ball.position.x.toFixed(0)}, ${ball.position.y.toFixed(0)}) spd:${spd}`,
      px(70), py(IMG_H - 30)
    );
  }
}

// ═══════════════════════════════════════════════════════════════
// INIT — load walls then start game loop
// ═══════════════════════════════════════════════════════════════

let lastTime = 0;
function gameLoop(ts) {
  const dt = Math.min(ts - lastTime, 32);
  lastTime = ts;

  // CRITICAL: update flipper positions BEFORE physics step
  // so the engine sees their velocity during collision resolution
  update();
  Engine.update(engine, dt / 2);
  Engine.update(engine, dt / 2);

  render();
  renderDebug();
  requestAnimationFrame(gameLoop);
}

// ── GAME OVER HANDLERS ──
document.getElementById('submit-score').addEventListener('click', async () => {
  if (isSubmitting) return;
  const input = document.getElementById('player-name');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }
  isSubmitting = true;
  if (retryTimeoutId) { clearTimeout(retryTimeoutId); retryTimeoutId = null; }
  const btn = document.getElementById('submit-score');
  btn.disabled = true;
  btn.textContent = 'SAVING...';
  const placeholder = document.getElementById('lb-placeholder');
  if (placeholder) placeholder.remove();
  const saved = await submitScore(name, gameOverFinalScore);
  if (saved) {
    btn.textContent = 'SAVED!';
    await new Promise(r => setTimeout(r, 800));
    hideGameOverOverlay();
    if (gameOverFinalScore > highScore) highScore = gameOverFinalScore;
    gameState = 'attract';
    document.getElementById('start-prompt').classList.remove('hidden');
  } else {
    btn.disabled = false;
    btn.textContent = 'RETRY';
    btn.style.borderColor = '#C8102E';
    retryTimeoutId = setTimeout(() => { btn.style.borderColor = ''; btn.textContent = 'SUBMIT'; retryTimeoutId = null; }, 2000);
  }
  isSubmitting = false;
});

document.getElementById('player-name').addEventListener('keydown', e => {
  e.stopPropagation();
  if (e.key === 'Enter') document.getElementById('submit-score').click();
});

document.getElementById('skip-score').addEventListener('click', () => {
  const placeholder = document.getElementById('lb-placeholder');
  if (placeholder) placeholder.remove();
  hideGameOverOverlay();
  if (gameOverFinalScore > highScore) highScore = gameOverFinalScore;
  gameState = 'attract';
  document.getElementById('start-prompt').classList.remove('hidden');
});

// Load walls, then start
loadWalls().then(() => {
  loadLeaderboard();
  requestAnimationFrame(gameLoop);
}).catch(err => {
  console.error('Failed to load wall-data.json:', err);
  requestAnimationFrame(gameLoop);
});

// ═══════════════════════════════════════════════════════════════
// MOBILE SUPPORT
// ═══════════════════════════════════════════════════════════════

if (isMobile) {
  // Show start prompt on canvas
  document.getElementById('mobile-start').classList.add('visible');

  // Show touch zone hints on first load, fade after 3 seconds
  const hint = document.getElementById('mobile-touch-hint');
  hint.classList.add('visible');
  setTimeout(() => hint.classList.remove('visible'), 3000);

  // Mirror feed items to mobile feed overlay
  const mobileFeed = document.getElementById('mobile-feed');
  const _origAddFeedItem = addFeedItem;
  addFeedItem = function(label, pts, tier, collapseKey, count, total) {
    _origAddFeedItem(label, pts, tier, collapseKey, count, total);
    const div = document.createElement('div');
    div.className = 'mfeed-item' + (tier === 'epic' ? ' epic' : tier === 'major' ? ' major' : '');
    const labelSpan = document.createElement('span');
    labelSpan.textContent = label;
    const ptsSpan = document.createElement('span');
    ptsSpan.className = 'mfeed-pts';
    ptsSpan.textContent = ' +' + pts.toLocaleString();
    div.appendChild(labelSpan);
    div.appendChild(ptsSpan);
    mobileFeed.insertBefore(div, mobileFeed.firstChild);
    while (mobileFeed.children.length > 3) mobileFeed.removeChild(mobileFeed.lastChild);
    setTimeout(() => { if (div.parentNode) div.remove(); }, 4000);
  };

  // Mirror streak to mobile HUD
  const origStreakEl = document.getElementById('hud-streak');
  const mStreakEl = document.getElementById('mhud-streak');
  new MutationObserver(() => {
    if (origStreakEl.classList.contains('hidden')) mStreakEl.classList.add('hidden');
    else { mStreakEl.classList.remove('hidden'); mStreakEl.textContent = document.getElementById('streak-multi').textContent; }
  }).observe(origStreakEl, { attributes: true, attributeFilter: ['class'] });

  // Mobile start prompt
  const _origStartGame = startGame;
  startGame = function() {
    document.getElementById('mobile-start').classList.remove('visible');
    _origStartGame();
  };

  // Populate mobile leaderboard in game over
  function populateMobileLeaderboard() {
    const mlb = document.getElementById('mobile-leaderboard');
    mlb.textContent = '';
    const title = document.createElement('div');
    title.className = 'mlb-title';
    title.textContent = 'HIGH SCORES';
    mlb.appendChild(title);
    const entries = document.querySelectorAll('#leaderboard li');
    const max = Math.min(entries.length, 5);
    for (let i = 0; i < max; i++) {
      const row = document.createElement('div');
      row.className = 'mlb-row';
      const rank = document.createElement('span');
      rank.className = 'mlb-rank';
      rank.textContent = entries[i].querySelector('.lb-rank')?.textContent || (i + 1);
      const name = document.createElement('span');
      name.className = 'mlb-name';
      name.textContent = entries[i].querySelector('.lb-name')?.textContent || '---';
      const sc = document.createElement('span');
      sc.className = 'mlb-pts';
      sc.textContent = entries[i].querySelector('.lb-score')?.textContent || '0';
      row.appendChild(rank);
      row.appendChild(name);
      row.appendChild(sc);
      mlb.appendChild(row);
    }
    if (max > 0) mlb.classList.add('visible');
  }

  // Hook game over to show mobile leaderboard
  const _origShowGameOver = showGameOverOverlay;
  showGameOverOverlay = function() {
    _origShowGameOver();
    populateMobileLeaderboard();
  };

  // Hook game over hide to show mobile start again
  const _origHideGameOver = hideGameOverOverlay;
  hideGameOverOverlay = function() {
    _origHideGameOver();
    document.getElementById('mobile-leaderboard').classList.remove('visible');
    document.getElementById('mobile-start').classList.add('visible');
  };
}
</script>
